                    Cancel
                  </button>
                  <button 
                    type="button" 
                    className="btn btn-primary" 
                    onClick={handleSaveReceiveModal}
                    disabled={!selectedReceiveProduct || !receiveQty}
                  >
                    Receive Stock
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* BATCH PERFORM STOCK TAKE MODAL */}
          {isStockTakeModalOpen && (
            <div className="modal-overlay">
              <div className="modal-content" style={{ maxWidth: '500px' }}>
                <div className="modal-header">
                  <h3>Perform Stock Take (Overwrite)</h3>
                  <button className="close-btn" onClick={() => setIsStockTakeModalOpen(false)}>&times;</button>
                </div>
                <div className="modal-body">
                  <p style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '16px' }}>
                    Select a product and enter its actual physical stock count. This will overwrite the database.
                  </p>
                  
                  <div className="form-group autocomplete-wrapper" style={{ position: 'relative' }}>
                    <label>Search Product (SKU / Name)</label>
                    <input 
                      type="text" 
                      className="input-control" 
                      placeholder="Type to search catalog..." 
                      value={stockTakeSearchText}
                      onChange={(e) => {
                        setStockTakeSearchText(e.target.value);
                        setShowStockTakeSuggestions(true);
                      }}
                      onFocus={() => setShowStockTakeSuggestions(true)}
                      onBlur={() => setTimeout(() => setShowStockTakeSuggestions(false), 200)}
                    />
                    {showStockTakeSuggestions && suggestedStockTakeProducts.length > 0 && (
                      <ul className="autocomplete-list" style={{ top: '100%', zIndex: 1000 }}>
                        {suggestedStockTakeProducts.map(p => (
                          <li 
                            key={p.id} 
                            className="autocomplete-item"
                            onClick={() => {
                              setSelectedStockTakeProduct(p);
                              setStockTakeSearchText(`${p.name} (SKU: ${p.sku})`);
                              setShowStockTakeSuggestions(false);
                              setStockTakeQty((p.stock || 0).toString());
                            }}
                          >
                            {p.name} (SKU: {p.sku}) - Current Stock: {p.stock}
                          </li>
                        ))}
                      </ul>
                    )}
                  </div>

                  {selectedStockTakeProduct && (
                    <div className="card" style={{ padding: '12px', backgroundColor: 'var(--bg-tertiary)', marginBottom: '16px', fontSize: '13px' }}>
                      <strong>Selected Product:</strong> {selectedStockTakeProduct.name}<br />
                      <strong>SKU:</strong> <code>{selectedStockTakeProduct.sku}</code><br />
                      <strong>Current Database Count:</strong> {selectedStockTakeProduct.stock} units
                    </div>
                  )}

                  <div className="form-group">
                    <label>Actual Physical Count (New Stock Level)</label>
                    <input 
                      type="number" 
                      min="0"
                      className="input-control" 
                      placeholder="e.g. 5" 
                      value={stockTakeQty}
                      onChange={(e) => setStockTakeQty(e.target.value)}
                    />
                  </div>
                </div>
                <div className="modal-footer">
                  <button 
                    type="button" 
                    className="btn btn-secondary" 
                    onClick={() => setIsStockTakeModalOpen(false)}
                  >
                    Cancel
                  </button>
                  <button 
                    type="button" 
                    className="btn btn-primary" 
                    onClick={handleSaveStockTakeModal}
                    disabled={!selectedStockTakeProduct || stockTakeQty === ''}
                  >
                    Update Stock Count
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* STOCK ADJUSTMENT HISTORY LOG MODAL */}
          {isHistoryModalOpen && (
            <div className="modal-overlay">
              <div className="modal-content" style={{ maxWidth: '850px', width: '90%' }}>
                <div className="modal-header">
                  <h3>Stock Intake & Stocktake History Log</h3>
                  <button className="close-btn" onClick={() => setIsHistoryModalOpen(false)}>&times;</button>
                </div>
                <div className="modal-body">
                  <p style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '16px' }}>
                    A chronological audit trail of all manual stock receives (intakes) and counts (stocktakes) logged in the console.
                  </p>

                  <div style={{ display: 'flex', gap: '12px', marginBottom: '16px' }}>
                    <div style={{ position: 'relative', flexGrow: 1 }}>
                      <input 
                        type="text" 
                        placeholder="Search history by product name or SKU..." 
                        className="input-control"
                        style={{ width: '100%', paddingLeft: '38px', paddingRight: '12px' }}
                        value={historySearch}
                        onChange={(e) => setHistorySearch(e.target.value)}
                      />
                      <span style={{ position: 'absolute', left: '12px', top: '12px', color: 'var(--text-muted)' }}>
                        <Icon name="search" size={15} />
                      </span>
                    </div>
                    {stockHistory && stockHistory.length > 0 && (
                      <button 
                        type="button" 
                        className="btn btn-danger" 
                        onClick={() => {
                          if (confirm("Are you sure you want to permanently clear the stock adjustment audit log? This cannot be undone.")) {
                            setStockHistory([]);
                          }
                        }}
                      >
                        Clear Audit Log
                      </button>
                    )}
                  </div>

                  <div className="table-container" style={{ maxHeight: '450px', overflowY: 'auto' }}>
                    <table className="custom-table" style={{ fontSize: '12.5px' }}>
                      <thead>
                        <tr>
                          <th>Date & Time</th>
                          <th>Product Details</th>
                          <th>Adjustment Type</th>
                          <th style={{ textAlign: 'center' }}>Previous</th>
                          <th style={{ textAlign: 'center' }}>New Count</th>
                          <th style={{ textAlign: 'center' }}>Net Change</th>
                          <th>Logged By</th>
                        </tr>
                      </thead>
                      <tbody>
                        {filteredHistory.map(record => {
                          const diff = record.newStock - record.prevStock;
                          let changeText = '';
                          let changeClass = '';
                          
                          if (record.type.startsWith('Receive') || record.type === 'Receive (New Product)') {
                            changeText = `+${diff}`;
                            changeClass = 'text-success';
                          } else if (record.type.startsWith('Stock Take') || record.type === 'Stock Take (Edit Form)') {
                            if (diff > 0) {
                              changeText = `+${diff} (Counted)`;
                              changeClass = 'text-success';
                            } else if (diff < 0) {
                              changeText = `${diff} (Counted)`;
                              changeClass = 'text-danger';
                            } else {
                              changeText = 'No Change';
                              changeClass = 'text-muted';
                            }
                          } else {
                            changeText = diff > 0 ? `+${diff}` : (diff < 0 ? `${diff}` : '0');
                            changeClass = diff > 0 ? 'text-success' : (diff < 0 ? 'text-danger' : 'text-muted');
                          }

                          return (
                            <tr key={record.id}>
                              <td>{formatDate(record.timestamp)}</td>
                              <td>
                                <strong>{record.name}</strong>
                                <div style={{ fontSize: '10px', color: 'var(--text-secondary)' }}>SKU: <code>{record.sku}</code></div>
                              </td>
                              <td>
                                <span className={`badge ${record.type.startsWith('Receive') ? 'badge-in-stock' : 'badge-low-stock'}`} style={{ padding: '2px 6px', fontSize: '10px' }}>
                                  {record.type}
                                </span>
                              </td>
                              <td style={{ textAlign: 'center' }}>{record.prevStock}</td>
                              <td style={{ textAlign: 'center', fontWeight: 'bold' }}>{record.newStock}</td>
                              <td style={{ textAlign: 'center', fontWeight: 'bold' }} className={changeClass}>
                                {changeText}
                              </td>
                              <td><span className="text-gold">{record.user}</span></td>
                            </tr>
                          );
                        })}
                        {filteredHistory.length === 0 && (
                          <tr>
                            <td colSpan="7" style={{ textAlign: 'center', padding: '30px', color: 'var(--text-muted)' }}>
                              No stock adjustment logs found matching your criteria.
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
                <div className="modal-footer">
                  <button className="btn btn-secondary" onClick={() => window.print()}>Print History Log</button>
                  <button className="btn btn-primary" onClick={() => setIsHistoryModalOpen(false)}>Close</button>
                </div>
              </div>
            </div>
          )}

          {/* SUPPLIER REORDER REPORT MODAL */}
          {isReorderReportOpen && (
            <div className="modal-overlay">
              <div className="modal-content" style={{ maxWidth: '750px' }}>
                <div className="modal-header">
                  <h3>Supplier Reorder Suggestions</h3>
                  <button className="close-btn" onClick={() => setIsReorderReportOpen(false)}>&times;</button>
                </div>
                <div className="modal-body">
                  <p style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '16px' }}>
                    The following products have stock levels at or below their reorder limits. Grouped by supplier.
                  </p>
                  
                  {lowStockItems.length === 0 ? (
                    <div className="card" style={{ textAlign: 'center', padding: '30px', color: 'var(--text-secondary)' }}>
                      🎉 All items are fully stocked! No reorders needed.
                    </div>
                  ) : (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '24px', maxHeight: '450px', overflowY: 'auto' }}>
                      {uniqueSuppliers.map(supplier => {
                        const supplierLowStock = lowStockItems.filter(item => (item.supplier || 'Generic') === supplier);
                        if (supplierLowStock.length === 0) return null;
                        
                        return (
                          <div key={supplier} className="card" style={{ padding: '16px', backgroundColor: 'var(--bg-tertiary)' }}>
                            <h4 className="text-gold" style={{ fontSize: '15px', marginBottom: '10px', display: 'flex', justifyContent: 'space-between' }}>
                              <span>Supplier: {supplier}</span>
                              <span style={{ fontSize: '11px', color: 'var(--text-secondary)' }}>{supplierLowStock.length} items low</span>
                            </h4>
                            <table className="custom-table" style={{ fontSize: '12px' }}>
                              <thead>
                                <tr>
                                  <th>SKU</th>
                                  <th>Product Name</th>
                                  <th style={{ textAlign: 'center' }}>Current Stock</th>
                                  <th style={{ textAlign: 'center' }}>Limit</th>
                                  <th style={{ textAlign: 'center' }}>Suggested Reorder</th>
                                </tr>
                              </thead>
                              <tbody>
                                {supplierLowStock.map(item => (
                                  <tr key={item.id}>
                                    <td><code>{item.sku}</code></td>
                                    <td>{item.name}</td>
                                    <td style={{ textAlign: 'center', color: '#f87171', fontWeight: 'bold' }}>{item.stock}</td>
                                    <td style={{ textAlign: 'center' }}>{item.reorderPoint}</td>
                                    <td style={{ textAlign: 'center', fontWeight: 'bold', color: 'var(--accent-gold)' }}>
                                      {item.reorderPoint * 3 - item.stock > 0 ? item.reorderPoint * 3 - item.stock : 5}
                                    </td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
                <div className="modal-footer">
                  <button className="btn btn-secondary" onClick={() => window.print()}>Print Report</button>
                  <button className="btn btn-primary" onClick={() => setIsReorderReportOpen(false)}>Close</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }


    /* =========================================================================
       3. CLIENTS DIRECTORY COMPONENT
       ========================================================================= */
    function ClientsPage({ clients, setClients, repairs, invoices }) {
      const [searchTerm, setSearchTerm] = React.useState('');
      const [selectedClient, setSelectedClient] = React.useState(null);
      
      const [isAddOpen, setIsAddOpen] = React.useState(false);
      const [editingClient, setEditingClient] = React.useState(null);
      const [clientForm, setClientForm] = React.useState({
        name: '', phone: '', email: '', address: '', notes: ''
      });

      const formatDate = (isoString) => {
        if (!isoString) return 'N/A';
        try {
          const d = new Date(isoString);
          if (isNaN(d.getTime())) return 'N/A';
          return d.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' });
        } catch (e) {
          return 'N/A';
        }
      };

      const filteredClients = clients.filter(c => {
        const text = (searchTerm || '').toLowerCase();
        return (
          (c.name || '').toLowerCase().includes(text) ||
          (c.phone || '').toLowerCase().includes(text) ||
          (c.email || '').toLowerCase().includes(text)
        );
      });

      React.useEffect(() => {
        if (filteredClients.length > 0 && !selectedClient) {
          setSelectedClient(filteredClients[0]);
        }
      }, [filteredClients, selectedClient]);

      const handleAddSubmit = (e) => {
        e.preventDefault();
        if (editingClient) {
          setClients(prev => prev.map(c => c.id === editingClient.id ? { ...c, ...clientForm } : c));
          setSelectedClient({ ...editingClient, ...clientForm });
          setEditingClient(null);
        } else {
          const newClient = {
            id: `CLI-${Date.now().toString().slice(-4)}`,
            ...clientForm,
            createdAt: new Date().toISOString()
          };
          setClients(prev => [newClient, ...prev]);
          setSelectedClient(newClient);
        }
        setIsAddOpen(false);
        setClientForm({ name: '', phone: '', email: '', address: '', notes: '' });
      };

      const handleEditClick = (c) => {
        setEditingClient(c);
        setClientForm({
          name: c.name, phone: c.phone, email: c.email, address: c.address || '', notes: c.notes || ''
        });
        setIsAddOpen(true);
      };

      const handleDeleteClick = (cliId) => {
        if (confirm('Are you sure you want to delete this client? Past jobs will remain but link history might be affected.')) {
          setClients(prev => prev.filter(c => c.id !== cliId));
          setSelectedClient(null);
        }
      };

      const clientRepairs = selectedClient ? repairs.filter(r => 
        r.client.name.toLowerCase() === selectedClient.name.toLowerCase()
      ) : [];

      const clientPurchases = selectedClient && invoices ? invoices.filter(inv => 
        inv.client &&
        inv.client.name.toLowerCase() === selectedClient.name.toLowerCase() &&
        !inv.repairJobId
      ) : [];

      return (
        <div className="clients-split">
          <div>
            <div className="card" style={{ marginBottom: '16px', padding: '16px' }}>
              <div style={{ display: 'flex', gap: '10px' }}>
                <div style={{ position: 'relative', flexGrow: 1 }}>
                  <input 
                    type="text" 
                    placeholder="Search clients..." 
                    className="input-control"
                    style={{ width: '100%', paddingLeft: '38px', paddingRight: '12px' }}
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                  <span style={{ position: 'absolute', left: '12px', top: '14px', color: 'var(--text-muted)' }}>
                    <Icon name="search" size={15} />
                  </span>
                </div>
                <button 
                  className="btn btn-primary" 
                  style={{ padding: '8px 12px' }}
                  onClick={() => {
                    setClientForm({ name: '', phone: '', email: '', address: '', notes: '' });
                    setEditingClient(null);
                    setIsAddOpen(true);
                  }}
                >
                  <Icon name="plus" size={16} />
                </button>
              </div>
            </div>

            <div className="table-container" style={{ maxHeight: 'calc(100vh - 250px)', overflowY: 'auto' }}>
              <table className="custom-table">
                <tbody>
                  {filteredClients.map(c => (
                    <tr 
                      key={c.id} 
                      style={{ 
                        cursor: 'pointer',
                        backgroundColor: selectedClient?.id === c.id ? 'var(--bg-tertiary)' : 'transparent'
                      }}
                      onClick={() => setSelectedClient(c)}
                    >
                      <td style={{ padding: '12px 16px' }}>
                        <strong>{c.name}</strong>
                        <div style={{ fontSize: '11px', color: 'var(--text-secondary)' }}>{c.phone}</div>
                      </td>
                    </tr>
                  ))}
                  {filteredClients.length === 0 && (
                    <tr>
                      <td style={{ textAlign: 'center', color: 'var(--text-muted)' }}>No clients found.</td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          <div>
            {selectedClient ? (
              <div className="card">
                <div className="flex-space" style={{ borderBottom: '1px solid var(--border-subtle)', paddingBottom: '14px', marginBottom: '20px' }}>
                  <div>
                    <span className="text-muted" style={{ fontSize: '10px', display: 'block' }}>CLIENT PROFILE</span>
                    <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '22px' }}>{selectedClient.name}</h3>
                  </div>
                  <div style={{ display: 'flex', gap: '8px' }}>
                    <button className="btn btn-secondary" style={{ padding: '8px 14px' }} onClick={() => handleEditClick(selectedClient)}>
                      <Icon name="edit" size={14} className="mr-8" /> Edit Profile
                    </button>
                    <button className="btn btn-danger" style={{ padding: '8px 14px' }} onClick={() => handleDeleteClick(selectedClient.id)}>
                      <Icon name="trash" size={14} />
                    </button>
                  </div>
                </div>

                <div className="grid-2" style={{ marginBottom: '24px' }}>
                  <div className="card" style={{ padding: '16px', backgroundColor: 'var(--bg-tertiary)' }}>
                    <h4 className="text-gold" style={{ fontSize: '13px', marginBottom: '8px' }}>Contact Info</h4>
                    <p style={{ marginBottom: '4px' }}><strong>Phone:</strong> {selectedClient.phone}</p>
                    <p style={{ marginBottom: '4px' }}><strong>Email:</strong> {selectedClient.email}</p>
                    <p><strong>Address:</strong> {selectedClient.address || 'No address logged'}</p>
                  </div>
                  <div className="card" style={{ padding: '16px', backgroundColor: 'var(--bg-tertiary)' }}>
                    <h4 className="text-gold" style={{ fontSize: '13px', marginBottom: '8px' }}>Internal Notes</h4>
                    <p style={{ fontSize: '13px', fontStyle: 'italic' }}>{selectedClient.notes || 'No general profile notes added yet.'}</p>
                  </div>
                </div>

                <h4 style={{ fontFamily: 'var(--font-serif)', fontSize: '16px', marginBottom: '12px' }}>Instrument Service History</h4>
                
                {clientRepairs.length > 0 ? (
                  <div className="table-container">
                    <table className="custom-table" style={{ fontSize: '13px' }}>
                      <thead>
                        <tr>
                          <th>Job ID</th>
                          <th>Instrument</th>
                          <th>Serial No</th>
                          <th>Status</th>
                          <th>Total Cost</th>
                        </tr>
                      </thead>
                      <tbody>
                        {clientRepairs.map(rep => (
                          <tr key={rep.id}>
                            <td><strong>{rep.id}</strong></td>
                            <td>{rep.instrument.make} {rep.instrument.model} ({rep.instrument.type})</td>
                            <td><code>{rep.instrument.serialNumber}</code></td>
                            <td>
                              <span className={`status-badge ${rep.status === 'Ready for Pickup' ? 'status-ready' : 'status-progress'}`} style={{ fontSize: '10px', padding: '2px 6px' }}>
                                {rep.status}
                              </span>
                            </td>
                            <td>${rep.estimatedCost.toFixed(2)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                ) : (
                  <div className="card" style={{ textAlign: 'center', padding: '20px', color: 'var(--text-secondary)' }}>
                    No repair or checkout history logged for this client profile.
                  </div>
                )}

                {/* Product Purchase History */}
                <h4 style={{ fontFamily: 'var(--font-serif)', fontSize: '16px', marginTop: '24px', marginBottom: '12px' }}>Product Purchase History</h4>
                
                {clientPurchases.length > 0 ? (
                  <div className="table-container">
                    <table className="custom-table" style={{ fontSize: '13px' }}>
                      <thead>
                        <tr>
                          <th>Invoice ID</th>
                          <th>Items Purchased</th>
                          <th>School PO#</th>
                          <th>Date</th>
                          <th>Total Paid</th>
                        </tr>
                      </thead>
                      <tbody>
                        {clientPurchases.map(inv => (
                          <tr key={inv.id}>
                            <td><strong>{inv.id}</strong></td>
                            <td>
                              <ul style={{ margin: 0, paddingLeft: '16px', listStyleType: 'disc' }}>
                                {(inv.lineItems || []).map((li, idx) => (
                                  <li key={idx}>
                                    {li.description} (x{li.qty || 1}) - ${(li.unitPrice * (li.qty || 1)).toFixed(2)}
                                  </li>
                                ))}
                              </ul>
                            </td>
                            <td><code>{inv.schoolPo || 'None'}</code></td>
                            <td>{formatDate(inv.createdAt || inv.syncedAt)}</td>
                            <td><strong>${inv.total.toFixed(2)}</strong></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                ) : (
                  <div className="card" style={{ textAlign: 'center', padding: '20px', color: 'var(--text-secondary)' }}>
                    No retail product purchases logged for this client profile.
                  </div>
                )}
              </div>
            ) : (
              <div className="card" style={{ textAlign: 'center', padding: '60px 20px', color: 'var(--text-secondary)' }}>
                Select a client profile from the list to view histories.
              </div>
            )}
          </div>

          {/* ADD / EDIT CLIENT MODAL */}
          {isAddOpen && (
            <div className="modal-overlay">
              <div className="modal-content">
                <div className="modal-header">
                  <h3>{editingClient ? 'Modify Client Card' : 'Register New Customer'}</h3>
                  <button className="close-btn" onClick={() => setIsAddOpen(false)}>&times;</button>
                </div>
                <form onSubmit={handleAddSubmit}>
                  <div className="modal-body">
                    <div className="form-group">
                      <label>Client Name</label>
                      <input 
                        type="text" required className="input-control" placeholder="e.g. Arthur Pendragon"
                        value={clientForm.name}
                        onChange={(e) => setClientForm({...clientForm, name: e.target.value})}
                      />
                    </div>
                    <div className="form-row">
                      <div className="form-group">
                        <label>Phone Number</label>
                        <input 
                          type="text" required className="input-control" placeholder="e.g. 0422 111 333"
                          value={clientForm.phone}
                          onChange={(e) => setClientForm({...clientForm, phone: e.target.value})}
                        />
                      </div>
                      <div className="form-group">
                        <label>Email Address</label>
                        <input 
                          type="email" required className="input-control" placeholder="e.g. art@camelot.com"
                          value={clientForm.email}
                          onChange={(e) => setClientForm({...clientForm, email: e.target.value})}
                        />
                      </div>
                    </div>
                    <div className="form-group">
                      <label>Postal Address</label>
                      <input 
                        type="text" className="input-control" placeholder="e.g. 12 Camelot Rd, Melbourne VIC 3000"
                        value={clientForm.address}
                        onChange={(e) => setClientForm({...clientForm, address: e.target.value})}
                      />
                    </div>
                    <div className="form-group">
                      <label>Client Notes (instrument preferences, key configurations)</label>
                      <textarea 
                        rows="2" className="input-control" placeholder="Add custom notes..."
                        value={clientForm.notes}
                        onChange={(e) => setClientForm({...clientForm, notes: e.target.value})}
                      ></textarea>
                    </div>
                  </div>
                  <div className="modal-footer">
                    <button type="button" className="btn btn-secondary" onClick={() => setIsAddOpen(false)}>Cancel</button>
                    <button type="submit" className="btn btn-primary">{editingClient ? 'Save Profile' : 'Add Client'}</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }


    /* =========================================================================
       4. INVOICES PAGE COMPONENT
       ========================================================================= */
        function InvoicesPage({ 
      invoices, 
      setInvoices, 
      xeroConnected, 
      repairs, 
      setRepairs, 
      clients, 
      setClients, 
      inventory, 
      setInventory,
      activeUser,
      activeCompany
    }) {
      const [selectedInvoice, setSelectedInvoice] = React.useState(null);
      const [syncLogs, setSyncLogs] = React.useState([]);
      const [isSyncing, setIsSyncing] = React.useState(false);
      const [previewInvoice, setPreviewInvoice] = React.useState(null);

      // Custom invoice creation states
      const [isCreateModalOpen, setIsCreateModalOpen] = React.useState(false);
      const [clientSearchText, setClientSearchText] = React.useState('');
      const [showClientSuggestions, setShowClientSuggestions] = React.useState(false);
      const [newInvoiceForm, setNewInvoiceForm] = React.useState({
        selectedClientId: '',
        clientName: '',
        clientPhone: '',
        clientEmail: '',
        lineItems: [{ type: 'custom', description: '', qty: 1, unitPrice: 0.00, refId: '' }]
      });

      const generateXeroPayload = (inv) => {
        if (!inv) return '';
        
        return JSON.stringify({
          Invoices: [
            {
              Type: "ACCREC",
              Contact: {
                Name: inv.client.name,
                EmailAddress: inv.client.email || "",
                Phones: inv.client.phone ? [{ PhoneType: "DEFAULT", PhoneNumber: inv.client.phone }] : []
              },
              Date: new Date().toISOString().split('T')[0],
              DueDate: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
              LineAmountTypes: "Inclusive",
              LineItems: inv.lineItems.map(item => ({
                Description: item.description,
                Quantity: item.qty,
                UnitAmount: item.unitPrice,
                AccountCode: item.xeroAccountCode || (item.type === 'product' ? '420' : '400'),
                TaxType: "OUTPUT"
              })),
              Status: "AUTHORISED",
              Reference: inv.repairJobId ? `Repair Job ${inv.repairJobId}${inv.schoolPo ? ` | PO: ${inv.schoolPo}` : ''}` : "Retail Counter Sale"
            }
          ]
        }, null, 2);
      };

      const handleSelectInvoice = (inv) => {
        setSelectedInvoice(inv);
        setSyncLogs([]);
      };

      const handleSyncToXero = async (inv) => {
        if (!xeroConnected) {
          alert("Xero Connection Offline! Connect using settings widget.");
          return;
        }

        setIsSyncing(true);
        setSyncLogs([
          { type: 'info', text: 'Securing API credentials handshake...' },
          { type: 'info', text: 'Connected to Xero Australia tenant portal.' }
        ]);

        await new Promise(r => setTimeout(r, 600));
        setSyncLogs(prev => [
          ...prev,
          { type: 'info', text: `Searching contacts list for client "${inv.client.name}"...` }
        ]);

        await new Promise(r => setTimeout(r, 500));
        setSyncLogs(prev => [
          ...prev,
          { type: 'success', text: `Xero resolved contact card ID: CON-1002394` },
          { type: 'info', text: `Syncing invoice totals (GST-inclusive Mode)...` }
        ]);

        await new Promise(r => setTimeout(r, 700));
        const mockXeroInvoiceId = `INV-XERO-${Math.floor(100000 + Math.random() * 900000)}`;
        
        setInvoices(prev => prev.map(invoice => {
          if (invoice.id === inv.id) {
            return {
              ...invoice,
              xeroSyncStatus: 'synced',
              xeroInvoiceId: mockXeroInvoiceId,
              syncedAt: new Date().toISOString()
            };
          }
          return invoice;
        }));

        setSelectedInvoice(prev => ({
          ...prev,
          xeroSyncStatus: 'synced',
          xeroInvoiceId: mockXeroInvoiceId,
          syncedAt: new Date().toISOString()
        }));

        setSyncLogs(prev => [
          ...prev,
          { type: 'success', text: `Invoice generated successfully in Xero dashboard.` },
          { type: 'success', text: `Response Status: 201 Created` },
          { type: 'success', text: `Ref assigned: ${mockXeroInvoiceId}` },
          { type: 'info', text: `Sync process completed.` }
        ]);
        setIsSyncing(false);
      };

      const updateLineItem = (index, updatedFields) => {
        setNewInvoiceForm(prev => {
          const list = [...prev.lineItems];
          list[index] = { ...list[index], ...updatedFields };
          return { ...prev, lineItems: list };
        });
      };

      const addLineItem = () => {
        setNewInvoiceForm(prev => ({
          ...prev,
          lineItems: [...prev.lineItems, { type: 'custom', description: '', qty: 1, unitPrice: 0.00, refId: '' }]
        }));
      };

      const deleteLineItem = (index) => {
        setNewInvoiceForm(prev => {
          if (prev.lineItems.length <= 1) return prev;
          return {
            ...prev,
            lineItems: prev.lineItems.filter((_, i) => i !== index)
          };
        });
      };

      const handleCreateInvoiceSubmit = (e) => {
        e.preventDefault();
        
        let finalClient = null;
        if (newInvoiceForm.selectedClientId) {
          finalClient = clients.find(c => c.id === newInvoiceForm.selectedClientId);
        } else {
          const cName = newInvoiceForm.clientName.trim();
          if (!cName) {
            alert('Client Name is required.');
            return;
          }
          // Create new client
          const newClientId = `CLI-${Date.now().toString().slice(-4)}`;
          finalClient = {
            id: newClientId,
            name: cName,
            phone: newInvoiceForm.clientPhone.trim() || '-',
            email: newInvoiceForm.clientEmail.trim() || '-',
            address: '',
            notes: 'Created automatically via custom invoice creation.',
            createdAt: new Date().toISOString()
          };
          setClients(prev => [finalClient, ...prev]);
        }

        if (newInvoiceForm.lineItems.length === 0) {
          alert('At least one line item is required.');
          return;
        }

        const formattedItems = newInvoiceForm.lineItems.map(item => ({
          description: item.description.trim() || `${item.type.toUpperCase()} Item`,
          qty: parseInt(item.qty) || 1,
          unitPrice: parseFloat(item.unitPrice) || 0.00,
          xeroAccountCode: item.type === 'product' ? '420' : '400',
          type: item.type,
          refId: item.refId
        }));

        const total = formattedItems.reduce((sum, item) => sum + (item.qty * item.unitPrice), 0);
        const tax = total / 11;
        const subtotal = total - tax;
        const newInvoiceId = `INV-${Date.now().toString().slice(-4)}`;

        // Deduct inventory stock
        let updatedInventory = [...inventory];
        formattedItems.forEach(item => {
          if (item.type === 'product' && item.refId) {
            updatedInventory = updatedInventory.map(p => {
              if (p.id === item.refId) {
                return { ...p, stock: Math.max(0, p.stock - item.qty) };
              }
              return p;
            });
          }
        });
        setInventory(updatedInventory);

        // Mark repairs as invoiced
        let updatedRepairs = [...repairs];
        formattedItems.forEach(item => {
          if (item.type === 'repair' && item.refId) {
            updatedRepairs = updatedRepairs.map(r => {
              if (r.id === item.refId) {
                const historyTrail = [...(r.history || [])];
                historyTrail.push({
                  text: `Invoice ${newInvoiceId} generated for this job.`,
                  timestamp: new Date().toISOString(),
                  user: activeUser ? activeUser.name : 'System'
                });
                return {
                  ...r,
                  invoiceId: newInvoiceId,
                  status: 'Ready for Pickup',
                  history: historyTrail
                };
              }
              return r;
            });
          }
        });
        setRepairs(updatedRepairs);

        const linkedRepairId = formattedItems.find(item => item.type === 'repair')?.refId || null;
        const linkedRepair = linkedRepairId ? repairs.find(r => r.id === linkedRepairId) : null;

        const newInvoice = {
          id: newInvoiceId,
          repairJobId: linkedRepairId,
          schoolPo: linkedRepair ? (linkedRepair.schoolPo || '') : '',
          client: {
            name: finalClient.name,
            phone: finalClient.phone,
            email: finalClient.email
          },
          lineItems: formattedItems,
          subtotal: parseFloat(subtotal.toFixed(2)),
          tax: parseFloat(tax.toFixed(2)),
          total: parseFloat(total.toFixed(2)),
          xeroSyncStatus: 'unsynced'
        };

        setInvoices(prev => [newInvoice, ...prev]);
        setIsCreateModalOpen(false);
        setClientSearchText('');
        alert(`Invoice ${newInvoiceId} generated successfully!`);
      };

      const calculateTotals = () => {
        const total = newInvoiceForm.lineItems.reduce((sum, item) => sum + ((parseInt(item.qty) || 0) * (parseFloat(item.unitPrice) || 0)), 0);
        const tax = total / 11;
        const subtotal = total - tax;
        return {
          subtotal: subtotal.toFixed(2),
          tax: tax.toFixed(2),
          total: total.toFixed(2)
        };
      };

      const { subtotal: calcSubtotal, tax: calcTax, total: calcTotal } = calculateTotals();

      return (
        <div>
          <div className="xero-console">
            {/* Invoice List */}
            <div className="card">
              <div className="flex-space" style={{ marginBottom: '16px' }}>
                <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '18px', margin: 0 }}>Invoice Registry</h3>
                <button 
                  type="button" 
                  className="btn btn-primary"
                  onClick={() => {
                    setClientSearchText('');
                    setNewInvoiceForm({
                      selectedClientId: '',
                      clientName: '',
                      clientPhone: '',
                      clientEmail: '',
                      lineItems: [{ type: 'custom', description: '', qty: 1, unitPrice: 0.00, refId: '' }]
                    });
                    setIsCreateModalOpen(true);
                  }}
                >
                  <span style={{ marginRight: '6px', display: 'inline-block', verticalAlign: 'middle', marginTop: '-2px' }}>
                    <Icon name="plus" size={14} />
                  </span> Create Custom Invoice
                </button>
              </div>
              
              <div className="table-container" style={{ border: 'none', background: 'transparent' }}>
                <table className="custom-table">
                  <thead>
                    <tr>
                      <th>Invoice ID</th>
                      <th>Client</th>
                      <th>Type</th>
                      <th>Total (inc GST)</th>
                      <th>Xero Link</th>
                      <th>Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    {invoices.map(inv => (
                      <tr 
                        key={inv.id} 
                        style={{ 
                          cursor: 'pointer',
                          backgroundColor: selectedInvoice?.id === inv.id ? 'var(--bg-tertiary)' : 'transparent',
                          borderLeft: selectedInvoice?.id === inv.id ? '3px solid var(--accent-gold)' : 'none'
                        }}
                        onClick={() => handleSelectInvoice(inv)}
                      >
                        <td><strong>{inv.id}</strong></td>
                        <td>{inv.client?.name || 'Unknown Client'}</td>
                        <td style={{ fontSize: '12px' }}>
                          {inv.repairJobId ? `Repair (${inv.repairJobId})` : ((inv.lineItems || []).some(li => li.type === 'product') ? 'Products / Multi-item' : 'Counter Sale')}
                        </td>
                        <td>${(inv.total || 0).toFixed(2)}</td>
                        <td>
                          <span className={`status-badge ${inv.xeroSyncStatus === 'synced' ? 'status-ready' : 'status-progress'}`}>
                            {inv.xeroSyncStatus === 'synced' ? 'Synced' : 'Draft'}
                          </span>
                        </td>
                        <td>
                          <button 
                            className="btn btn-secondary" 
                            style={{ padding: '6px' }}
                            title="Preview Print Invoice"
                            onClick={(e) => {
                              e.stopPropagation();
                              setPreviewInvoice(inv);
                            }}
                          >
                            <span style={{ display: 'inline-block', verticalAlign: 'middle', marginTop: '-2px' }}>
                              <Icon name="eye" size={14} />
                            </span>
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Xero Sync panel */}
            <div className="xero-sync-panel">
              {selectedInvoice ? (
                <div className="card">
                  <div className="flex-space" style={{ borderBottom: '1px solid var(--border-subtle)', paddingBottom: '12px', marginBottom: '16px' }}>
                    <div>
                      <span className="text-muted" style={{ fontSize: '11px', display: 'block' }}>SELECTED TRANSACTION</span>
                      <h4 style={{ fontFamily: 'var(--font-serif)', fontSize: '18px' }}>
                        {selectedInvoice.id} - {selectedInvoice.client.name}
                      </h4>
                    </div>
                    <div>
                      {selectedInvoice.xeroSyncStatus === 'synced' ? (
                        <span style={{ color: 'var(--status-ready-text)', fontSize: '12px', fontWeight: 'bold' }}>
                          ✔ Synced to Xero
                        </span>
                      ) : (
                        <button 
                          type="button" 
                          className="btn btn-primary"
                          disabled={isSyncing}
                          onClick={() => handleSyncToXero(selectedInvoice)}
                        >
                          {isSyncing ? 'Syncing...' : 'Sync to Xero'}
                        </button>
                      )}
                    </div>
                  </div>

                  <div className="form-group">
                    <label>Xero API Request Payload (JSON)</label>
                    <pre className="xero-payload-preview">
                      {generateXeroPayload(selectedInvoice)}
                    </pre>
                  </div>

                  <div style={{ marginTop: '16px' }}>
                    <h5 style={{ fontSize: '12px', textTransform: 'uppercase', letterSpacing: '1px', color: 'var(--accent-gold)', marginBottom: '8px' }}>Sync Progress Log</h5>
                    <div style={{ backgroundColor: 'var(--bg-primary)', padding: '12px', borderRadius: 'var(--radius-md)', maxHeight: '150px', overflowY: 'auto', border: '1px solid var(--border-subtle)' }}>
                      {syncLogs.length === 0 ? (
                        <span className="text-muted" style={{ fontSize: '12px' }}>No logs. Sync transaction to trigger.</span>
                      ) : (
                        syncLogs.map((log, idx) => (
                          <div key={idx} style={{ 
                            fontSize: '12px', 
                            color: log.type === 'success' ? 'var(--status-ready-text)' : 'var(--text-secondary)',
                            marginBottom: '4px'
                          }}>
                            {log.text}
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                </div>
              ) : (
                <div className="card" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: '300px', color: 'var(--text-muted)' }}>
                  <span style={{ marginBottom: '12px', opacity: 0.5 }}>
                    <Icon name="refresh" size={36} />
                  </span>
                  <h4>Select an invoice from the queue to run Xero syncing processes and view API JSON details.</h4>
                </div>
              )}
            </div>
          </div>

          {/* CREATE CUSTOM INVOICE MODAL */}
          {isCreateModalOpen && (
            <div className="modal-overlay">
              <div className="modal-content" style={{ maxWidth: '800px' }}>
                <div className="modal-header">
                  <h3>Create Custom Invoice</h3>
                  <button type="button" className="close-btn" onClick={() => setIsCreateModalOpen(false)}>&times;</button>
                </div>
                <form onSubmit={handleCreateInvoiceSubmit}>
                  <div className="modal-body" style={{ maxHeight: '70vh', overflowY: 'auto' }}>
                    
                    <h4 className="text-gold" style={{ fontFamily: 'var(--font-serif)', marginBottom: '14px', borderBottom: '1px solid var(--border-subtle)', paddingBottom: '6px' }}>1. Client details</h4>
                    
                    <div className="form-group autocomplete-wrapper">
                      <label>Billed To Client / School (Search or Create New)</label>
                      <div style={{ position: 'relative' }}>
                        <input 
                          type="text"
                          className="input-control"
                          placeholder="Search existing client name..."
                          value={clientSearchText}
                          onChange={(e) => {
                            setClientSearchText(e.target.value);
                            setNewInvoiceForm(prev => ({ ...prev, clientName: e.target.value, selectedClientId: '' }));
                            setShowClientSuggestions(true);
                          }}
                          onFocus={() => setShowClientSuggestions(true)}
                          onBlur={() => setTimeout(() => setShowClientSuggestions(false), 200)}
                        />
                        <span style={{ 
                          position: 'absolute', 
                          right: '12px', 
                          top: '50%', 
                          transform: 'translateY(-50%)', 
                          fontSize: '10px', 
                          color: 'var(--text-muted)',
                          pointerEvents: 'none'
                        }}>
                          ▼
                        </span>
                      </div>
                      
                      {showClientSuggestions && (
                        <ul className="autocomplete-list">
                          {clients.filter(c => c.name.toLowerCase().includes(clientSearchText.toLowerCase())).map(c => (
                            <li 
                              key={c.id} 
                              className="autocomplete-item"
                              onClick={() => {
                                setClientSearchText(c.name);
                                setNewInvoiceForm(prev => ({
                                  ...prev,
                                  selectedClientId: c.id,
                                  clientName: c.name,
                                  clientPhone: c.phone,
                                  clientEmail: c.email
                                }));
                                setShowClientSuggestions(false);
                              }}
                            >
                              {c.name} ({c.email})
                            </li>
                          ))}
                          {clients.filter(c => c.name.toLowerCase().includes(clientSearchText.toLowerCase())).length === 0 && (
                            <li className="autocomplete-item" style={{ color: 'var(--text-muted)', cursor: 'default' }}>
                              No matches. Type to create new client profile.
                            </li>
                          )}
                        </ul>
                      )}
                    </div>

                    {!newInvoiceForm.selectedClientId && (
                      <div className="form-row" style={{ marginTop: '12px' }}>
                        <div className="form-group">
                          <label>Client Phone (New Profile)</label>
                          <input 
                            type="text"
                            className="input-control"
                            placeholder="e.g. 0400 000 000"
                            value={newInvoiceForm.clientPhone}
                            onChange={(e) => setNewInvoiceForm(prev => ({ ...prev, clientPhone: e.target.value }))}
                          />
                        </div>
                        <div className="form-group">
                          <label>Client Email (New Profile)</label>
                          <input 
                            type="email"
                            className="input-control"
                            placeholder="e.g. school@edu.vic.gov.au"
                            value={newInvoiceForm.clientEmail}
                            onChange={(e) => setNewInvoiceForm(prev => ({ ...prev, clientEmail: e.target.value }))}
                          />
                        </div>
                      </div>
                    )}

                    <h4 className="text-gold" style={{ fontFamily: 'var(--font-serif)', marginTop: '24px', marginBottom: '14px', borderBottom: '1px solid var(--border-subtle)', paddingBottom: '6px' }}>2. Line items</h4>
                    
                    <div className="table-container" style={{ border: 'none', background: 'transparent' }}>
                      <table className="custom-table">
                        <thead>
                          <tr>
                            <th style={{ width: '120px' }}>Type</th>
                            <th>Item Details</th>
                            <th style={{ width: '80px' }}>Qty</th>
                            <th style={{ width: '120px' }}>Unit Price ($)</th>
                            <th style={{ width: '100px' }}>Total</th>
                            <th style={{ width: '50px' }}></th>
                          </tr>
                        </thead>
                        <tbody>
                          {newInvoiceForm.lineItems.map((item, index) => (
                            <tr key={index}>
                              <td>
                                <select 
                                  className="input-control"
                                  value={item.type}
                                  onChange={(e) => {
                                    const type = e.target.value;
                                    updateLineItem(index, { type, description: '', refId: '', unitPrice: 0.00 });
                                  }}
                                >
                                  <option value="custom">Custom</option>
                                  <option value="product">Product</option>
                                  <option value="service">Service</option>
                                  <option value="repair">Repair</option>
                                </select>
                              </td>
                              <td>
                                {item.type === 'custom' && (
                                  <input 
                                    type="text" 
                                    className="input-control"
                                    placeholder="Enter description..."
                                    value={item.description}
                                    onChange={(e) => updateLineItem(index, { description: e.target.value })}
                                    required
                                  />
                                )}
                                {item.type === 'product' && (
                                  <select
                                    className="input-control"
                                    value={item.refId}
                                    onChange={(e) => {
                                      const pId = e.target.value;
                                      const p = inventory.find(prod => prod.id === pId);
                                      if (p) {
                                        updateLineItem(index, {
                                          refId: pId,
                                          description: `Product: ${p.name} (SKU: ${p.sku})`,
                                          unitPrice: p.price
                                        });
                                      }
                                    }}
                                    required
                                  >
                                    <option value="">-- Select Product --</option>
                                    {inventory.map(p => (
                                      <option key={p.id} value={p.id}>
                                        {p.name} (Stock: {p.stock}) - ${p.price.toFixed(2)}
                                      </option>
                                    ))}
                                  </select>
                                )}
                                {item.type === 'service' && (
                                  <select
                                    className="input-control"
                                    value={item.refId}
                                    onChange={(e) => {
                                      const sId = e.target.value;
                                      const s = SERVICES_LIBRARY.find(srv => srv.id === sId);
                                      if (s) {
                                        updateLineItem(index, {
                                          refId: sId,
                                          description: `Service: ${s.name}`,
                                          unitPrice: s.price
                                        });
                                      }
                                    }}
                                    required
                                  >
                                    <option value="">-- Select Service --</option>
                                    {SERVICES_LIBRARY.map(s => (
                                      <option key={s.id} value={s.id}>
                                        {s.name} - ${s.price.toFixed(2)}
                                      </option>
                                    ))}
                                  </select>
                                )}
                                {item.type === 'repair' && (
                                  <select
                                    className="input-control"
                                    value={item.refId}
                                    onChange={(e) => {
                                      const rId = e.target.value;
                                      const r = repairs.find(rep => rep.id === rId);
                                      if (r) {
                                        updateLineItem(index, {
                                          refId: rId,
                                          description: `Repair Job ${r.id}: ${r.instrument.make} ${r.instrument.model} (${r.instrument.serialNumber})`,
                                          unitPrice: r.estimatedCost
                                        });
                                      }
                                    }}
                                    required
                                  >
                                    <option value="">-- Select Active Repair --</option>
                                    {repairs.filter(r => !r.invoiceId).map(r => (
                                      <option key={r.id} value={r.id}>
                                        {r.id}: {r.client.name} - {r.instrument.make} {r.instrument.model} (${r.estimatedCost.toFixed(2)})
                                      </option>
                                    ))}
                                  </select>
                                )}
                              </td>
                              <td>
                                <input 
                                  type="number" 
                                  className="input-control"
                                  min="1"
                                  value={item.qty}
                                  onChange={(e) => updateLineItem(index, { qty: parseInt(e.target.value) || 1 })}
                                  required
                                />
                              </td>
                              <td>
                                <input 
                                  type="number" 
                                  step="0.01"
                                  className="input-control"
                                  value={item.unitPrice}
                                  onChange={(e) => updateLineItem(index, { unitPrice: parseFloat(e.target.value) || 0.00 })}
                                  required
                                />
                              </td>
                              <td style={{ verticalAlign: 'middle', fontWeight: 600 }}>
                                ${((parseInt(item.qty) || 0) * (parseFloat(item.unitPrice) || 0)).toFixed(2)}
                              </td>
                              <td>
                                <button 
                                  type="button" 
                                  className="btn btn-secondary" 
                                  style={{ padding: '6px', color: '#ef4444', borderColor: 'rgba(239,68,68,0.2)' }}
                                  onClick={() => deleteLineItem(index)}
                                  disabled={newInvoiceForm.lineItems.length <= 1}
                                >
                                  <Icon name="trash" size={14} />
                                </button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>

                    <button 
                      type="button" 
                      className="btn btn-secondary" 
                      style={{ marginTop: '12px' }}
                      onClick={addLineItem}
                    >
                      <span style={{ marginRight: '6px' }}><Icon name="plus" size={12} /></span> Add Line Item
                    </button>

                    <div style={{ marginTop: '24px', borderTop: '1px solid var(--border-subtle)', paddingTop: '16px', display: 'flex', justifyContent: 'flex-end' }}>
                      <div style={{ width: '250px', textAlign: 'right', lineLines: 1.5 }}>
                        <div style={{ fontSize: '13px', color: 'var(--text-secondary)' }}>
                          Subtotal (ex GST): <strong style={{ color: 'var(--text-primary)' }}>${(parseFloat(calcTotal) - parseFloat(calcTax)).toFixed(2)}</strong>
                        </div>
                        <div style={{ fontSize: '13px', color: 'var(--text-secondary)', marginTop: '4px' }}>
                          GST (10% Included): <strong style={{ color: 'var(--text-primary)' }}>${calcTax}</strong>
                        </div>
                        <div style={{ fontSize: '16px', fontWeight: 'bold', color: 'var(--accent-gold)', marginTop: '8px', borderTop: '1px solid var(--border-subtle)', paddingTop: '8px' }}>
                          Total (inc GST): ${calcTotal}
                        </div>
                      </div>
                    </div>

                  </div>
                  <div className="modal-footer">
                    <button type="button" className="btn btn-secondary" onClick={() => setIsCreateModalOpen(false)}>Cancel</button>
                    <button type="submit" className="btn btn-primary">Generate Invoice</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* INVOICE PRINT PREVIEW MODAL */}
          {previewInvoice && (

                      <p style={{ fontSize: '12px', color: '#6b7280', marginTop: '4px' }}>
                        {activeCompany} Workshop Division<br />
                        ABN: 45 998 112 004 | info@instruworks.com.au
                      </p>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <h1 style={{ fontSize: '24px', fontWeight: 'bold', textTransform: 'uppercase', color: '#374151', margin: 0 }}>TAX INVOICE</h1>
                      <p style={{ fontSize: '13px', color: '#6b7280', marginTop: '4px' }}>
                        <strong>Invoice #:</strong> {previewInvoice.id}<br />
                        <strong>Date:</strong> {new Date().toLocaleDateString()}<br />

                        {previewInvoice.schoolPo && (

                  <div style={{ borderTop: '2px solid #374151', padding: '16px 0', marginBottom: '24px' }}>
                    <span style={{ fontSize: '10px', fontWeight: 'bold', color: '#9ca3af', textTransform: 'uppercase', display: 'block' }}>BILLED TO</span>
                    <strong style={{ fontSize: '15px', color: '#111827' }}>{previewInvoice.client.name}</strong>
