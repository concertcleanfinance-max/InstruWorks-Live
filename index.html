                          className="input-control" 
                          placeholder="e.g. PO-99210"
                          value={intakeForm.schoolPo || ''}
                          onChange={(e) => setIntakeForm({...intakeForm, schoolPo: e.target.value})}
                        />
                      </div>
                      <div className="form-group">
                        <label>School Instrument # (Optional)</label>
                        <input 
                          type="text" 
                          className="input-control" 
                          placeholder="e.g. SCH-TRUMPET-04"
                          value={intakeForm.schoolInstrumentNumber || ''}
                          onChange={(e) => setIntakeForm({...intakeForm, schoolInstrumentNumber: e.target.value})}
                        />
                      </div>
                    </div>

                    {selectedType !== 'Other' && selectedMake === 'Other' && (
                      <div className="form-row">
                        <div className="form-group">
                          <label>Enter Custom Brand (Make)</label>
                          <input 
                            type="text" 
                            required
                            className="input-control" 
                            placeholder="e.g. Buescher"
                            value={customMake}
                            onChange={(e) => setCustomMake(e.target.value)}
                          />
                        </div>
                        <div className="form-group">
                          <label>Enter Custom Model</label>
                          <input 
                            type="text" 
                            required
                            className="input-control" 
                            placeholder="e.g. Aristocrat"
                            value={customModel}
                            onChange={(e) => setCustomModel(e.target.value)}
                          />
                        </div>
                      </div>
                    )}

                    {selectedType !== 'Other' && selectedMake !== 'Other' && selectedModel === 'Other' && (
                      <div className="form-group">
                        <label>Enter Custom Model</label>
                        <input 
                          type="text" 
                          required
                          className="input-control" 
                          placeholder="e.g. Custom Prototype"
                          value={customModel}
                          onChange={(e) => setCustomModel(e.target.value)}
                        />
                      </div>
                    )}

                    <div className="form-group">
                      <label>Reported Issues (One per line)</label>
                      <textarea 
                        rows="3" 
                        required 
                        className="input-control" 
                        placeholder="e.g. Sticky keys&#10;Needs leak checks"
                        value={intakeForm.issues}
                        onChange={(e) => setIntakeForm({...intakeForm, issues: e.target.value})}
                      ></textarea>
                    </div>

                    <div className="form-group">
                      <label>Diagnosticnotes / Service Log Notes</label>
                      <textarea 
                        rows="2" 
                        className="input-control" 
                        placeholder="Enter initial technician notes..."
                        value={intakeForm.notes}
                        onChange={(e) => setIntakeForm({...intakeForm, notes: e.target.value})}
                      ></textarea>
                    </div>

                    <div className="form-row">
                      <div className="form-group">
                        <label>Initial Est. Labor Hours</label>
                        <input 
                          type="number" 
                          step="0.5" 
                          required 
                          className="input-control" 
                          value={intakeForm.laborHours}
                          onChange={(e) => setIntakeForm({...intakeForm, laborHours: e.target.value})}
                        />
                      </div>
                      <div className="form-group">
                        <label>Labor Rate ($/hr)</label>
                        <input 
                          type="number" 
                          required 
                          className="input-control" 
                          value={intakeForm.laborRate}
                          onChange={(e) => setIntakeForm({...intakeForm, laborRate: e.target.value})}
                        />
                      </div>
                      <div className="form-group">
                        <label>Assign Technician</label>
                        <select 
                          className="input-control"
                          value={intakeForm.assignedTech || 'Unassigned'}
                          onChange={(e) => setIntakeForm({...intakeForm, assignedTech: e.target.value})}
                        >
                          <option value="Unassigned">Unassigned</option>
                          {users.map(u => (
                            <option key={u.name} value={u.name}>{u.name}</option>
                          ))}
                        </select>
                      </div>
                    </div>
                  </div>
                  <div className="modal-footer">
                    <button type="button" className="btn btn-secondary" onClick={() => setIsIntakeOpen(false)}>Cancel</button>
                    <button type="submit" className="btn btn-primary">Save & Register Instrument</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* EDIT WORK ORDER MODAL */}
          {selectedRepair && (
            <div className="modal-overlay">
              <div className="modal-content" style={{ maxWidth: '750px' }}>
                <div className="modal-header">
                  <div>
                    <span className="text-muted" style={{ fontSize: '11px', display: 'block' }}>
                      REPAIR WORK ORDER (Assigned to: {selectedRepair.assignedTech || 'Unassigned'})
                    </span>
                    <h3 style={{ display: 'inline-flex', alignItems: 'center', gap: '8px' }}>
                      {selectedRepair.id}: {selectedRepair.instrument?.make || ''} {selectedRepair.instrument?.model || ''} 
                      <span className={`status-badge ${selectedRepair.status === 'Ready for Pickup' ? 'status-ready' : 'status-progress'}`} style={{ fontSize: '11px' }}>
                        {selectedRepair.status}
                      </span>
                    </h3>
                  </div>
                  <button className="close-btn" onClick={handleCloseDetails}>&times;</button>
                </div>

                <div className="modal-tabs">
                  <button 
                    type="button"
                    className={`modal-tab ${activeModalTab === 'details' ? 'active' : ''}`}
                    onClick={() => setActiveModalTab('details')}
                  >
                    Intake & Status
                  </button>
                  <button 
                    type="button"
                    className={`modal-tab ${activeModalTab === 'parts' ? 'active' : ''}`}
                    onClick={() => setActiveModalTab('parts')}
                  >
                    Parts & Labor
                  </button>
                  <button 
                    type="button"
                    className={`modal-tab ${activeModalTab === 'history' ? 'active' : ''}`}
                    onClick={() => setActiveModalTab('history')}
                  >
                    Service Timeline
                  </button>
                </div>

                <div className="modal-body">
                  {activeModalTab === 'details' && (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                      <div className="grid-2">
                        <div className="card" style={{ padding: '16px', backgroundColor: 'var(--bg-tertiary)' }}>
                          <h4 className="text-gold" style={{ marginBottom: '8px', fontSize: '14px' }}>Client Info</h4>
                          <p><strong>Name:</strong> {selectedRepair.client?.name || 'Unknown'}</p>
                          <p><strong>Phone:</strong> {selectedRepair.client?.phone || '-'}</p>
                          <p><strong>Email:</strong> {selectedRepair.client?.email || '-'}</p>
                        </div>
                        <div className="card" style={{ padding: '16px', backgroundColor: 'var(--bg-tertiary)' }}>
                          <h4 className="text-gold" style={{ marginBottom: '8px', fontSize: '14px' }}>Instrument Info</h4>
                          <p><strong>Category:</strong> {selectedRepair.instrument?.category || 'Unknown'}</p>
                          <p><strong>Type:</strong> {selectedRepair.instrument?.type || 'Unknown'}</p>
                          <p><strong>Make/Model:</strong> {selectedRepair.instrument?.make || ''} - {selectedRepair.instrument?.model || ''}</p>
                          <p><strong>Serial:</strong> {selectedRepair.instrument?.serialNumber || '-'}</p>
                          <p><strong>School Instrument #:</strong> {selectedRepair.instrument?.schoolInstrumentNumber || 'None'}</p>
                          <p><strong>School PO#:</strong> {selectedRepair.schoolPo || 'None'}</p>
                        </div>
                      </div>

                      <div className="card" style={{ padding: '16px', backgroundColor: 'var(--bg-tertiary)' }}>
                        <h4 className="text-gold" style={{ marginBottom: '8px', fontSize: '14px' }}>Reported Client Issues</h4>
                        <ul style={{ paddingLeft: '20px', fontSize: '13px' }}>
                          {(selectedRepair.issues || []).map((issue, idx) => (
                            <li key={idx} style={{ marginBottom: '4px' }}>{issue}</li>
                          ))}
                        </ul>
                      </div>

                      <div className="form-group">
                        <label>Technician Service Notes</label>
                        <textarea 
                          className="input-control" 
                          rows="3" 
                          placeholder="Add diagnostic outcome, repair steps, leak reports..."
                          value={editNotes}
                          onChange={(e) => setEditNotes(e.target.value)}
                        ></textarea>
                      </div>

                      <div className="form-row">
                        <div className="form-group">
                          <label>Update Status</label>
                          <select 
                            className="input-control"
                            value={editStatus}
                            onChange={(e) => setEditStatus(e.target.value)}
                          >
                            {statusColumns.map(col => (
                              <option key={col.key} value={col.key}>{col.label}</option>
                            ))}
                          </select>
                        </div>
                        <div className="form-group">
                          <label>Actual Labor Hours</label>
                          <input 
                            type="number" 
                            step="0.25" 
                            className="input-control" 
                            value={editLaborHours}
                            onChange={(e) => setEditLaborHours(e.target.value)}
                          />
                        </div>
                        <div className="form-group">
                          <label>Assigned Technician</label>
                          <select 
                            className="input-control"
                            value={editAssignedTech}
                            onChange={(e) => setEditAssignedTech(e.target.value)}
                          >
                            <option value="Unassigned">Unassigned</option>
                            {users.map(u => (
                              <option key={u.name} value={u.name}>{u.name} ({u.role})</option>
                            ))}
                          </select>
                        </div>
                      </div>

                      <div className="form-row" style={{ marginTop: '12px', gap: '12px' }}>
                        <div className="form-group">
                          <label>School PO#</label>
                          <input 
                            type="text" 
                            className="input-control" 
                            value={editSchoolPo || ''}
                            onChange={(e) => setEditSchoolPo(e.target.value)}
                            placeholder="Enter PO number if applicable..."
                          />
                        </div>
                        <div className="form-group">
                          <label>School Instrument #</label>
                          <input 
                            type="text" 
                            className="input-control" 
                            value={editSchoolInstrumentNumber || ''}
                            onChange={(e) => setEditSchoolInstrumentNumber(e.target.value)}
                            placeholder="Enter School Instrument # if applicable..."
                          />
                        </div>
                      </div>

                      <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
                        <button type="button" className="btn btn-secondary" onClick={handleSaveDetailsUpdates}>
                          Save Details & Assignment
                        </button>
                      </div>
                    </div>
                  )}

                  {activeModalTab === 'history' && (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                      <h4 className="text-gold" style={{ fontSize: '14px', marginBottom: '8px' }}>Instrument Service Timeline</h4>
                      
                      {(!selectedRepair.history || selectedRepair.history.length === 0) ? (
                        <div className="card" style={{ textAlign: 'center', padding: '30px', color: 'var(--text-secondary)' }}>
                          No status updates or services have been logged yet for this work order.
                        </div>
                      ) : (
                        <div className="timeline-container" style={{ maxHeight: '400px', overflowY: 'auto', paddingRight: '8px' }}>
                          {(selectedRepair.history || []).map((h, idx) => {
                            // Determine color-coding and icon
                            let color = 'var(--accent-gold)';
                            let iconText = '📋';
                            if (h.text.includes('registered') || h.text.includes('Intake')) {
                              color = 'var(--accent-gold)';
                              iconText = '✨';
                            } else if (h.text.includes('Status changed') || h.text.includes('status changed')) {
                              color = '#60a5fa';
                              iconText = '⚙️';
                            } else if (h.text.includes('Added part')) {
                              color = '#f87171';
                              iconText = '📦';
                            } else if (h.text.includes('Removed part')) {
                              color = '#9ca3af';
                              iconText = '🗑️';
                            } else if (h.text.includes('Logged flat-rate service')) {
                              color = '#34d399';
                              iconText = '🛠️';
                            } else if (h.text.includes('Removed flat-rate service')) {
                              color = '#9ca3af';
                              iconText = '🗑️';
                            } else if (h.text.includes('notes updated') || h.text.includes('Assignment changed')) {
                              color = '#fbbf24';
                              iconText = '📝';
                            }

                            return (
                              <div className="timeline-item" key={idx}>
                                <div className="timeline-dot" style={{ backgroundColor: color, boxShadow: `0 0 6px ${color}` }}>
                                  <span style={{ fontSize: '9px' }}></span>
                                </div>
                                <div className="timeline-content">
                                  <div className="timeline-meta">
                                    <span>{new Date(h.timestamp).toLocaleString('en-AU')}</span>
                                    <span>Technician: <strong>{h.user || 'System'}</strong></span>
                                  </div>
                                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '13px' }}>
                                    <span style={{ fontSize: '14px' }}>{iconText}</span>
                                    <span>{h.text}</span>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  )}

                  {activeModalTab === 'parts' && (
                    <div>
                      {/* Services Logged */}
                      <h4 className="text-gold" style={{ marginBottom: '12px' }}>Services Logged (Flat Rate)</h4>
                      {selectedRepair.servicesUsed && selectedRepair.servicesUsed.length > 0 ? (
                        <div className="table-container" style={{ marginBottom: '20px' }}>
                          <table className="custom-table">
                            <thead>
                              <tr>
                                <th>Service Description</th>
                                <th>Cost (inc GST)</th>
                                <th>Action</th>
                              </tr>
                            </thead>
                            <tbody>
                              {selectedRepair.servicesUsed.map((srv, idx) => (
                                <tr key={idx}>
                                  <td style={{ fontWeight: '600' }}>{srv.name}</td>
                                  <td>${srv.price.toFixed(2)}</td>
                                  <td>
                                    <button 
                                      type="button" 
                                      className="btn btn-danger" 
                                      style={{ padding: '4px 8px' }}
                                      onClick={() => handleRemoveService(idx)}
                                    >
                                      <Icon name="trash" size={12} />
                                    </button>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      ) : (
                        <div className="card" style={{ textAlign: 'center', padding: '24px', color: 'var(--text-secondary)', marginBottom: '20px' }}>
                          No flat-rate services logged.
                        </div>
                      )}

                      {/* Log Service Flat-Rate Form */}
                      <div className="card" style={{ padding: '16px', backgroundColor: 'var(--bg-tertiary)', border: '1px dashed var(--border-gold)', marginBottom: '24px' }}>
                        <h4 style={{ fontSize: '14px', marginBottom: '12px' }}>Log Flat-Rate Service</h4>
                        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: '12px', alignItems: 'end' }}>
                          <div className="form-group" style={{ marginBottom: 0 }}>
                            <label>Service Type</label>
                            <select 
                              className="input-control"
                              value={selectedServiceToAdd}
                              onChange={(e) => {
                                setSelectedServiceToAdd(e.target.value);
                                if (e.target.value !== 'Custom') {
                                  const srv = SERVICES_LIBRARY.find(s => s.id === e.target.value);
                                  setCustomServiceName('');
                                  setCustomServicePrice(srv ? srv.price : 0);
                                } else {
                                  setCustomServiceName('');
                                  setCustomServicePrice(0);
                                }
                              }}
                            >
                              <option value="">-- Select Service --</option>
                              {SERVICES_LIBRARY.map(s => (
                                <option key={s.id} value={s.id}>{s.name} (${s.price.toFixed(2)})</option>
                              ))}
                              <option value="Custom">-- Custom Service --</option>
                            </select>
                          </div>

                          {selectedServiceToAdd === 'Custom' ? (
                            <>
                              <div className="form-group" style={{ marginBottom: 0 }}>
                                <label>Custom Service Name</label>
                                <input 
                                  type="text" 
                                  className="input-control" 
                                  placeholder="e.g. Slide alignment"
                                  value={customServiceName}
                                  onChange={(e) => setCustomServiceName(e.target.value)}
                                />
                              </div>
                              <div className="form-group" style={{ marginBottom: 0 }}>
                                <label>Price ($ inc GST)</label>
                                <input 
                                  type="number" 
                                  className="input-control" 
                                  value={customServicePrice}
                                  onChange={(e) => setCustomServicePrice(parseFloat(e.target.value) || 0)}
                                />
                              </div>
                            </>
                          ) : (
                            <div className="form-group" style={{ marginBottom: 0, gridColumn: 'span 2' }}>
                              <label>Logged Service Details</label>
                              <div style={{ padding: '12px', backgroundColor: 'var(--bg-secondary)', borderRadius: 'var(--radius-md)', border: '1px solid var(--border-subtle)', fontSize: '13px' }}>
                                {selectedServiceToAdd ? `${SERVICES_LIBRARY.find(s => s.id === selectedServiceToAdd)?.name} - $${SERVICES_LIBRARY.find(s => s.id === selectedServiceToAdd)?.price.toFixed(2)}` : 'No service selected'}
                              </div>
                            </div>
                          )}

                          <button type="button" className="btn btn-primary" onClick={handleAddService}>
                            Log Service
                          </button>
                        </div>
                      </div>

                      {/* Logged Inventory Parts */}
                      <h4 className="text-gold" style={{ marginBottom: '12px' }}>Inventory Parts Logged</h4>
                      
                      {selectedRepair.partsUsed && selectedRepair.partsUsed.length > 0 ? (
                        <div className="table-container" style={{ marginBottom: '20px' }}>
                          <table className="custom-table">
                            <thead>
                              <tr>
                                <th>SKU</th>
                                <th>Part Name</th>
                                <th>Price</th>
                                <th>Qty</th>
                                <th>Total</th>
                                <th>Action</th>
                              </tr>
                            </thead>
                            <tbody>
                              {selectedRepair.partsUsed.map(part => (
                                <tr key={part.id}>
                                  <td><code>{part.sku}</code></td>
                                  <td>{part.name}</td>
                                  <td>${part.price.toFixed(2)}</td>
                                  <td>{part.qty}</td>
                                  <td>${(part.price * part.qty).toFixed(2)}</td>
                                  <td>
                                    <button 
                                      type="button" 
                                      className="btn btn-danger" 
                                      style={{ padding: '4px 8px' }}
                                      onClick={() => handleRemovePart(part.id, part.qty)}
                                    >
                                      <Icon name="trash" size={12} />
                                    </button>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      ) : (
                        <div className="card" style={{ textAlign: 'center', padding: '24px', color: 'var(--text-secondary)', marginBottom: '20px' }}>
                          No parts logged.
                        </div>
                      )}

                      <div className="card" style={{ padding: '16px', backgroundColor: 'var(--bg-tertiary)', border: '1px dashed var(--border-gold)' }}>
                        <h4 style={{ fontSize: '14px', marginBottom: '12px' }}>Add Part From Stock</h4>
                        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: '12px', alignItems: 'end' }}>
                          <div className="form-group autocomplete-wrapper" style={{ marginBottom: 0 }}>
                            <label>Search Stock Product (SKU / Name)</label>
                            <input 
                              type="text" 
                              className="input-control" 
                              placeholder="Type to search parts..."
                              value={partSearchText}
                              onChange={(e) => {
                                setPartSearchText(e.target.value);
                                setShowPartSuggestions(true);
                                if (!e.target.value.trim()) {
                                  setSelectedProductToAdd('');
                                }
                              }}
                              onFocus={() => setShowPartSuggestions(true)}
                              onBlur={() => setTimeout(() => setShowPartSuggestions(false), 200)}
                            />
                            {showPartSuggestions && suggestedParts.length > 0 && (
                              <ul className="autocomplete-list" style={{ top: 'auto', bottom: '100%', marginBottom: '4px' }}>
                                {suggestedParts.map(prod => (
                                  <li 
                                    key={prod.id} 
                                    className="autocomplete-item"
                                    style={{ opacity: prod.stock <= 0 ? 0.5 : 1, pointerEvents: prod.stock <= 0 ? 'none' : 'auto' }}
                                    onClick={() => {
                                      setSelectedProductToAdd(prod.id);
                                      setPartSearchText(`${prod.name} (SKU: ${prod.sku})`);
                                      setShowPartSuggestions(false);
                                    }}
                                  >
                                    {prod.name} (SKU: {prod.sku}) - ${prod.price.toFixed(2)} | Stock: {prod.stock} {prod.stock <= 0 ? ' (Out of Stock)' : ''}
                                  </li>
                                ))}
                              </ul>
                            )}
                          </div>

                          <div className="form-group" style={{ marginBottom: 0 }}>
                            <label>Quantity</label>
                            <input 
                              type="number" 
                              min="1" 
                              className="input-control" 
                              value={productAddQty}
                              onChange={(e) => setProductAddQty(parseInt(e.target.value) || 1)}
                            />
                          </div>

                          <button type="button" className="btn btn-primary" onClick={handleAddPart}>
                            Log Part
                          </button>
                        </div>
                      </div>

                      <div className="card" style={{ marginTop: '20px', padding: '16px', backgroundColor: 'var(--bg-tertiary)' }}>
                        <div className="flex-space" style={{ fontSize: '14px' }}>
                          <span style={{ color: 'var(--text-muted)' }}>Labor (Internal Review Only): {selectedRepair.laborHours || 0} hrs</span>
                          <span style={{ color: 'var(--text-muted)' }}>Not billed to customer</span>
                        </div>
                        <div className="flex-space" style={{ fontSize: '14px', marginTop: '6px' }}>
                          <span>Parts Cost:</span>
                          <strong>Subtotal Parts: ${(selectedRepair.partsUsed?.reduce((sum, p) => sum + (p.price * p.qty), 0) || 0).toFixed(2)}</strong>
                        </div>
                        <div className="flex-space" style={{ fontSize: '14px', marginTop: '6px' }}>
                          <span>Services Flat-Rate Cost:</span>
                          <strong>Subtotal Services: ${(selectedRepair.servicesUsed?.reduce((sum, s) => sum + s.price, 0) || 0).toFixed(2)}</strong>
                        </div>
                        <hr style={{ border: 0, borderBottom: '1px solid var(--border-subtle)', margin: '12px 0' }} />
                        <div className="flex-space" style={{ fontSize: '18px', fontWeight: 'bold' }}>
                          <span className="text-gold">Total Estimated Bill:</span>
                          <span className="text-gold">
                            ${getUpdatedCost(selectedRepair.laborHours || 0, selectedRepair.laborRate || 0, selectedRepair.partsUsed || [], selectedRepair.servicesUsed || []).toFixed(2)}
                          </span>
                        </div>
                      </div>

                      {/* Shop Performance & Profit Analysis (Internal Only) */}
                      <div className="card" style={{ marginTop: '16px', padding: '16px', backgroundColor: 'rgba(197, 160, 89, 0.03)', borderColor: 'var(--border-gold)' }}>
                        <h4 className="text-gold" style={{ fontSize: '14px', marginBottom: '10px' }}>Shop Performance & Profit Analysis (Internal Only)</h4>
                        {(() => {
                          const revenue = getUpdatedCost(selectedRepair.laborHours, selectedRepair.laborRate, selectedRepair.partsUsed || [], selectedRepair.servicesUsed || []);
                          const laborShopCost = (selectedRepair.laborHours || 0) * 60.00;
                          const partsShopCost = (selectedRepair.partsUsed || []).reduce((sum, p) => {
                            const cost = p.costPrice !== undefined ? p.costPrice : parseFloat((p.price * 0.6).toFixed(2));
                            return sum + (cost * p.qty);
                          }, 0);
                          const totalShopCost = laborShopCost + partsShopCost;
                          const profit = revenue - totalShopCost;
                          const margin = revenue > 0 ? (profit / revenue) * 100 : 0;
                          
                          return (
                            <div>
                              <div className="flex-space" style={{ fontSize: '13px', marginBottom: '4px' }}>
                                <span>Customer Revenue (Parts + Services):</span>
                                <span>${revenue.toFixed(2)}</span>
                              </div>
                              <div className="flex-space" style={{ fontSize: '13px', marginBottom: '4px' }}>
                                <span>Shop Labor Cost ({selectedRepair.laborHours || 0} hrs @ $60.00/hr):</span>
                                <span>-${laborShopCost.toFixed(2)}</span>
                              </div>
                              <div className="flex-space" style={{ fontSize: '13px', marginBottom: '4px' }}>
                                <span>Shop Parts Cost (Wholesale):</span>
                                <span>-${partsShopCost.toFixed(2)}</span>
                              </div>
                              <div className="flex-space" style={{ fontSize: '13px', marginBottom: '8px' }}>
                                <strong>Total Shop Cost:</strong>
                                <strong>-${totalShopCost.toFixed(2)}</strong>
                              </div>
                              <hr style={{ border: 0, borderBottom: '1px dashed var(--border-subtle)', margin: '8px 0' }} />
                              <div className="flex-space" style={{ fontSize: '15px', fontWeight: 'bold' }}>
                                <span>{selectedRepair.status === 'Received' ? 'Projected Shop Profit:' : 'Actual Shop Profit:'}</span>
                                <span style={{ color: profit >= 0 ? '#34d399' : '#f87171' }}>
                                  {profit >= 0 ? '+' : ''}${profit.toFixed(2)}
                                </span>
                              </div>
                              <div className="flex-space" style={{ fontSize: '13px', fontWeight: 'bold', marginTop: '2px' }}>
                                <span>{selectedRepair.status === 'Received' ? 'Projected Profit Margin:' : 'Actual Profit Margin:'}</span>
                                <span style={{ color: profit >= 0 ? '#34d399' : '#f87171' }}>
                                  {revenue > 0 ? `${margin.toFixed(1)}%` : '0.0% (N/A)'}
                                </span>
                              </div>
                            </div>
                          );
                        })()}
                      </div>
                    </div>
                  )}
                </div>

                <div className="modal-footer" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div>
                    {!selectedRepair.invoiceId && selectedRepair.status === 'Completed' ? (
                      <button 
                        type="button" 
                        className="btn btn-primary"
                        onClick={() => {
                          onGenerateInvoice(selectedRepair);
                          handleCloseDetails();
                        }}
                      >
                        Generate & Sync Invoice
                      </button>
                    ) : !selectedRepair.invoiceId ? (
                      <span className="text-muted" style={{ fontSize: '12px', fontStyle: 'italic' }}>
                        Invoice generation available once status is Completed.
                      </span>
                    ) : (
                      <span className="text-muted" style={{ fontSize: '12px' }}>
                        ✔ Invoiced (ID: {selectedRepair.invoiceId})
                      </span>
                    )}
                  </div>
                  <div style={{ display: 'flex', gap: '12px' }}>
                    <button 
                      type="button" 
                      className="btn btn-danger"
                      onClick={() => {
                        if (confirm(`Are you sure you want to permanently delete work order ${selectedRepair.id}?`)) {
                          onDeleteRepair(selectedRepair.id);
                          handleCloseDetails();
                        }
                      }}
                    >
                      Delete Job
                    </button>
                    <button type="button" className="btn btn-secondary" onClick={handleCloseDetails}>Close View</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }


    /* =========================================================================
       2. INVENTORY PAGE COMPONENT
       ========================================================================= */
    function InventoryPage({ inventory, setInventory, onLogSale, stockHistory, setStockHistory, activeUser }) {
      const [searchTerm, setSearchTerm] = React.useState('');
      const [categoryFilter, setCategoryFilter] = React.useState('All');
      const [supplierFilter, setSupplierFilter] = React.useState('All');
      const [isReorderReportOpen, setIsReorderReportOpen] = React.useState(false);
      
      const [isAddOpen, setIsAddOpen] = React.useState(false);
      const [editingProduct, setEditingProduct] = React.useState(null);

      const [productForm, setProductForm] = React.useState({
        sku: '',
        name: '',
        category: 'Key/Valve Oil',
        price: 10,
        costPrice: '',
        stock: 10,
        reorderPoint: 3,
        supplier: ''
      });

      const [otcProductId, setOtcProductId] = React.useState('');
      const [otcQty, setOtcQty] = React.useState(1);

      // Pagination & Autocomplete States
      const [currentPage, setCurrentPage] = React.useState(1);
      const itemsPerPage = 50;
      const [otcSearchText, setOtcSearchText] = React.useState('');
      const [showOtcSuggestions, setShowOtcSuggestions] = React.useState(false);

      // Reset page when filters change
      React.useEffect(() => {
        setCurrentPage(1);
      }, [searchTerm, categoryFilter, supplierFilter]);

      // Batch update modals & states
      const [isReceiveModalOpen, setIsReceiveModalOpen] = React.useState(false);
      const [isStockTakeModalOpen, setIsStockTakeModalOpen] = React.useState(false);
      const [isHistoryModalOpen, setIsHistoryModalOpen] = React.useState(false);
      const [historySearch, setHistorySearch] = React.useState('');
      
      const [receiveSearchText, setReceiveSearchText] = React.useState('');
      const [showReceiveSuggestions, setShowReceiveSuggestions] = React.useState(false);
      const [selectedReceiveProduct, setSelectedReceiveProduct] = React.useState(null);
      const [receiveQty, setReceiveQty] = React.useState('');

      const [stockTakeSearchText, setStockTakeSearchText] = React.useState('');
      const [showStockTakeSuggestions, setShowStockTakeSuggestions] = React.useState(false);
      const [selectedStockTakeProduct, setSelectedStockTakeProduct] = React.useState(null);
      const [stockTakeQty, setStockTakeQty] = React.useState('');

      const suggestedReceiveProducts = React.useMemo(() => {
        if (!receiveSearchText.trim()) return [];
        const lower = receiveSearchText.toLowerCase();
        return inventory.filter(p => 
          (p.sku || '').toLowerCase().includes(lower) || 
          (p.name || '').toLowerCase().includes(lower)
        ).slice(0, 10);
      }, [receiveSearchText, inventory]);

      const suggestedStockTakeProducts = React.useMemo(() => {
        if (!stockTakeSearchText.trim()) return [];
        const lower = stockTakeSearchText.toLowerCase();
        return inventory.filter(p => 
          (p.sku || '').toLowerCase().includes(lower) || 
          (p.name || '').toLowerCase().includes(lower)
        ).slice(0, 10);
      }, [stockTakeSearchText, inventory]);

      const logStockAdjustment = (product, type, prevStock, newStock) => {
        const newRecord = {
          id: `ADJ-${Date.now().toString().slice(-4)}-${Math.floor(Math.random() * 100)}`,
          timestamp: new Date().toISOString(),
          sku: product.sku,
          name: product.name,
          type, // 'Receive' or 'Stock Take'
          prevStock: parseInt(prevStock) || 0,
          newStock: parseInt(newStock) || 0,
          user: activeUser ? activeUser.name : 'System'
        };
        setStockHistory(prev => [newRecord, ...prev]);
      };

      const filteredHistory = React.useMemo(() => {
        const list = stockHistory || [];
        if (!historySearch.trim()) return list;
        const lower = historySearch.toLowerCase();
        return list.filter(r => 
          (r.sku || '').toLowerCase().includes(lower) || 
          (r.name || '').toLowerCase().includes(lower) || 
          (r.type || '').toLowerCase().includes(lower) ||
          (r.user || '').toLowerCase().includes(lower)
        );
      }, [stockHistory, historySearch]);

      const formatDate = (isoString) => {
        if (!isoString) return 'N/A';
        try {
          const d = new Date(isoString);
          if (isNaN(d.getTime())) return 'N/A';
          return d.toLocaleDateString('en-AU', { 
            day: '2-digit', 
            month: 'short', 
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
        } catch (e) {
          return 'N/A';
        }
      };

      const handleInlineReceive = (item) => {
        const qtyStr = prompt(`Receive Shipment for "${item.name}":\nHow many units are you adding?`, "1");
        if (qtyStr === null) return;
        const qty = parseInt(qtyStr, 10);
        if (isNaN(qty) || qty <= 0) {
          alert("Invalid quantity entered. Please enter a positive integer.");
          return;
        }
        const prev = item.stock || 0;
        const next = prev + qty;
        setInventory(prevInv => prevInv.map(p => p.id === item.id ? { ...p, stock: next } : p));
        logStockAdjustment(item, 'Receive', prev, next);
      };

      const handleInlineStockTake = (item) => {
        const qtyStr = prompt(`Stock Take for "${item.name}":\nEnter the actual physical count:`, (item.stock || 0).toString());
        if (qtyStr === null) return;
        const qty = parseInt(qtyStr, 10);
        if (isNaN(qty) || qty < 0) {
          alert("Invalid count entered. Please enter a non-negative integer.");
          return;
        }
        const prev = item.stock || 0;
        setInventory(prevInv => prevInv.map(p => p.id === item.id ? { ...p, stock: qty } : p));
        logStockAdjustment(item, 'Stock Take', prev, qty);
      };

      const handleSaveReceiveModal = () => {
        if (!selectedReceiveProduct) {
          alert("Please select a product first.");
          return;
        }
        const qty = parseInt(receiveQty, 10);
        if (isNaN(qty) || qty <= 0) {
          alert("Please enter a valid positive quantity to receive.");
          return;
        }
        const prev = selectedReceiveProduct.stock || 0;
        const next = prev + qty;
        setInventory(prevInv => prevInv.map(p => p.id === selectedReceiveProduct.id ? { ...p, stock: next } : p));
        logStockAdjustment(selectedReceiveProduct, 'Receive', prev, next);
        alert(`Successfully received ${qty} units of ${selectedReceiveProduct.name}.`);
        setIsReceiveModalOpen(false);
        setReceiveSearchText('');
        setSelectedReceiveProduct(null);
        setReceiveQty('');
      };

      const handleSaveStockTakeModal = () => {
        if (!selectedStockTakeProduct) {
          alert("Please select a product first.");
          return;
        }
        const qty = parseInt(stockTakeQty, 10);
        if (isNaN(qty) || qty < 0) {
          alert("Please enter a valid non-negative count.");
          return;
        }
        const prev = selectedStockTakeProduct.stock || 0;
        setInventory(prevInv => prevInv.map(p => p.id === selectedStockTakeProduct.id ? { ...p, stock: qty } : p));
        logStockAdjustment(selectedStockTakeProduct, 'Stock Take', prev, qty);
        alert(`Successfully updated stock for ${selectedStockTakeProduct.name} to ${qty} units.`);
        setIsStockTakeModalOpen(false);
        setStockTakeSearchText('');
        setSelectedStockTakeProduct(null);
        setStockTakeQty('');
      };

      const suggestedOtcProducts = React.useMemo(() => {
        if (!otcSearchText.trim()) return [];
        const lower = otcSearchText.toLowerCase();
        return inventory.filter(p => 
          p.sku.toLowerCase().includes(lower) || 
          p.name.toLowerCase().includes(lower)
        ).slice(0, 10);
      }, [otcSearchText, inventory]);

      const lowStockItems = inventory.filter(item => (item.stock || 0) <= (item.reorderPoint || 0));

      const uniqueSuppliers = React.useMemo(() => {
        const sups = new Set();
        inventory.forEach(item => {
          sups.add(item.supplier || 'Generic');
        });
        return Array.from(sups).sort();
      }, [inventory]);

      const filteredInventory = inventory.filter(item => {
        const searchLower = (searchTerm || '').toLowerCase();
        const matchesSearch = 
          (item.sku || '').toLowerCase().includes(searchLower) ||
          (item.name || '').toLowerCase().includes(searchLower) ||
          (item.category || '').toLowerCase().includes(searchLower) ||
          (item.supplier && (item.supplier || '').toLowerCase().includes(searchLower));

        const matchesCategory = categoryFilter === 'All' || item.category === categoryFilter;
        const matchesSupplier = supplierFilter === 'All' || (item.supplier || 'Generic') === supplierFilter;
        return matchesSearch && matchesCategory && matchesSupplier;
      });

      // Dashboard Metrics calculations (based on filtered inventory so it updates dynamically)
      const totalUnique = filteredInventory.length;
      const totalStock = filteredInventory.reduce((sum, item) => sum + (item.stock || 0), 0);
      const lowStockCount = filteredInventory.filter(item => (item.stock || 0) <= (item.reorderPoint || 0)).length;
      const totalValue = filteredInventory.reduce((sum, item) => sum + ((item.price || 0) * (item.stock || 0)), 0);

      const handleAddSubmit = (e) => {
        e.preventDefault();
        const retailPrice = parseFloat(productForm.price) || 0;
        const finalCostPrice = productForm.costPrice !== '' ? (parseFloat(productForm.costPrice) || 0) : parseFloat((retailPrice * 0.6).toFixed(2));

        if (editingProduct) {
          const nextStock = parseInt(productForm.stock) || 0;
          if ((editingProduct.stock || 0) !== nextStock) {
            logStockAdjustment(editingProduct, 'Stock Take (Edit Form)', editingProduct.stock || 0, nextStock);
          }
          setInventory(prev => prev.map(p => p.id === editingProduct.id ? {
            ...p,
            sku: productForm.sku,
            name: productForm.name,
            category: productForm.category,
            price: retailPrice,
            costPrice: finalCostPrice,
            stock: nextStock,
            reorderPoint: parseInt(productForm.reorderPoint) || 0,
            supplier: productForm.supplier || 'Generic'
          } : p));
          setEditingProduct(null);
        } else {
          const newStock = parseInt(productForm.stock) || 0;
          const newProduct = {
            id: `PROD-${Date.now().toString().slice(-4)}`,
            sku: productForm.sku,
            name: productForm.name,
            category: productForm.category,
            price: retailPrice,
            costPrice: finalCostPrice,
            stock: newStock,
            reorderPoint: parseInt(productForm.reorderPoint) || 0,
            supplier: productForm.supplier || 'Generic'
          };
          setInventory(prev => [newProduct, ...prev]);
          if (newStock > 0) {
            logStockAdjustment(newProduct, 'Receive (New Product)', 0, newStock);
          }
        }
        setIsAddOpen(false);
        resetForm();
      };

      const handleEditClick = (product) => {
        setEditingProduct(product);
        setProductForm({
          sku: product.sku,
          name: product.name,
          category: product.category,
          price: product.price,
          costPrice: product.costPrice !== undefined ? product.costPrice : '',
          stock: product.stock,
          reorderPoint: product.reorderPoint,
          supplier: product.supplier || ''
        });
        setIsAddOpen(true);
      };

      const handleDeleteClick = (productId) => {
        if (confirm('Are you sure you want to delete this product from the inventory?')) {
          setInventory(prev => prev.filter(p => p.id !== productId));
        }
      };

      const handleOtcSubmit = (e) => {
        e.preventDefault();
        if (!otcProductId) return;
        const product = inventory.find(p => p.id === otcProductId);
        if (!product) return;

        if (product.stock < otcQty) {
          alert(`Insufficient stock! Only ${product.stock} left.`);
          return;
        }

        onLogSale(product, otcQty);
        setOtcProductId('');
        setOtcSearchText('');
        setOtcQty(1);
      };

      const resetForm = () => {
        setProductForm({
          sku: '',
          name: '',
          category: 'Key/Valve Oil',
          price: 10,
          costPrice: '',
          stock: 10,
          reorderPoint: 3,
          supplier: ''
        });
        setEditingProduct(null);
      };

      const uniqueCategories = ['Key/Valve Oil', 'Reeds', 'Mouthpieces', 'Parts', 'Cases', 'Accessories'];

      const totalPages = Math.ceil(filteredInventory.length / itemsPerPage);
      const paginatedItems = filteredInventory.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

      return (
        <div>
          {/* Inventory Dashboard Summary Cards */}
          <div className="dashboard-stats" style={{ marginBottom: '20px' }}>
            <div className="stat-card">
              <div className="stat-icon" style={{ color: 'var(--accent-gold)' }}><Icon name="package" /></div>
              <div>
                <div className="stat-label">Unique Products</div>
                <div className="stat-number">{totalUnique}</div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ color: '#60a5fa' }}><Icon name="database" /></div>
              <div>
                <div className="stat-label">Total Stock Volume</div>
                <div className="stat-number">{totalStock} units</div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ color: lowStockCount > 0 ? '#f87171' : '#34d399' }}><Icon name="alertcircle" /></div>
              <div>
                <div className="stat-label">Low Stock Items</div>
                <div className="stat-number" style={{ color: lowStockCount > 0 ? '#f87171' : 'inherit' }}>{lowStockCount}</div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ color: '#34d399' }}><Icon name="filetext" /></div>
              <div>
                <div className="stat-label">Inventory Value</div>
                <div className="stat-number">${totalValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
              </div>
            </div>
          </div>

          {lowStockItems.length > 0 && (
            <div className="alert-banner">
              <span style={{ marginRight: '6px' }}><Icon name="alertcircle" /></span>
              <div className="alert-banner-content">
                <strong>Low Stock Alert:</strong> {lowStockItems.length} products have fallen below limits:
                <div style={{ marginTop: '6px', paddingLeft: '10px', display: 'flex', flexDirection: 'column', gap: '4px', fontSize: '13px' }}>
                  {lowStockItems.slice(0, 5).map(i => (
                    <div key={i.id}>
                      • <strong>{i.name}</strong> (Stock: {i.stock} left) — <em>Reorder from: {i.supplier || 'Generic'}</em>
                    </div>
                  ))}
                  {lowStockItems.length > 5 && (
                    <div style={{ fontStyle: 'italic', marginTop: '2px' }}>
                      • and {lowStockItems.length - 5} more items...
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          <div className="grid-inventory">
            <div>
              <div className="card" style={{ marginBottom: '20px', padding: '16px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', gap: '12px', flexWrap: 'wrap' }}>
                  <div style={{ position: 'relative', flexGrow: 1, minWidth: '200px' }}>
                    <input 
                      type="text" 
                      placeholder="Search products by name, SKU, supplier..." 
                      className="input-control"
                      style={{ width: '100%', paddingLeft: '40px' }}
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                    />
                    <span style={{ position: 'absolute', left: '14px', top: '14px', color: 'var(--text-muted)' }}>
                      <Icon name="search" size={16} />
                    </span>
                  </div>
                  <select 
                    className="input-control"
                    value={categoryFilter}
                    onChange={(e) => setCategoryFilter(e.target.value)}
                    style={{ minWidth: '150px' }}
                  >
                    <option value="All">All Categories</option>
                    {uniqueCategories.map(cat => (
                      <option key={cat} value={cat}>{cat}</option>
                    ))}
                  </select>
                  <select 
                    className="input-control"
                    value={supplierFilter}
                    onChange={(e) => setSupplierFilter(e.target.value)}
                    style={{ minWidth: '150px' }}
                  >
                    <option value="All">All Suppliers</option>
                    {uniqueSuppliers.map(sup => (
                      <option key={sup} value={sup}>{sup}</option>
                    ))}
                  </select>
                  <button 
                    type="button"
                    className="btn btn-secondary"
                    onClick={() => setIsReorderReportOpen(true)}
                    title="Supplier Reorder Suggestions Report"
                    style={{ whiteSpace: 'nowrap' }}
                  >
                    <Icon name="clipboard" size={14} /> Reorder Report
                  </button>
                  <button 
                    className="btn btn-secondary"
                    onClick={() => {
                      setReceiveSearchText('');
                      setSelectedReceiveProduct(null);
                      setReceiveQty('');
                      setIsReceiveModalOpen(true);
                    }}
                    style={{ whiteSpace: 'nowrap' }}
                  >
                    <Icon name="plus" size={14} /> Receive Shipment
                  </button>
                  <button 
                    className="btn btn-secondary"
                    onClick={() => {
                      setStockTakeSearchText('');
                      setSelectedStockTakeProduct(null);
                      setStockTakeQty('');
                      setIsStockTakeModalOpen(true);
                    }}
                    style={{ whiteSpace: 'nowrap' }}
                  >
                    <Icon name="clipboard" size={14} /> Perform Stock Take
                  </button>
                  <button 
                    className="btn btn-secondary"
                    onClick={() => {
                      setHistorySearch('');
                      setIsHistoryModalOpen(true);
                    }}
                    style={{ whiteSpace: 'nowrap' }}
                    title="View Stock Adjustments Log"
                  >
                    <Icon name="history" size={14} /> Adjustment History
                  </button>
                  <button 
                    className="btn btn-primary"
                    onClick={() => { resetForm(); setIsAddOpen(true); }}
                    style={{ whiteSpace: 'nowrap' }}
                  >
                    <Icon name="plus" size={16} /> Add Product
                  </button>
                  {window.MASTER_PRODUCTS && (
                    <button 
                      className="btn btn-secondary"
                      title="Reset inventory to original master catalog list"
                      onClick={() => {
                        if (confirm("Reset current inventory to the master supplier catalog? This will restore all 22,463 original products with 0 stock default.")) {
                          setInventory((window.MASTER_PRODUCTS || []).map(p => ({ ...p, stock: 0 })));
                          alert("Inventory successfully reset to the Master Supplier Catalog.");
                        }
                      }}
                    >
                      <Icon name="refresh" size={14} /> Reset Catalog
                    </button>
                  )}
                </div>
              </div>

              <div className="table-container">
                <table className="custom-table">
                  <thead>
                    <tr>
                      <th>SKU</th>
                      <th>Product Name</th>
                      <th>Category</th>
                      <th>Supplier</th>
                      <th>Retail Price (inc GST)</th>
                      <th>Stock</th>
                      <th>Limit</th>
                      <th>Status</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {paginatedItems.map(item => {
                      const isLow = item.stock <= item.reorderPoint;
                      return (
                        <tr key={item.id}>
                          <td><code>{item.sku}</code></td>
                          <td style={{ fontWeight: '600' }}>{item.name}</td>
                          <td>{item.category}</td>
                          <td><span className="text-gold" style={{ fontSize: '13px' }}>{item.supplier || 'Generic'}</span></td>
                          <td>${item.price.toFixed(2)}</td>
                          <td>{item.stock} units</td>
                          <td>{item.reorderPoint}</td>
                          <td>
                            <span className={`badge ${isLow ? 'badge-low-stock' : 'badge-in-stock'}`}>
                              {isLow ? 'Low Stock' : 'In Stock'}
                            </span>
                          </td>
                          <td>
                            <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                              <button 
                                className="btn btn-secondary" 
                                style={{ padding: '4px 8px', fontSize: '11px', whiteSpace: 'nowrap' }}
                                onClick={() => handleInlineReceive(item)}
                                title="Add stock"
                              >
                                + Receive
                              </button>
                              <button 
                                className="btn btn-secondary" 
                                style={{ padding: '4px 8px', fontSize: '11px', whiteSpace: 'nowrap' }}
                                onClick={() => handleInlineStockTake(item)}
                                title="Overwrite stock count"
                              >
                                Stock Take
                              </button>
                              <button 
                                className="btn btn-secondary" 
                                style={{ padding: '6px' }}
                                onClick={() => handleEditClick(item)}
                                title="Edit details"
                              >
                                <Icon name="edit" size={14} />
                              </button>
                              <button 
                                className="btn btn-danger" 
                                style={{ padding: '6px' }}
                                onClick={() => handleDeleteClick(item.id)}
                                title="Delete product"
                              >
                                <Icon name="trash" size={14} />
                              </button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              
              {/* Pagination Controls */}
              {totalPages > 1 && (
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '16px', backgroundColor: 'var(--bg-secondary)', padding: '12px 16px', borderRadius: 'var(--radius-md)', border: '1px solid var(--border-subtle)' }}>
                  <span style={{ fontSize: '13px', color: 'var(--text-secondary)' }}>
                    Showing <strong>{((currentPage - 1) * itemsPerPage) + 1}</strong> to <strong>{Math.min(currentPage * itemsPerPage, filteredInventory.length)}</strong> of <strong>{filteredInventory.length}</strong> products
                  </span>
                  <div style={{ display: 'flex', gap: '8px' }}>
                    <button 
                      type="button"
                      className="btn btn-secondary" 
                      style={{ padding: '6px 12px', fontSize: '12px' }}
                      disabled={currentPage === 1}
                      onClick={() => setCurrentPage(1)}
                    >
                      First
                    </button>
                    <button 
                      type="button"
                      className="btn btn-secondary" 
                      style={{ padding: '6px 12px', fontSize: '12px' }}
                      disabled={currentPage === 1}
                      onClick={() => setCurrentPage(prev => Math.max(1, prev - 1))}
                    >
                      Prev
                    </button>
                    <span style={{ display: 'inline-flex', alignItems: 'center', padding: '0 8px', fontSize: '13px', fontWeight: 'bold' }}>
                      Page {currentPage} of {totalPages}
                    </span>
                    <button 
                      type="button"
                      className="btn btn-secondary" 
                      style={{ padding: '6px 12px', fontSize: '12px' }}
                      disabled={currentPage === totalPages}
                      onClick={() => setCurrentPage(prev => Math.min(totalPages, prev + 1))}
                    >
                      Next
                    </button>
                    <button 
                      type="button"
                      className="btn btn-secondary" 
                      style={{ padding: '6px 12px', fontSize: '12px' }}
                      disabled={currentPage === totalPages}
                      onClick={() => setCurrentPage(totalPages)}
                    >
                      Last
                    </button>
                  </div>
                </div>
              )}
            </div>

            {/* OTC Sales */}
            <div className="card">
              <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '18px', marginBottom: '16px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                <Icon name="shoppingbag" className="text-gold" /> Direct Checkout
              </h3>
              <p className="text-muted" style={{ fontSize: '13px', marginBottom: '20px' }}>
                Log store retail sales instantly. Prices are inclusive of GST.
              </p>

              <form onSubmit={handleOtcSubmit}>
                <div className="form-group autocomplete-wrapper">
                  <label>Search Stock Product (SKU / Name)</label>
                  <input 
                    type="text" 
                    className="input-control" 
                    placeholder="Search by name or SKU..."
                    value={otcSearchText}
                    onChange={(e) => {
                      setOtcSearchText(e.target.value);
                      setShowOtcSuggestions(true);
                      if (!e.target.value.trim()) {
                        setOtcProductId('');
                      }
                    }}
                    onFocus={() => setShowOtcSuggestions(true)}
                    onBlur={() => setTimeout(() => setShowOtcSuggestions(false), 200)}
                  />
                  {showOtcSuggestions && suggestedOtcProducts.length > 0 && (
                    <ul className="autocomplete-list" style={{ top: 'auto', bottom: '100%', marginBottom: '4px' }}>
                      {suggestedOtcProducts.map(p => (
                        <li 
                          key={p.id} 
                          className="autocomplete-item"
                          style={{ opacity: p.stock <= 0 ? 0.5 : 1, pointerEvents: p.stock <= 0 ? 'none' : 'auto' }}
                          onClick={() => {
                            setOtcProductId(p.id);
                            setOtcSearchText(`${p.name} (SKU: ${p.sku})`);
                            setShowOtcSuggestions(false);
                          }}
                        >
                          {p.name} (SKU: {p.sku}) - ${p.price.toFixed(2)} | Stock: {p.stock} {p.stock <= 0 ? ' (Out of Stock)' : ''}
                        </li>
                      ))}
                    </ul>
                  )}
                </div>

                <div className="form-group">
                  <label>Quantity</label>
                  <input 
                    type="number" 
                    min="1" 
                    required 
                    className="input-control"
                    value={otcQty}
                    onChange={(e) => setOtcQty(parseInt(e.target.value) || 1)}
                  />
                </div>

                {otcProductId && (
                  <div className="card" style={{ padding: '12px', backgroundColor: 'var(--bg-tertiary)', marginBottom: '16px', fontSize: '14px' }}>
                    <div className="flex-space">
                      <span>Total Price:</span>
                      <span>${(inventory.find(i => i.id === otcProductId)?.price || 0).toFixed(2)}</span>
                    </div>
                    <div className="flex-space" style={{ marginTop: '4px' }}>
                      <span>Qty:</span>
                      <span>{otcQty}</span>
                    </div>
                    <hr style={{ border: 0, borderBottom: '1px solid var(--border-subtle)', margin: '8px 0' }} />
                    <div className="flex-space" style={{ fontWeight: 'bold' }}>
                      <span className="text-gold">Total Due (inc GST):</span>
                      <span className="text-gold">
                        ${((inventory.find(i => i.id === otcProductId)?.price || 0) * otcQty).toFixed(2)}
                      </span>
                    </div>
                  </div>
                )}

                <button type="submit" className="btn btn-primary" style={{ width: '100%' }} disabled={!otcProductId}>
                  Record & Generate Invoice
                </button>
              </form>
            </div>
          </div>

          {/* ADD PRODUCT MODAL */}
          {isAddOpen && (
            <div className="modal-overlay">
              <div className="modal-content">
                <div className="modal-header">
                  <h3>{editingProduct ? 'Edit Product Details' : 'Register New Inventory Product'}</h3>
                  <button className="close-btn" onClick={() => { setIsAddOpen(false); resetForm(); }}>&times;</button>
                </div>
                <form onSubmit={handleAddSubmit}>
                  <div className="modal-body">
                    <div className="form-row">
                      <div className="form-group">
                        <label>SKU</label>
                        <input 
                          type="text" 
                          required 
                          className="input-control" 
                          placeholder="e.g. OIL-VALVE-Y"
                          value={productForm.sku}
                          onChange={(e) => setProductForm({...productForm, sku: e.target.value})}
                        />
                      </div>
                      <div className="form-group">
                        <label>Product Category</label>
                        <select 
                          className="input-control"
                          value={productForm.category}
                          onChange={(e) => setProductForm({...productForm, category: e.target.value})}
                        >
                          {uniqueCategories.map(cat => (
                            <option key={cat} value={cat}>{cat}</option>
                          ))}
                        </select>
                      </div>
                    </div>

                    <div className="form-group">
                      <label>Product Name</label>
                      <input 
                        type="text" 
                        required 
                        className="input-control" 
                        placeholder="e.g. Vandoren Clarinet Reeds"
                        value={productForm.name}
                        onChange={(e) => setProductForm({...productForm, name: e.target.value})}
                      />
                    </div>

                    <div className="form-group">
                      <label>Supplier / Distributor</label>
                      <input 
                        type="text" 
                        required 
                        className="input-control" 
                        placeholder="e.g. Yamaha Music Australia"
                        value={productForm.supplier}
                        onChange={(e) => setProductForm({...productForm, supplier: e.target.value})}
                      />
                    </div>

                    <div className="form-row">
                      <div className="form-group">
                        <label>Retail Price ($ inc GST)</label>
                        <input 
                          type="number" 
                          step="0.05" 
                          required 
                          className="input-control"
                          value={productForm.price}
                          onChange={(e) => setProductForm({...productForm, price: e.target.value})}
                        />
                      </div>
                      <div className="form-group">
                        <label>Cost Price (Wholesale)</label>
                        <input 
                          type="number" 
                          step="0.05" 
                          className="input-control"
                          placeholder="60% of retail if blank"
                          value={productForm.costPrice}
                          onChange={(e) => setProductForm({...productForm, costPrice: e.target.value})}
                        />
                      </div>
                      <div className="form-group">
                        <label>Initial Stock</label>
                        <input 
                          type="number" 
                          required 
                          className="input-control"
                          value={productForm.stock}
                          onChange={(e) => setProductForm({...productForm, stock: e.target.value})}
                        />
                      </div>
                      <div className="form-group">
                        <label>Reorder Limit</label>
                        <input 
                          type="number" 
                          required 
                          className="input-control"
                          value={productForm.reorderPoint}
                          onChange={(e) => setProductForm({...productForm, reorderPoint: e.target.value})}
                        />
                      </div>
                    </div>
                  </div>
                  <div className="modal-footer">
                    <button 
                      type="button" 
                      className="btn btn-secondary" 
                      onClick={() => { setIsAddOpen(false); resetForm(); }}
                    >
                      Cancel
                    </button>
                    <button type="submit" className="btn btn-primary">
                      {editingProduct ? 'Save Changes' : 'Add to Catalog'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* BATCH RECEIVE SHIPMENT MODAL */}
          {isReceiveModalOpen && (
            <div className="modal-overlay">
              <div className="modal-content" style={{ maxWidth: '500px' }}>
                <div className="modal-header">
                  <h3>Receive Bulk Shipment</h3>
                  <button className="close-btn" onClick={() => setIsReceiveModalOpen(false)}>&times;</button>
                </div>
                <div className="modal-body">
                  <p style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '16px' }}>
                    Search for a catalog product to add received quantities into inventory.
                  </p>
                  
                  <div className="form-group autocomplete-wrapper" style={{ position: 'relative' }}>
                    <label>Search Product (SKU / Name)</label>
                    <input 
                      type="text" 
                      className="input-control" 
                      placeholder="Type to search catalog..." 
                      value={receiveSearchText}
                      onChange={(e) => {
                        setReceiveSearchText(e.target.value);
                        setShowReceiveSuggestions(true);
                      }}
                      onFocus={() => setShowReceiveSuggestions(true)}
                      onBlur={() => setTimeout(() => setShowReceiveSuggestions(false), 200)}
                    />
                    {showReceiveSuggestions && suggestedReceiveProducts.length > 0 && (
                      <ul className="autocomplete-list" style={{ top: '100%', zIndex: 1000 }}>
                        {suggestedReceiveProducts.map(p => (
                          <li 
                            key={p.id} 
                            className="autocomplete-item"
                            onClick={() => {
                              setSelectedReceiveProduct(p);
                              setReceiveSearchText(`${p.name} (SKU: ${p.sku})`);
                              setShowReceiveSuggestions(false);
                            }}
                          >
                            {p.name} (SKU: {p.sku}) - Current Stock: {p.stock}
                          </li>
                        ))}
                      </ul>
                    )}
                  </div>

                  {selectedReceiveProduct && (
                    <div className="card" style={{ padding: '12px', backgroundColor: 'var(--bg-tertiary)', marginBottom: '16px', fontSize: '13px' }}>
                      <strong>Selected Product:</strong> {selectedReceiveProduct.name}<br />
                      <strong>SKU:</strong> <code>{selectedReceiveProduct.sku}</code><br />
                      <strong>Current Stock Count:</strong> {selectedReceiveProduct.stock} units
                    </div>
                  )}

                  <div className="form-group">
                    <label>Quantity to Receive (Add)</label>
                    <input 
                      type="number" 
                      min="1"
                      className="input-control" 
                      placeholder="e.g. 10" 
                      value={receiveQty}
                      onChange={(e) => setReceiveQty(e.target.value)}
                    />
                  </div>
                </div>
                <div className="modal-footer">
                  <button 
                    type="button" 
                    className="btn btn-secondary" 
                    onClick={() => setIsReceiveModalOpen(false)}
                  >
