          document.body.style.removeProperty('--custom-text-muted');
          document.body.style.removeProperty('--custom-accent-gold');
          document.body.style.removeProperty('--custom-accent-gold-light');
          document.body.style.removeProperty('--custom-accent-gold-glow');
          document.body.style.removeProperty('--custom-border-subtle');
          document.body.style.removeProperty('--custom-border-gold');
        }
      }, [theme, customColors, compPrefix, activeCompany]);

      // Sync Instrument Library
      React.useEffect(() => {
        if (!activeCompany) return;
        localStorage.setItem(`${compPrefix}instrument_library`, JSON.stringify(instrumentLibrary));
      }, [instrumentLibrary, compPrefix, activeCompany]);

      // Sync Xero Config
      React.useEffect(() => {
        if (!activeCompany) return;
        localStorage.setItem(`${compPrefix}xero_config`, JSON.stringify(xeroConfig));
      }, [xeroConfig, compPrefix, activeCompany]);

      // Sync status columns labels
      React.useEffect(() => {
        if (!activeCompany) return;
        localStorage.setItem(`${compPrefix}status_columns`, JSON.stringify(statusColumns));
      }, [statusColumns, compPrefix, activeCompany]);

      const handleUpdateRepairStatus = (repairId, newStatus) => {
        setRepairs(prev => prev.map(r => r.id === repairId ? { ...r, status: newStatus } : r));
      };

      const handleDeleteRepair = (repairId) => {
        setRepairs(prev => prev.filter(r => r.id !== repairId));
      };

      const handleSaveRepair = (updatedRepair) => {
        const clientExists = clients.some(c => c.name.toLowerCase() === updatedRepair.client.name.toLowerCase());
        if (!clientExists && updatedRepair.client.name.trim() !== '') {
          const newClient = {
            id: `CLI-${Date.now().toString().slice(-4)}`,
            name: updatedRepair.client.name,
            phone: updatedRepair.client.phone,
            email: updatedRepair.client.email,
            address: '',
            notes: 'Created automatically via intake.',
            createdAt: new Date().toISOString()
          };
          setClients(prev => [newClient, ...prev]);
        }

        setRepairs(prev => {
          const exists = prev.some(r => r.id === updatedRepair.id);
          if (exists) {
            return prev.map(r => r.id === updatedRepair.id ? updatedRepair : r);
          } else {
            return [updatedRepair, ...prev];
          }
        });
      };

      const handleTestXeroHandshake = () => {
        if (!tempXeroConfig.clientId.trim() || !tempXeroConfig.tenantId.trim() || !tempXeroConfig.token.trim()) {
          setTestHandshakeResult({ success: false, message: 'Handshake Failed: All fields are required to establish a secure link.' });
          return;
        }
        setIsTestingHandshake(true);
        setTestHandshakeResult(null);
        
        setTimeout(() => {
          setIsTestingHandshake(false);
          setTestHandshakeResult({
            success: true,
            message: `✔ Secure API handshake verified successfully for Xero Org: "${tempXeroConfig.orgName || 'Brass & Woodwind Melbourne'}" (Tenant: ${tempXeroConfig.tenantId.slice(0, 5)}...)`
          });
        }, 1000);
      };

      const handleSaveXeroConfig = () => {
        if (!tempXeroConfig.clientId.trim() || !tempXeroConfig.tenantId.trim() || !tempXeroConfig.token.trim()) {
          alert('Please fill out all credentials to complete connection.');
          return;
        }
        setXeroConfig({ ...tempXeroConfig });
        setXeroConnected(true);
        setIsXeroConfigOpen(false);
        alert('Xero secure config updated and connected successfully.');
      };

      const handleEmailLoginSubmit = (e) => {
        e.preventDefault();
        const email = emailInput.trim().toLowerCase();
        const found = companies.find(c => c && typeof c.email === 'string' && c.email.trim().toLowerCase() === email);
        if (found) {
          localStorage.setItem('ww_active_company', found.name);
          window.location.reload();
        } else {
          setEmailError('No workspace registered with this email.');
        }
      };

      const handleRegisterCompanySubmit = (e) => {
        e.preventDefault();
        const cName = newCompanyForm.companyName.trim();
        const cEmail = newCompanyForm.companyEmail.trim().toLowerCase();
        const tName = newCompanyForm.techName.trim();
        const tRole = newCompanyForm.techRole.trim();
        const tPin = newCompanyForm.techPin.trim();

        if (!cName || !cEmail || !tName || !tRole || !tPin) {
          alert('All fields are required.');
          return;
        }
        if (companies.some(c => c && typeof c.name === 'string' && c.name.toLowerCase() === cName.toLowerCase())) {
          alert('A company with this name already exists.');
          return;
        }
        if (companies.some(c => c && typeof c.email === 'string' && c.email.toLowerCase() === cEmail)) {
          alert('A company with this email is already registered.');
          return;
        }
        if (tPin.length !== 4 || isNaN(tPin)) {
          alert('PIN must be a 4-digit number.');
          return;
        }

        const newCompanies = [...companies, { name: cName, email: cEmail }];
        localStorage.setItem('ww_companies', JSON.stringify(newCompanies));
        localStorage.setItem('ww_active_company', cName);

        const newCompanyUsers = [
          { name: tName, role: tRole, initials: tName.charAt(0).toUpperCase(), pin: tPin }
        ];
        localStorage.setItem(`ww_${cName}_users`, JSON.stringify(newCompanyUsers));
        localStorage.setItem(`ww_${cName}_theme`, 'dark');

        setIsAddCompanyOpen(false);
        setNewCompanyForm({ companyName: '', companyEmail: '', techName: '', techRole: 'Owner / Head Tech', techPin: '' });
        window.location.reload();
      };

      const renderRegisterCompanyModal = () => (
        <div className="modal-overlay" style={{ zIndex: 300 }}>
          <div className="modal-content" style={{ maxWidth: '400px', textAlign: 'left', background: '#12141a', border: '1px solid var(--border-gold)' }}>
            <div className="modal-header">
              <h3 style={{ color: 'var(--accent-gold-light)' }}>Register New Company</h3>
              <button type="button" className="close-btn" onClick={() => setIsAddCompanyOpen(false)}>&times;</button>
            </div>
            <form onSubmit={handleRegisterCompanySubmit}>
              <div className="modal-body">
                <div className="form-group">
                  <label style={{ color: 'var(--text-secondary)' }}>Company Name</label>
                  <input 
                    type="text" 
                    required 
                    className="input-control" 
                    placeholder="e.g. Sound Specialists"
                    value={newCompanyForm.companyName}
                    onChange={(e) => setNewCompanyForm({ ...newCompanyForm, companyName: e.target.value })}
                    style={{ backgroundColor: '#0a0b0d', border: '1px solid var(--border-subtle)' }}
                  />
                </div>
                
                <div className="form-group" style={{ marginTop: '12px' }}>
                  <label style={{ color: 'var(--text-secondary)' }}>Company Login Email</label>
                  <input 
                    type="email" 
                    required 
                    className="input-control" 
                    placeholder="e.g. info@soundspecialists.com"
                    value={newCompanyForm.companyEmail}
                    onChange={(e) => setNewCompanyForm({ ...newCompanyForm, companyEmail: e.target.value })}
                    style={{ backgroundColor: '#0a0b0d', border: '1px solid var(--border-subtle)' }}
                  />
                </div>
                
                <div style={{ marginTop: '16px', borderTop: '1px dashed var(--border-subtle)', paddingTop: '16px' }}>
                  <span style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '1px', color: 'var(--accent-gold)', display: 'block', marginBottom: '12px' }}>
                    Primary Administrator Profile
                  </span>
                  
                  <div className="form-group">
                    <label style={{ color: 'var(--text-secondary)' }}>Technician Name</label>
                    <input 
                      type="text" 
                      required 
                      className="input-control" 
                      placeholder="e.g. Dave"
                      value={newCompanyForm.techName}
                      onChange={(e) => setNewCompanyForm({ ...newCompanyForm, techName: e.target.value })}
                      style={{ backgroundColor: '#0a0b0d', border: '1px solid var(--border-subtle)' }}
                    />
                  </div>
                  
                  <div className="form-group" style={{ marginTop: '12px' }}>
                    <label style={{ color: 'var(--text-secondary)' }}>Role / Specialty</label>
                    <input 
                      type="text" 
                      required 
                      className="input-control" 
                      value={newCompanyForm.techRole}
                      onChange={(e) => setNewCompanyForm({ ...newCompanyForm, techRole: e.target.value })}
                      style={{ backgroundColor: '#0a0b0d', border: '1px solid var(--border-subtle)' }}
                    />
                  </div>
                  
                  <div className="form-group" style={{ marginTop: '12px' }}>
                    <label style={{ color: 'var(--text-secondary)' }}>4-Digit Login PIN</label>
                    <input 
                      type="text" 
                      maxLength="4" 
                      required 
                      className="input-control" 
                      placeholder="e.g. 1234"
                      value={newCompanyForm.techPin}
                      onChange={(e) => setNewCompanyForm({ ...newCompanyForm, techPin: e.target.value })}
                      style={{ backgroundColor: '#0a0b0d', border: '1px solid var(--border-subtle)' }}
                    />
                  </div>
                </div>
              </div>
              <div className="modal-footer" style={{ borderColor: 'var(--border-subtle)' }}>
                <button type="button" className="btn btn-secondary" onClick={() => setIsAddCompanyOpen(false)}>Cancel</button>
                <button type="submit" className="btn btn-primary">Create Workspace</button>
              </div>
            </form>
          </div>
        </div>
      );

      if (!isCompanyVerified) {
        return (
          <div className="login-container">
            <div className="login-card">
              <div className="login-logo-container">
                <img src="InstruWorks Logo.png" alt="InstruWorks Logo" className="login-logo" />
              </div>
              <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: '26px', marginBottom: '4px' }}>InstruWorks</h2>
              <p className="text-gold" style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '2px', marginBottom: '24px' }}>Workspace Portal</p>
              
              <form onSubmit={handleEmailLoginSubmit}>
                <div className="form-group" style={{ textAlign: 'left' }}>
                  <label style={{ color: 'var(--text-secondary)', fontSize: '12px', fontWeight: 'bold' }}>Company Email Address</label>
                  <input 
                    type="email" 
                    required 
                    className="input-control" 
                    placeholder="e.g. concertclean@gmail.com" 
                    value={emailInput}
                    onChange={(e) => { setEmailInput(e.target.value); setEmailError(''); }}
                    style={{ backgroundColor: '#0a0b0d', border: '1px solid var(--border-subtle)' }}
                  />
                  {emailError && (
                    <span style={{ color: '#f87171', fontSize: '11px', marginTop: '4px', display: 'block' }}>{emailError}</span>
                  )}
                </div>
                <button type="submit" className="btn btn-primary" style={{ width: '100%', padding: '12px', marginTop: '8px' }}>
                  Continue to Workspace
                </button>
              </form>

              <div className="card" style={{ marginTop: '24px', padding: '12px', fontSize: '11px', backgroundColor: 'rgba(197, 160, 89, 0.05)', borderColor: 'var(--border-gold)', textAlign: 'left' }}>
                💡 <strong>Demo Workspace:</strong><br />
                • <code>concertclean@gmail.com</code> (Concert Clean)
              </div>
            </div>
            {isAddCompanyOpen && renderRegisterCompanyModal()}
          </div>
        );
      }

      if (!activeUser) {
        return (
          <div className="login-container">
            <div className="login-card">
              <div className="login-logo-container">
                <img src="InstruWorks Logo.png" alt="InstruWorks Logo" className="login-logo" />
              </div>
              <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: '26px', marginBottom: '4px' }}>InstruWorks</h2>
              <p className="text-gold" style={{ fontSize: '12px', textTransform: 'uppercase', letterSpacing: '2px', marginBottom: '24px' }}>{activeCompany} Workshop</p>
              
              <h4 style={{ fontSize: '14px', color: 'var(--text-secondary)', marginBottom: '16px' }}>
                {selectedLoginUser ? `Enter PIN for ${selectedLoginUser.name}` : 'Select Your Profile'}
              </h4>

              {!selectedLoginUser ? (
                <div className="user-profile-list" style={{ flexWrap: 'wrap' }}>
                  {users.map(u => (
                    <div key={u.name} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                      <button 
                        className="user-profile-btn"
                        onClick={() => {
                          setSelectedLoginUser(u);
                          setPinInput('');
                          setLoginError('');
                        }}
                      >
                        <div className="user-avatar-circle">
                          {u.initials}
                        </div>
                        <strong style={{ fontSize: '13px' }}>{u.name}</strong>
                        <span style={{ fontSize: '10px', color: 'var(--text-muted)' }}>{(u.role || '').split(' ')[0]}</span>
                      </button>
                    </div>
                  ))}
                </div>
              ) : (
                <div>
                  <div className="pin-dot-container">
                    {[0, 1, 2, 3].map(i => (
                      <div key={i} className={`pin-dot ${i < pinInput.length ? 'filled' : ''}`}></div>
                    ))}
                  </div>

                  {loginError && (
                    <div style={{ color: '#f87171', fontSize: '12px', margin: '8px 0', minHeight: '18px' }}>
                      {loginError}
                    </div>
                  )}

                  <div className="pin-pad">
                    {['1', '2', '3', '4', '5', '6', '7', '8', '9'].map(num => (
                      <button 
                        key={num} 
                        type="button" 
                        className="pin-btn" 
                        onClick={() => handlePinPress(num)}
                      >
                        {num}
                      </button>
                    ))}
                    <button type="button" className="pin-btn" style={{ color: '#f87171', fontSize: '14px' }} onClick={handlePinClear}>
                      Clear
                    </button>
                    <button type="button" className="pin-btn" onClick={() => handlePinPress('0')}>
                      0
                    </button>
                    <button type="button" className="pin-btn" style={{ fontSize: '14px' }} onClick={handlePinBackspace}>
                      ⌫
                    </button>
                  </div>

                  <button 
                    className="btn btn-secondary" 
                    style={{ marginTop: '24px', width: '100%' }}
                    onClick={() => {
                      setSelectedLoginUser(null);
                      setPinInput('');
                      setLoginError('');
                    }}
                  >
                    Back to Profiles
                  </button>
                </div>
              )}

              {/* Button to Switch company email workspace */}
              {!selectedLoginUser && (
                <div style={{ marginTop: '24px', borderTop: '1px solid var(--border-subtle)', paddingTop: '16px' }}>
                  <button 
                    type="button" 
                    className="btn btn-secondary" 
                    style={{ fontSize: '12px', width: '100%' }} 
                    onClick={() => {
                      localStorage.removeItem('ww_active_company');
                      localStorage.removeItem(`${compPrefix}active_user`);
                      window.location.reload();
                    }}
                  >
                    ← Switch Company Workspace
                  </button>
                </div>
              )}
            </div>
            {isAddCompanyOpen && renderRegisterCompanyModal()}
          </div>
        );
      }

      return (
        <div className="app-container">
          {/* Sidebar */}
          <aside className="sidebar">
            <div>
              <div className="brand-section">
                <img src="InstruWorks Logo.png" alt="InstruWorks Logo" style={{ width: '40px', height: '40px', objectFit: 'contain', borderRadius: '6px' }} />
                <div className="brand-info">
                  <h1>InstruWorks</h1>
                  <p style={{ letterSpacing: '0.5px' }}>{activeCompany}</p>
                </div>
              </div>
              
              <nav>
                <ul className="nav-links">
                  <li>
                    <button 
                      className={`nav-item ${activeTab === 'repairs' && repairsFilter === 'All' ? 'active' : ''}`}
                      onClick={() => { setActiveTab('repairs'); setRepairsFilter('All'); }}
                    >
                      <span style={{ display: 'inline-block', marginRight: '6px' }}><Icon name="wrench" /></span>
                      Repair Board (All)
                    </button>
                  </li>
                  <li>
                    <button 
                      className={`nav-item ${activeTab === 'repairs' && repairsFilter === 'Brass' ? 'active' : ''}`}
                      onClick={() => { setActiveTab('repairs'); setRepairsFilter('Brass'); }}
                    >
                      <span style={{ display: 'inline-block', marginRight: '6px' }}><Icon name="wrench" /></span>
                      Brass Repairs
                    </button>
                  </li>
                  <li>
                    <button 
                      className={`nav-item ${activeTab === 'repairs' && repairsFilter === 'Woodwind' ? 'active' : ''}`}
                      onClick={() => { setActiveTab('repairs'); setRepairsFilter('Woodwind'); }}
                    >
                      <span style={{ display: 'inline-block', marginRight: '6px' }}><Icon name="wrench" /></span>
                      Woodwind Repairs
                    </button>
                  </li>
                  <li>
                    <button 
                      className={`nav-item ${activeTab === 'inventory' ? 'active' : ''}`}
                      onClick={() => setActiveTab('inventory')}
                    >
                      <span style={{ display: 'inline-block', marginRight: '6px' }}><Icon name="package" /></span>
                      Stock Catalog
                    </button>
                  </li>
                  <li>
                    <button 
                      className={`nav-item ${activeTab === 'sales' ? 'active' : ''}`}
                      onClick={() => setActiveTab('sales')}
                    >
                      <span style={{ display: 'inline-block', marginRight: '6px' }}><Icon name="shoppingbag" /></span>
                      Product Sales
                    </button>
                  </li>
                  <li>
                    <button 
                      className={`nav-item ${activeTab === 'clients' ? 'active' : ''}`}
                      onClick={() => setActiveTab('clients')}
                    >
                      <span style={{ display: 'inline-block', marginRight: '6px' }}><Icon name="user" /></span>
                      Client Directory
                    </button>
                  </li>
                  <li>
                    <button 
                      className={`nav-item ${activeTab === 'invoices' ? 'active' : ''}`}
                      onClick={() => setActiveTab('invoices')}
                    >
                      <span style={{ display: 'inline-block', marginRight: '6px' }}><Icon name="filetext" /></span>
                      Invoicing Console
                    </button>
                  </li>
                  <li>
                    <button 
                      className={`nav-item ${activeTab === 'reports' ? 'active' : ''}`}
                      onClick={() => setActiveTab('reports')}
                    >
                      <span style={{ display: 'inline-block', marginRight: '6px' }}><Icon name="barchart" /></span>
                      Reports & Analytics
                    </button>
                  </li>
                  <li>
                    <button 
                      className={`nav-item ${activeTab === 'team' ? 'active' : ''}`}
                      onClick={() => setActiveTab('team')}
                    >
                      <span style={{ display: 'inline-block', marginRight: '6px' }}><Icon name="user" /></span>
                      Team Profiles
                    </button>
                  </li>
                </ul>
              </nav>
            </div>

            <div className="sidebar-footer">
              <div 
                className="xero-connection-status" 
                style={{ cursor: 'pointer' }}
                onClick={() => {
                  setTempXeroConfig({ ...xeroConfig });
                  setTestHandshakeResult(null);
                  setIsXeroConfigOpen(true);
                }}
              >
                <div className={`status-indicator ${xeroConnected ? 'connected' : ''}`}></div>
                <div style={{ flexGrow: 1 }}>
                  <span className="text-muted" style={{ display: 'block', fontSize: '10px' }}>INTEGRATION</span>
                  <strong>{xeroConnected ? `Connected to ${xeroConfig.orgName || 'Xero'}` : 'Xero Offline'}</strong>
                </div>
                <button 
                  className="btn btn-secondary" 
                  style={{ padding: '4px 8px', fontSize: '10px' }}
                  title="Configure Xero Connection"
                  onClick={(e) => {
                    e.stopPropagation();
                    setTempXeroConfig({ ...xeroConfig });
                    setTestHandshakeResult(null);
                    setIsXeroConfigOpen(true);
                  }}
                >
                  <Icon name="link" size={12} />
                </button>
              </div>
            </div>
          </aside>

          {/* Content Area */}
          <main className="main-content">
            <header className="header">
              <div className="header-title">
                <h2>
                  {activeTab === 'repairs' && 'Repair Intake & Workflow Board'}
                  {activeTab === 'inventory' && 'Inventory Catalog & Sales'}
                  {activeTab === 'sales' && 'Product Sales Register'}
                  {activeTab === 'clients' && 'Client Directory'}
                  {activeTab === 'invoices' && 'Invoicing & Xero Sync'}
                  {activeTab === 'reports' && 'Business Analytics & Reports'}
                  {activeTab === 'team' && 'Technician & Profile Settings'}
                </h2>
              </div>
              <div className="header-actions">
                {/* Theme Selector Widget */}
                <div className="theme-selector" style={{ marginRight: '16px', display: 'flex', alignItems: 'center', gap: '4px' }}>
                  <button 
                    className={`theme-btn ${theme === 'dark' ? 'active' : ''}`} 
                    style={{ backgroundColor: '#12141a' }}
                    title="Luxurious Charcoal theme"
                    onClick={() => setTheme('dark')}
                  ></button>
                  <button 
                    className={`theme-btn ${theme === 'light' ? 'active' : ''}`} 
                    style={{ backgroundColor: '#ffffff', border: '1px solid #cbd5e1' }}
                    title="Artisan Cream theme (Light Mode)"
                    onClick={() => setTheme('light')}
                  ></button>
                  <button 
                    className={`theme-btn ${theme === 'forest' ? 'active' : ''}`} 
                    style={{ backgroundColor: '#12281d' }}
                    title="Forest Case theme"
                    onClick={() => setTheme('forest')}
                  ></button>
                  <button 
                    className={`theme-btn ${theme === 'cobalt' ? 'active' : ''}`} 
                    style={{ backgroundColor: '#101726' }}
                    title="Cobalt Case theme"
                    onClick={() => setTheme('cobalt')}
                  ></button>
                  <button 
                    className={`theme-btn ${theme === 'rosewood' ? 'active' : ''}`} 
                    style={{ backgroundColor: '#241212' }}
                    title="Rosewood Case theme"
                    onClick={() => setTheme('rosewood')}
                  ></button>
                  <button 
                    className={`theme-btn ${theme === 'midnight' ? 'active' : ''}`} 
                    style={{ backgroundColor: '#170e28' }}
                    title="Midnight Purple Case theme"
                    onClick={() => setTheme('midnight')}
                  ></button>
                  <button 
                    className={`theme-btn ${theme === 'custom' ? 'active' : ''}`} 
                    style={{ background: 'linear-gradient(45deg, #ef4444, #f59e0b, #10b981, #3b82f6, #8b5cf6)', border: '1px solid var(--border-subtle)' }}
                    title="Custom Theme Builder"
                    onClick={() => setTheme('custom')}
                  ></button>
                  {theme === 'custom' && (
                    <button 
                      type="button"
                      className="btn btn-secondary" 
                      style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', padding: '6px', marginLeft: '4px', border: '1px solid var(--border-gold)', minWidth: 'auto', height: '32px', width: '32px' }}
                      onClick={() => setIsThemeCustomizerOpen(true)}
                      title="Customize Global Colors"
                    >
                      ⚙️
                    </button>
                  )}
                </div>

                {activeUser && (
                  <div className="user-badge" style={{ marginRight: '16px' }}>
                    <div className="user-badge-avatar">
                      {activeUser.initials}
                    </div>
                    <div className="user-badge-info">
                      <strong style={{ fontSize: '12px', display: 'block', color: 'var(--text-primary)' }}>{activeUser.name}</strong>
                      <span className="text-muted" style={{ fontSize: '10px', display: 'block' }}>{activeUser.role}</span>
                    </div>
                    <button 
                      className="btn btn-secondary" 
                      style={{ padding: '4px 8px', fontSize: '10px', marginLeft: '8px' }}
                      onClick={() => {
                        localStorage.removeItem(`${compPrefix}active_user`);
                        setActiveUser(null);
                      }}
                      title="Switch User / Logout"
                    >
                      Logout
                    </button>
                  </div>
                )}

                <span className="text-muted" style={{ fontSize: '12px' }}>
                  CONSOLE ACTIVE
                </span>
              </div>
            </header>

            <div className="page-container">
              {activeTab === 'repairs' && (
                <RepairsPage 
                  repairs={repairs} 
                  inventory={inventory}
                  setInventory={setInventory}
                  clients={clients}
                  onSaveRepair={handleSaveRepair}
                  onDeleteRepair={handleDeleteRepair}
                  instrumentLibrary={instrumentLibrary}
                  onUpdateInstrumentLibrary={setInstrumentLibrary}
                  onUpdateStatus={handleUpdateRepairStatus}
                  activeUser={activeUser}
                  users={users}
                  statusColumns={statusColumns}
                  setStatusColumns={setStatusColumns}
                  onGenerateInvoice={(repair) => {
                    const partsTotal = repair.partsUsed?.reduce((sum, p) => sum + (p.price * p.qty), 0) || 0;
                    const servicesTotal = repair.servicesUsed?.reduce((sum, s) => sum + s.price, 0) || 0;
                    
                    const total = partsTotal + servicesTotal;
                    const tax = total / 11;
                    const subtotal = total - tax;

                    const partsLines = (repair.partsUsed || []).map(p => ({
                      description: `Parts - ${p.name}`,
                      qty: p.qty,
                      unitPrice: p.price,
                      xeroAccountCode: '420'
                    }));

                    const servicesLines = (repair.servicesUsed || []).map(s => ({
                      description: `Service - ${s.name}`,
                      qty: 1,
                      unitPrice: s.price,
                      xeroAccountCode: '400'
                    }));

                    const newInvoice = {
                      id: `INV-${Date.now().toString().slice(-4)}`,
                      repairJobId: repair.id,
                      schoolPo: repair.schoolPo || '',
                      client: repair.client,
                      lineItems: [...servicesLines, ...partsLines],
                      subtotal: parseFloat(subtotal.toFixed(2)),
                      tax: parseFloat(tax.toFixed(2)),
                      total: parseFloat(total.toFixed(2)),
                      xeroSyncStatus: 'unsynced'
                    };

                    setInvoices(prev => [newInvoice, ...prev]);
                    setRepairs(prev => prev.map(r => r.id === repair.id ? { ...r, invoiceId: newInvoice.id, status: 'Ready for Pickup' } : r));
                    setActiveTab('invoices');
                  }}
                />
              )}
              {activeTab === 'inventory' && (
                <InventoryPage 
                  inventory={inventory} 
                  setInventory={setInventory}
                  stockHistory={stockHistory}
                  setStockHistory={setStockHistory}
                  activeUser={activeUser}
                  onLogSale={(product, quantity) => {
                    setInventory(prev => prev.map(p => p.id === product.id ? { ...p, stock: Math.max(0, p.stock - quantity) } : p));
                    
                    const total = product.price * quantity;
                    const tax = total / 11;
                    const subtotal = total - tax;
                    
                    const newInvoice = {
                      id: `INV-${Date.now().toString().slice(-4)}`,
                      client: { name: 'Over-the-Counter Customer', phone: '-', email: '-' },
                      lineItems: [
                        {
                          description: `Retail Sale - ${product.name}`,
                          qty: quantity,
                          unitPrice: product.price,
                          xeroAccountCode: '420'
                        }
                      ],
                      subtotal: parseFloat(subtotal.toFixed(2)),
                      tax: parseFloat(tax.toFixed(2)),
                      total: parseFloat(total.toFixed(2)),
                      xeroSyncStatus: 'unsynced'
                    };

                    setInvoices(prev => [newInvoice, ...prev]);
                    alert(`Direct sale recorded! Deducted ${quantity}x from ${product.name}. Invoice generated: ${newInvoice.id}`);
                  }}
                />
              )}

              {activeTab === 'sales' && (
                <ProductSalesPage 
                  inventory={inventory} 
                  setInventory={setInventory}
                  clients={clients}
                  setClients={setClients}
                  setInvoices={setInvoices}
                  setActiveTab={setActiveTab}
                />
              )}

              {activeTab === 'clients' && (
                <ClientsPage 
                  clients={clients}
                  setClients={setClients}
                  repairs={repairs}
                  invoices={invoices}
                />
              )}
              
              {activeTab === 'invoices' && (
                <InvoicesPage 
                  invoices={invoices} 
                  setInvoices={setInvoices} 
                  xeroConnected={xeroConnected}
                  repairs={repairs}
                  setRepairs={setRepairs}
                  clients={clients}
                  setClients={setClients}
                  inventory={inventory}
                  setInventory={setInventory}
                  activeUser={activeUser}
                  activeCompany={activeCompany}
                />
              )}

              {activeTab === 'reports' && (
                <ReportsPage 
                  repairs={repairs}
                  invoices={invoices}
                  inventory={inventory}
                />
              )}
              
              {activeTab === 'team' && (
                <TeamPage 
                  users={users}
                  setUsers={setUsers}
                  activeUser={activeUser}
                  setActiveUser={setActiveUser}
                  compPrefix={compPrefix}
                />
              )}
            </div>
          </main>

          {isXeroConfigOpen && (
            <div className="modal-overlay">
              <div className="modal-content" style={{ maxWidth: '500px' }}>
                <div className="modal-header">
                  <h3>Xero Secure Integration Settings</h3>
                  <button className="close-btn" onClick={() => setIsXeroConfigOpen(false)}>&times;</button>
                </div>
                <div className="modal-body">
                  <p style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '16px' }}>
                    Configure credentials to link this offline console to your specific Xero account.
                  </p>
                  <div className="card" style={{ padding: '12px', fontSize: '11px', backgroundColor: 'rgba(197, 160, 89, 0.05)', borderColor: 'var(--border-gold)', marginBottom: '16px' }}>
                    🔒 <strong>Local Storage Vault:</strong> All connection parameters are stored locally inside this browser. Your credentials are never uploaded to any external servers, maintaining absolute security.
                  </div>
                  
                  <div className="form-group">
                    <label>Xero Client ID</label>
                    <input 
                      type="text" 
                      className="input-control" 
                      placeholder="Enter Client ID..." 
                      value={tempXeroConfig.clientId}
                      onChange={(e) => setTempXeroConfig({ ...tempXeroConfig, clientId: e.target.value })}
                    />
                  </div>
                  <div className="form-group">
                    <label>Xero Tenant ID (Organization ID)</label>
                    <input 
                      type="text" 
                      className="input-control" 
                      placeholder="Enter Tenant ID..." 
                      value={tempXeroConfig.tenantId}
                      onChange={(e) => setTempXeroConfig({ ...tempXeroConfig, tenantId: e.target.value })}
                    />
                  </div>
                  <div className="form-group">
                    <label>Access Token (Bearer API Key)</label>
                    <input 
                      type="password" 
                      className="input-control" 
                      placeholder="Paste Access Token..." 
                      value={tempXeroConfig.token}
                      onChange={(e) => setTempXeroConfig({ ...tempXeroConfig, token: e.target.value })}
                    />
                  </div>
                  <div className="form-group">
                    <label>Xero Organization Name</label>
                    <input 
                      type="text" 
                      className="input-control" 
                      placeholder="e.g. Brass & Woodwind Melbourne" 
                      value={tempXeroConfig.orgName}
                      onChange={(e) => setTempXeroConfig({ ...tempXeroConfig, orgName: e.target.value })}
                    />
                  </div>
                  
                  {testHandshakeResult && (
                    <div className="card" style={{ padding: '12px', fontSize: '12px', backgroundColor: testHandshakeResult.success ? 'rgba(16, 185, 129, 0.05)' : 'rgba(239, 68, 68, 0.05)', borderColor: testHandshakeResult.success ? '#10b981' : '#ef4444', color: testHandshakeResult.success ? '#34d399' : '#f87171', marginTop: '12px' }}>
                      {testHandshakeResult.message}
                    </div>
                  )}
                </div>
                <div className="modal-footer">
                  <button 
                    type="button"
                    className="btn btn-secondary" 
                    onClick={handleTestXeroHandshake}
                    disabled={isTestingHandshake}
                  >
                    {isTestingHandshake ? 'Verifying Handshake...' : 'Test API Handshake'}
                  </button>
                  <button 
                    type="button"
                    className="btn btn-primary" 
                    onClick={handleSaveXeroConfig}
                  >
                    Save Credentials
                  </button>
                </div>
              </div>
            </div>
          )}

          {isThemeCustomizerOpen && (
            <div className="modal-overlay">
              <div className="modal-content" style={{ maxWidth: '650px' }}>
                <div className="modal-header">
                  <h3>Theme Color Customizer</h3>
                  <button className="close-btn" onClick={() => setIsThemeCustomizerOpen(false)}>&times;</button>
                </div>
                <div className="modal-body" style={{ maxHeight: '70vh', overflowY: 'auto' }}>
                  <p style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '16px' }}>
                    Customize the global theme colors. These changes apply immediately to any tab where the <strong>'Custom'</strong> theme is selected.
                  </p>
                  
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                    {/* Backgrounds */}
                    <div>
                      <h4 style={{ color: 'var(--accent-gold)', marginBottom: '12px', fontSize: '14px', borderBottom: '1px solid var(--border-subtle)', paddingBottom: '4px' }}>Background Colors</h4>
                      <div className="form-group" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '8px' }}>
                        <label style={{ margin: 0, fontSize: '12px' }}>Primary Background</label>
                        <input 
                          type="color" 
                          value={customColors.bgPrimary || defaultCustomColors.bgPrimary} 
                          onChange={(e) => setCustomColors(prev => ({
                            ...prev,
                            bgPrimary: e.target.value
                          }))}
                        />
                      </div>
                      <div className="form-group" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '8px' }}>
                        <label style={{ margin: 0, fontSize: '12px' }}>Secondary Background</label>
                        <input 
                          type="color" 
                          value={customColors.bgSecondary || defaultCustomColors.bgSecondary} 
                          onChange={(e) => setCustomColors(prev => ({
                            ...prev,
                            bgSecondary: e.target.value
                          }))}
                        />
                      </div>
                      <div className="form-group" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '8px' }}>
                        <label style={{ margin: 0, fontSize: '12px' }}>Tertiary / Card Background</label>
                        <input 
                          type="color" 
                          value={customColors.bgTertiary || defaultCustomColors.bgTertiary} 
                          onChange={(e) => setCustomColors(prev => ({
                            ...prev,
                            bgTertiary: e.target.value
                          }))}
                        />
                      </div>
                    </div>

                    {/* Text Typography */}
                    <div>
                      <h4 style={{ color: 'var(--accent-gold)', marginBottom: '12px', fontSize: '14px', borderBottom: '1px solid var(--border-subtle)', paddingBottom: '4px' }}>Typography Colors</h4>
                      <div className="form-group" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '8px' }}>
                        <label style={{ margin: 0, fontSize: '12px' }}>Primary Text</label>
                        <input 
                          type="color" 
                          value={customColors.textPrimary || defaultCustomColors.textPrimary} 
                          onChange={(e) => setCustomColors(prev => ({
                            ...prev,
                            textPrimary: e.target.value
                          }))}
                        />
                      </div>
                      <div className="form-group" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '8px' }}>
                        <label style={{ margin: 0, fontSize: '12px' }}>Secondary Text</label>
                        <input 
                          type="color" 
                          value={customColors.textSecondary || defaultCustomColors.textSecondary} 
                          onChange={(e) => setCustomColors(prev => ({
                            ...prev,
                            textSecondary: e.target.value
                          }))}
                        />
                      </div>
                      <div className="form-group" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '8px' }}>
                        <label style={{ margin: 0, fontSize: '12px' }}>Muted Text</label>
                        <input 
                          type="color" 
                          value={customColors.textMuted || defaultCustomColors.textMuted} 
                          onChange={(e) => setCustomColors(prev => ({
                            ...prev,
                            textMuted: e.target.value
                          }))}
                        />
                      </div>
                    </div>

                    {/* Accents */}
                    <div>
                      <h4 style={{ color: 'var(--accent-gold)', marginBottom: '12px', fontSize: '14px', borderBottom: '1px solid var(--border-subtle)', paddingBottom: '4px' }}>Accent Colors</h4>
                      <div className="form-group" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '8px' }}>
                        <label style={{ margin: 0, fontSize: '12px' }}>Accent Gold / Core</label>
                        <input 
                          type="color" 
                          value={customColors.accentGold || defaultCustomColors.accentGold} 
                          onChange={(e) => {
                            const newAccent = e.target.value;
                            const glow = hexToRgba(newAccent, 0.15);
                            const border = hexToRgba(newAccent, 0.45);
                            setCustomColors(prev => ({
                              ...prev,
                              accentGold: newAccent,
                              accentGoldGlow: glow,
                              borderGold: border
                            }));
                          }}
                        />
                      </div>
                      <div className="form-group" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '8px' }}>
                        <label style={{ margin: 0, fontSize: '12px' }}>Accent Light (Hover)</label>
                        <input 
                          type="color" 
                          value={customColors.accentGoldLight || defaultCustomColors.accentGoldLight} 
                          onChange={(e) => setCustomColors(prev => ({
                            ...prev,
                            accentGoldLight: e.target.value
                          }))}
                        />
                      </div>
                    </div>

                    {/* Borders */}
                    <div>
                      <h4 style={{ color: 'var(--accent-gold)', marginBottom: '12px', fontSize: '14px', borderBottom: '1px solid var(--border-subtle)', paddingBottom: '4px' }}>Border Colors</h4>
                      <div className="form-group" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '8px' }}>
                        <label style={{ margin: 0, fontSize: '12px' }}>Subtle Borders</label>
                        <input 
                          type="color" 
                          value={customColors.borderSubtle || defaultCustomColors.borderSubtle} 
                          onChange={(e) => setCustomColors(prev => ({
                            ...prev,
                            borderSubtle: e.target.value
                          }))}
                        />
                      </div>
                    </div>
                  </div>
                </div>
                <div className="modal-footer">
                  <button 
                    type="button"
                    className="btn btn-secondary" 
                    onClick={() => {
                      if (confirm("Reset custom colors to default luxury gold palette?")) {
                        setCustomColors({ ...defaultCustomColors });
                      }
                    }}
                  >
                    Reset to Defaults
                  </button>
                  <button 
                    type="button"
                    className="btn btn-primary" 
                    onClick={() => setIsThemeCustomizerOpen(false)}
                  >
                    Close & Apply
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Mount App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    // Check if React mounted successfully after 4 seconds
    setTimeout(function() {
      var rootEl = document.getElementById('root');
      if (rootEl && rootEl.childNodes.length === 0) {
        var errFallback = document.getElementById('error-fallback');
        var errMsg = document.getElementById('error-message');
        if (!errMsg.innerText.trim()) {
          errFallback.style.display = 'block';
          var missingLibs = [];
          if (!window.React) missingLibs.push('React');
          if (!window.ReactDOM) missingLibs.push('ReactDOM');
          if (!window.Babel) missingLibs.push('Babel Standalone');
          if (!window.MASTER_PRODUCTS) missingLibs.push('products.js (Master Catalog)');
          
          if (missingLibs.length > 0) {
            errMsg.innerText = 'The following required libraries failed to load:\n- ' + missingLibs.join('\n- ') + 
              '\n\nThis usually means you are missing required files or the local paths are incorrect.\n' +
              'Please verify that the "libs" directory containing react.production.min.js, react-dom.production.min.js, and babel.min.js is present next to index.html.';
          } else {
            errMsg.innerText = 'React application failed to initialize.\n' +
              'This might be due to a compilation error in the Babel script block. Please check the browser DevTools Console (F12) for detailed logs.';
          }
        }
      }
    }, 4000);
  </script>
</body>
</html>
