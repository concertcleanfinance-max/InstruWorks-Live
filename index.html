    /* =========================================================================
       6. TEAM MANAGEMENT PAGE COMPONENT
       ========================================================================= */
    function TeamPage({ users, setUsers, activeUser, setActiveUser, compPrefix }) {
      const [editingUser, setEditingUser] = React.useState(null);
      const [isAddUserOpen, setIsAddUserOpen] = React.useState(false);
      const [userForm, setUserForm] = React.useState({ name: '', role: '', pin: '' });

      const handleAddSubmit = (e) => {
        e.preventDefault();
        if (!userForm.name.trim() || !userForm.role.trim() || !userForm.pin.trim()) {
          alert('All fields are required.');
          return;
        }
        if (userForm.pin.length !== 4 || isNaN(userForm.pin)) {
          alert('PIN must be a 4-digit number.');
          return;
        }

        const newUser = {
          name: userForm.name.trim(),
          role: userForm.role.trim(),
          initials: userForm.name.trim().charAt(0).toUpperCase(),
          pin: userForm.pin.trim()
        };

        setUsers(prev => [...prev, newUser]);
        setIsAddUserOpen(false);
        setUserForm({ name: '', role: '', pin: '' });
      };

      const handleEditClick = (user) => {
        setEditingUser(user);
        setUserForm({
          name: user.name,
          role: user.role,
          pin: user.pin
        });
      };

      const handleEditSubmit = (e) => {
        e.preventDefault();
        if (!userForm.name.trim() || !userForm.role.trim() || !userForm.pin.trim()) {
          alert('All fields are required.');
          return;
        }
        if (userForm.pin.length !== 4 || isNaN(userForm.pin)) {
          alert('PIN must be a 4-digit number.');
          return;
        }

        setUsers(prev => prev.map(u => u.name === editingUser.name ? {
          ...u,
          name: userForm.name.trim(),
          role: userForm.role.trim(),
          initials: userForm.name.trim().charAt(0).toUpperCase(),
          pin: userForm.pin.trim()
        } : u));

        // If the edited user is the current active user, update activeUser state
        if (activeUser && activeUser.name === editingUser.name) {
          const updatedActive = {
            ...activeUser,
            name: userForm.name.trim(),
            role: userForm.role.trim(),
            initials: userForm.name.trim().charAt(0).toUpperCase(),
            pin: userForm.pin.trim()
          };
          localStorage.setItem(`${compPrefix}active_user`, JSON.stringify(updatedActive));
          setActiveUser(updatedActive);
        }

        setEditingUser(null);
        setUserForm({ name: '', role: '', pin: '' });
      };

      const handleDeleteClick = (userName) => {
        if (users.length <= 1) {
          alert('Cannot delete the only remaining user. The system requires at least one active user profile.');
          return;
        }
        if (confirm(`Are you sure you want to delete the technician profile for ${userName}?`)) {
          setUsers(prev => prev.filter(u => u.name !== userName));
          if (activeUser && activeUser.name === userName) {
            localStorage.removeItem(`${compPrefix}active_user`);
            window.location.reload();
          }
        }
      };

      return (
        <div style={{ maxWidth: '800px', margin: '0 auto' }}>
          <div className="flex-space" style={{ marginBottom: '24px' }}>
            <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '22px' }}>Technician Profiles & Access</h3>
            {activeUser && activeUser.name === 'Matt' && (
              <button type="button" className="btn btn-primary" onClick={() => { setUserForm({ name: '', role: '', pin: '' }); setIsAddUserOpen(true); }}>
                <span style={{ marginRight: '6px', display: 'inline-block', verticalAlign: 'middle', marginTop: '-2px' }}>
                  <Icon name="plus" size={14} />
                </span> Add New Tech
              </button>
            )}
          </div>

          <div className="grid-2" style={{ gap: '20px' }}>
            {users.map(u => (
              <div className="card" key={u.name} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
                  <div className="user-avatar-circle" style={{ width: '48px', height: '48px', fontSize: '18px' }}>
                    {u.initials}
                  </div>
                  <div>
                    <h4 style={{ margin: 0, fontSize: '16px' }}>{u.name}</h4>
                    <span className="text-muted" style={{ fontSize: '12px', display: 'block' }}>{u.role}</span>
                    <code style={{ fontSize: '11px', color: 'var(--accent-gold)' }}>
                      PIN: {activeUser && (activeUser.name === 'Matt' || activeUser.name === u.name) ? u.pin : '****'}
                    </code>
                  </div>
                </div>
                {activeUser && (activeUser.name === 'Matt' || activeUser.name === u.name) && (
                  <div style={{ display: 'flex', gap: '8px' }}>
                    <button type="button" className="btn btn-secondary" style={{ padding: '8px' }} onClick={() => handleEditClick(u)}>
                      <span style={{ display: 'inline-block', verticalAlign: 'middle' }}><Icon name="edit" size={14} /></span>
                    </button>
                    <button type="button" className="btn btn-danger" style={{ padding: '8px' }} onClick={() => handleDeleteClick(u.name)}>
                      <span style={{ display: 'inline-block', verticalAlign: 'middle' }}><Icon name="trash" size={14} /></span>
                    </button>
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* ADD USER MODAL */}
          {isAddUserOpen && (
            <div className="modal-overlay">
              <div className="modal-content" style={{ maxWidth: '400px' }}>
                <div className="modal-header">
                  <h3>Add Technician Profile</h3>
                  <button type="button" className="close-btn" onClick={() => setIsAddUserOpen(false)}>&times;</button>
                </div>
                <form onSubmit={handleAddSubmit}>
                  <div className="modal-body">
                    <div className="form-group">
                      <label>Technician Name</label>
                      <input 
                        type="text" 
                        required 
                        className="input-control" 
                        placeholder="e.g. Holly"
                        value={userForm.name}
                        onChange={(e) => setUserForm({ ...userForm, name: e.target.value })}
                      />
                    </div>
                    <div className="form-group">
                      <label>Role / Specialty</label>
                      <input 
                        type="text" 
                        required 
                        className="input-control" 
                        placeholder="e.g. Brass Technician"
                        value={userForm.role}
                        onChange={(e) => setUserForm({ ...userForm, role: e.target.value })}
                      />
                    </div>
                    <div className="form-group">
                      <label>4-Digit Login PIN</label>
                      <input 
                        type="password" 
                        maxLength="4" 
                        required 
                        className="input-control" 
                        placeholder="e.g. 3333"
                        value={userForm.pin}
                        onChange={(e) => setUserForm({ ...userForm, pin: e.target.value })}
                      />
                    </div>
                  </div>
                  <div className="modal-footer">
                    <button type="button" className="btn btn-secondary" onClick={() => setIsAddUserOpen(false)}>Cancel</button>
                    <button type="submit" className="btn btn-primary">Add Tech</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* EDIT USER MODAL */}
          {editingUser && (
            <div className="modal-overlay">
              <div className="modal-content" style={{ maxWidth: '400px' }}>
                <div className="modal-header">
                  <h3>Edit Technician Profile</h3>
                  <button type="button" className="close-btn" onClick={() => setEditingUser(null)}>&times;</button>
                </div>
                <form onSubmit={handleEditSubmit}>
                  <div className="modal-body">
                    <div className="form-group">
                      <label>Technician Name</label>
                      <input 
                        type="text" 
                        required 
                        className="input-control" 
                        value={userForm.name}
                        onChange={(e) => setUserForm({ ...userForm, name: e.target.value })}
                      />
                    </div>
                    <div className="form-group">
                      <label>Role / Specialty</label>
                      <input 
                        type="text" 
                        required 
                        className="input-control" 
                        value={userForm.role}
                        onChange={(e) => setUserForm({ ...userForm, role: e.target.value })}
                      />
                    </div>
                    <div className="form-group">
                      <label>4-Digit Login PIN</label>
                      <input 
                        type="text" 
                        maxLength="4" 
                        required 
                        className="input-control" 
                        value={userForm.pin}
                        onChange={(e) => setUserForm({ ...userForm, pin: e.target.value })}
                      />
                    </div>
                  </div>
                  <div className="modal-footer">
                    <button type="button" className="btn btn-secondary" onClick={() => setEditingUser(null)}>Cancel</button>
                    <button type="submit" className="btn btn-primary">Save Changes</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }


    /* =========================================================================
       7. PRODUCT SALES REGISTER COMPONENT
       ========================================================================= */
    function ProductSalesPage({ inventory, setInventory, clients, setClients, setInvoices, setActiveTab }) {
      const [clientSearchText, setClientSearchText] = React.useState('');
      const [showClientSuggestions, setShowClientSuggestions] = React.useState(false);
      const [selectedClient, setSelectedClient] = React.useState(null);

      // Client details form (for registering a new client)
      const [clientForm, setClientForm] = React.useState({
        name: '',
        phone: '',
        email: '',
        address: ''
      });

      const [schoolName, setSchoolName] = React.useState('');
      const [schoolPo, setSchoolPo] = React.useState('');

      // Cart Builder State
      const [cart, setCart] = React.useState([]);
      const [productSearchText, setProductSearchText] = React.useState('');
      const [showProductSuggestions, setShowProductSuggestions] = React.useState(false);

      const suggestedClients = React.useMemo(() => {
        if (!clientSearchText.trim()) return [];
        const lower = clientSearchText.toLowerCase();
        return clients.filter(c => 
          c.name.toLowerCase().includes(lower) || 
          (c.phone && c.phone.toLowerCase().includes(lower)) ||
          (c.email && c.email.toLowerCase().includes(lower))
        ).slice(0, 10);
      }, [clientSearchText, clients]);

      const suggestedProducts = React.useMemo(() => {
        if (!productSearchText.trim()) return [];
        const lower = productSearchText.toLowerCase();
        return inventory.filter(p => 
          (p.sku || '').toLowerCase().includes(lower) || 
          (p.name || '').toLowerCase().includes(lower)
        ).slice(0, 10);
      }, [productSearchText, inventory]);

      const handleAddProductToCart = (product) => {
        const existing = cart.find(item => item.id === product.id);
        if (existing) {
          setCart(cart.map(item => 
            item.id === product.id ? { ...item, qty: item.qty + 1 } : item
          ));
        } else {
          setCart([...cart, { ...product, qty: 1 }]);
        }
        setProductSearchText('');
        setShowProductSuggestions(false);
      };

      const handleUpdateCartQty = (productId, qty) => {
        if (qty <= 0) {
          setCart(cart.filter(item => item.id !== productId));
        } else {
          setCart(cart.map(item => 
            item.id === productId ? { ...item, qty } : item
          ));
        }
      };

      const handleUpdateCartPrice = (productId, price) => {
        setCart(cart.map(item => 
          item.id === productId ? { ...item, price: parseFloat(price) || 0 } : item
        ));
      };

      const handleRemoveFromCart = (productId) => {
        setCart(cart.filter(item => item.id !== productId));
      };

      const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const cartTax = cartTotal / 11;
      const cartSubtotal = cartTotal - cartTax;

      const handleCompleteCheckout = (e) => {
        e.preventDefault();
        
        if (cart.length === 0) {
          alert("Your shopping cart is empty!");
          return;
        }

        // Determine client details
        let finalClient = null;
        if (selectedClient) {
          finalClient = selectedClient;
        } else {
          if (!clientForm.name.trim()) {
            alert("Please enter a customer name or select an existing client.");
            return;
          }
          finalClient = {
            id: `CLI-${Date.now().toString().slice(-4)}`,
            name: clientForm.name.trim(),
            phone: clientForm.phone.trim() || '-',
            email: clientForm.email.trim() || '-',
            address: clientForm.address.trim() || '',
            notes: schoolName ? `School: ${schoolName}` : ''
          };
          // Save new client to clients list
          setClients(prev => [...prev, finalClient]);
        }

        // Deduct items from stock
        const stockUpdates = new Map();
        cart.forEach(item => {
          stockUpdates.set(item.id, item.qty);
        });

        // Check stock availability (warning only)
        const insufficientItems = cart.filter(item => item.stock < item.qty);
        if (insufficientItems.length > 0) {
          const names = insufficientItems.map(item => `"${item.name}" (Requested: ${item.qty}, In Stock: ${item.stock})`).join('\n');
          const proceed = confirm(`Warning: The following items have insufficient stock:\n\n${names}\n\nDo you want to proceed anyway? This will result in negative stock counts.`);
          if (!proceed) return;
        }

        setInventory(prev => prev.map(p => {
          if (stockUpdates.has(p.id)) {
            return { ...p, stock: (p.stock || 0) - stockUpdates.get(p.id) };
          }
          return p;
        }));

        // Generate Invoice
        const lineItems = cart.map(item => ({
          description: `Product Sale - ${item.name}`,
          qty: item.qty,
          unitPrice: item.price,
          xeroAccountCode: '420' // Retail sales code
        }));

        const newInvoice = {
          id: `INV-${Date.now().toString().slice(-4)}`,
          client: { 
            name: finalClient.name, 
            phone: finalClient.phone, 
            email: finalClient.email 
          },
          lineItems,
          subtotal: parseFloat(cartSubtotal.toFixed(2)),
          tax: parseFloat(cartTax.toFixed(2)),
          total: parseFloat(cartTotal.toFixed(2)),
          xeroSyncStatus: 'unsynced',
          schoolPo: schoolPo.trim() || '',
          createdAt: new Date().toISOString()
        };

        setInvoices(prev => [newInvoice, ...prev]);
        alert(`Retail sale recorded successfully! Total: $${cartTotal.toFixed(2)}. Invoice generated: ${newInvoice.id}`);
        
        // Reset Page
        setCart([]);
        setClientSearchText('');
        setSelectedClient(null);
        setClientForm({ name: '', phone: '', email: '', address: '' });
        setSchoolName('');
        setSchoolPo('');
        
        // Redirect to Invoices Tab
        setActiveTab('invoices');
      };

      return (
        <div className="grid-2" style={{ gap: '24px', alignItems: 'start' }}>
          {/* Customer & Details Card */}
          <div className="card">
            <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '18px', marginBottom: '16px', display: 'flex', alignItems: 'center', gap: '8px' }}>
              <Icon name="user" className="text-gold" /> Customer Checkout Info
            </h3>

            <div className="form-group autocomplete-wrapper" style={{ marginBottom: '16px' }}>
              <label>Search Existing Clients</label>
              <input 
                type="text" 
                className="input-control" 
                placeholder="Search by name, phone, or email..."
                value={clientSearchText}
                onChange={(e) => {
                  setClientSearchText(e.target.value);
                  setShowClientSuggestions(true);
                  if (!e.target.value.trim()) {
                    setSelectedClient(null);
                  }
                }}
                onFocus={() => setShowClientSuggestions(true)}
                onBlur={() => setTimeout(() => setShowClientSuggestions(false), 200)}
              />
              {showClientSuggestions && suggestedClients.length > 0 && (
                <ul className="autocomplete-list">
                  {suggestedClients.map(c => (
                    <li 
                      key={c.id} 
                      className="autocomplete-item"
                      onClick={() => {
                        setSelectedClient(c);
                        setClientSearchText(c.name);
                        setShowClientSuggestions(false);
                      }}
                    >
                      {c.name} - {c.phone} | {c.email}
                    </li>
                  ))}
                </ul>
              )}
            </div>

            {selectedClient ? (
              <div className="card" style={{ padding: '12px', backgroundColor: 'var(--bg-tertiary)', border: '1px solid var(--border-gold)', marginBottom: '16px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div>
                    <strong>Selected Client: {selectedClient.name}</strong>
                    <span style={{ display: 'block', fontSize: '12px', color: 'var(--text-secondary)' }}>
                      Phone: {selectedClient.phone} | Email: {selectedClient.email}
                    </span>
                  </div>
                  <button 
                    type="button" 
                    className="btn btn-secondary" 
                    style={{ padding: '4px 8px', fontSize: '12px' }}
                    onClick={() => {
                      setSelectedClient(null);
                      setClientSearchText('');
                    }}
                  >
                    Clear
                  </button>
                </div>
              </div>
            ) : (
              <div className="card" style={{ padding: '16px', backgroundColor: 'var(--bg-tertiary)', marginBottom: '16px' }}>
                <h4 style={{ fontSize: '13px', color: 'var(--accent-gold)', marginBottom: '8px' }}>Or Register New Customer</h4>
                <div className="form-group" style={{ marginBottom: '8px' }}>
                  <label>Full Name</label>
                  <input 
                    type="text" 
                    className="input-control" 
                    placeholder="John Doe"
                    value={clientForm.name}
                    onChange={(e) => setClientForm({ ...clientForm, name: e.target.value })}
                  />
                </div>
                <div className="form-row" style={{ gap: '12px', marginBottom: '8px' }}>
                  <div className="form-group" style={{ margin: 0 }}>
                    <label>Phone</label>
                    <input 
                      type="text" 
                      className="input-control" 
                      placeholder="0400 123 456"
                      value={clientForm.phone}
                      onChange={(e) => setClientForm({ ...clientForm, phone: e.target.value })}
                    />
                  </div>
                  <div className="form-group" style={{ margin: 0 }}>
                    <label>Email</label>
                    <input 
                      type="email" 
                      className="input-control" 
                      placeholder="john@example.com"
                      value={clientForm.email}
                      onChange={(e) => setClientForm({ ...clientForm, email: e.target.value })}
                    />
                  </div>
                </div>
                <div className="form-group" style={{ margin: 0 }}>
                  <label>Address</label>
                  <input 
                    type="text" 
                    className="input-control" 
                    placeholder="123 High St, Melbourne"
                    value={clientForm.address}
                    onChange={(e) => setClientForm({ ...clientForm, address: e.target.value })}
                  />
                </div>
              </div>
            )}

            <div className="form-row" style={{ gap: '12px' }}>
              <div className="form-group">
                <label>School Name (Optional)</label>
                <input 
                  type="text" 
                  className="input-control" 
                  placeholder="e.g. Melbourne Grammar"
                  value={schoolName}
                  onChange={(e) => setSchoolName(e.target.value)}
                />
              </div>
              <div className="form-group">
                <label>School Purchase Order (PO#)</label>
                <input 
                  type="text" 
                  className="input-control" 
                  placeholder="e.g. PO-88772"
                  value={schoolPo}
                  onChange={(e) => setSchoolPo(e.target.value)}
                />
              </div>
            </div>
          </div>

          {/* Cart & Search Card */}
          <div className="card">
            <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '18px', marginBottom: '16px', display: 'flex', alignItems: 'center', gap: '8px' }}>
              <Icon name="shoppingbag" className="text-gold" /> Shopping Cart Register
            </h3>

            <div className="form-group autocomplete-wrapper" style={{ marginBottom: '16px' }}>
              <label>Search Product to Add (SKU / Name)</label>
              <input 
                type="text" 
                className="input-control" 
                placeholder="Search catalog..."
                value={productSearchText}
                onChange={(e) => {
                  setProductSearchText(e.target.value);
                  setShowProductSuggestions(true);
                }}
                onFocus={() => setShowProductSuggestions(true)}
                onBlur={() => setTimeout(() => setShowProductSuggestions(false), 200)}
              />
              {showProductSuggestions && suggestedProducts.length > 0 && (
                <ul className="autocomplete-list">
                  {suggestedProducts.map(p => (
                    <li 
                      key={p.id} 
                      className="autocomplete-item"
                      onClick={() => handleAddProductToCart(p)}
                    >
                      {p.name} (SKU: {p.sku}) - ${p.price.toFixed(2)} | Stock: {p.stock}
                    </li>
                  ))}
                </ul>
              )}
            </div>

            {cart.length > 0 ? (
              <div>
                <div className="table-container" style={{ maxHeight: '300px', overflowY: 'auto', marginBottom: '16px' }}>
                  <table className="custom-table" style={{ fontSize: '13px' }}>
                    <thead>
                      <tr>
                        <th>Product Name</th>
                        <th style={{ width: '100px' }}>Price</th>
                        <th style={{ width: '80px' }}>Qty</th>
                        <th style={{ width: '100px' }}>Total</th>
                        <th style={{ width: '40px' }}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {cart.map(item => (
                        <tr key={item.id}>
                          <td>
                            <strong>{item.name}</strong>
                            <div style={{ fontSize: '10px', color: 'var(--text-secondary)' }}>
                              SKU: {item.sku} | In stock: {item.stock}
                            </div>
                          </td>
                          <td>
                            <input 
                              type="number" 
                              step="0.01" 
                              className="input-control" 
                              style={{ width: '80px', padding: '4px' }} 
                              value={item.price}
                              onChange={(e) => handleUpdateCartPrice(item.id, e.target.value)}
                            />
                          </td>
                          <td>
                            <input 
                              type="number" 
                              min="1" 
                              className="input-control" 
                              style={{ width: '60px', padding: '4px' }} 
                              value={item.qty}
                              onChange={(e) => handleUpdateCartQty(item.id, parseInt(e.target.value) || 0)}
                            />
                          </td>
                          <td>${(item.price * item.qty).toFixed(2)}</td>
                          <td>
                            <button 
                              type="button" 
                              className="btn btn-danger" 
                              style={{ padding: '4px' }}
                              onClick={() => handleRemoveFromCart(item.id)}
                            >
                              &times;
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div className="card" style={{ padding: '12px', backgroundColor: 'var(--bg-tertiary)', marginBottom: '16px' }}>
                  <div className="flex-space" style={{ fontSize: '13px', color: 'var(--text-secondary)' }}>
                    <span>Subtotal (ex GST):</span>
                    <span>${cartSubtotal.toFixed(2)}</span>
                  </div>
                  <div className="flex-space" style={{ fontSize: '13px', color: 'var(--text-secondary)', marginTop: '4px' }}>
                    <span>GST (10%):</span>
                    <span>${cartTax.toFixed(2)}</span>
                  </div>
                  <hr style={{ border: 0, borderBottom: '1px solid var(--border-subtle)', margin: '8px 0' }} />
                  <div className="flex-space" style={{ fontWeight: 'bold', fontSize: '16px' }}>
                    <span className="text-gold">Total Due:</span>
                    <span className="text-gold">${cartTotal.toFixed(2)}</span>
                  </div>
                </div>

                <button 
                  type="button" 
                  className="btn btn-primary" 
                  style={{ width: '100%', padding: '12px', fontSize: '15px' }}
                  onClick={handleCompleteCheckout}
                >
                  Confirm Sale & Generate Invoice
                </button>
              </div>
            ) : (
              <div className="card" style={{ textAlign: 'center', padding: '40px 20px', color: 'var(--text-secondary)' }}>
                🛒 Cart is empty. Search products above to add items.
              </div>
            )}
          </div>
        </div>
      );
    }


    /* =========================================================================
       8. REPORTS & ANALYTICS COMPONENT
       ========================================================================= */
    function ReportsPage({ repairs, invoices, inventory }) {
      const [expandedMonth, setExpandedMonth] = React.useState(null);

      // Create a map of inventory to quickly look up cost price
      const inventoryMap = React.useMemo(() => {
        const m = new Map();
        inventory.forEach(p => {
          m.set(p.id, p);
          if (p.sku) m.set(p.sku, p);
        });
        return m;
      }, [inventory]);

      const monthlyData = React.useMemo(() => {
        const months = {};

        invoices.forEach(inv => {
          const dateStr = inv.createdAt || inv.syncedAt || '2026-06-01';
          const monthKey = dateStr.slice(0, 7); // 'YYYY-MM'

          if (!months[monthKey]) {
            months[monthKey] = {
              monthKey,
              revenue: 0,
              cost: 0,
              repairsCount: 0,
              salesCount: 0,
              invoices: []
            };
          }

          const mObj = months[monthKey];
          mObj.revenue += inv.total;
          mObj.invoices.push(inv);

          // Calculate cost
          if (inv.repairJobId) {
            mObj.repairsCount += 1;
            // Try to find the repair record
            const rep = repairs.find(r => r.id === inv.repairJobId);
            if (rep) {
              const laborCost = (rep.laborHours || 0) * 60; // $60/hr wholesale labor cost
              let partsCost = 0;
              (rep.partsUsed || []).forEach(part => {
                const prod = inventoryMap.get(part.id) || inventoryMap.get(part.sku);
                const unitCost = prod ? (prod.costPrice || (prod.price * 0.6)) : (part.price * 0.6);
                partsCost += unitCost * (part.qty || 1);
              });
              mObj.cost += (laborCost + partsCost);
            } else {
              // Fallback if repair not found in current list
              mObj.cost += inv.total * 0.6;
            }
          } else {
            mObj.salesCount += 1;
            // Retail sale cost lookup
            let saleCost = 0;
            (inv.lineItems || []).forEach(li => {
              // Try to parse product name from "Product Sale - [name]" or "Retail Sale - [name]"
              let pName = li.description;
              if (pName.startsWith("Product Sale - ")) pName = pName.replace("Product Sale - ", "");
              if (pName.startsWith("Retail Sale - ")) pName = pName.replace("Retail Sale - ", "");
              
              // Find product in inventory by name or sku
              const prod = inventory.find(p => p.name === pName || p.sku === pName) || inventoryMap.get(pName);
              const unitCost = prod ? (prod.costPrice || (prod.price * 0.6)) : (li.unitPrice * 0.6);
              saleCost += unitCost * (li.qty || 1);
            });
            mObj.cost += saleCost;
          }
        });

        // Convert to array and sort descending by month
        return Object.values(months).sort((a, b) => b.monthKey.localeCompare(a.monthKey));
      }, [invoices, repairs, inventory, inventoryMap]);

      const formatMonthName = (monthStr) => {
        try {
          const [year, month] = monthStr.split('-');
          const d = new Date(parseInt(year), parseInt(month) - 1, 1);
          return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        } catch (e) {
          return monthStr;
        }
      };

      const calculateInvoiceProfitInfo = (inv) => {
        let revenue = inv.total;
        let cost = 0;
        let type = 'Product Sale';
        let details = '';

        if (inv.repairJobId) {
          type = `Repair (${inv.repairJobId})`;
          const rep = repairs.find(r => r.id === inv.repairJobId);
          if (rep) {
            const laborCost = (rep.laborHours || 0) * 60;
            let partsCost = 0;
            (rep.partsUsed || []).forEach(part => {
              const prod = inventoryMap.get(part.id) || inventoryMap.get(part.sku);
              const unitCost = prod ? (prod.costPrice || (prod.price * 0.6)) : (part.price * 0.6);
              partsCost += unitCost * (part.qty || 1);
            });
            cost = laborCost + partsCost;
            details = `${rep.instrument.make} ${rep.instrument.model} - ${rep.laborHours || 0} hrs labor`;
          } else {
            cost = inv.total * 0.6;
            details = 'Repair details unavailable';
          }
        } else {
          // Direct Product Sale
          let itemsDesc = [];
          (inv.lineItems || []).forEach(li => {
            let pName = li.description;
            if (pName.startsWith("Product Sale - ")) pName = pName.replace("Product Sale - ", "");
            if (pName.startsWith("Retail Sale - ")) pName = pName.replace("Retail Sale - ", "");
            
            const prod = inventory.find(p => p.name === pName || p.sku === pName) || inventoryMap.get(pName);
            const unitCost = prod ? (prod.costPrice || (prod.price * 0.6)) : (li.unitPrice * 0.6);
            cost += unitCost * (li.qty || 1);
            itemsDesc.push(`${pName} (x${li.qty})`);
          });
          details = itemsDesc.join(', ');
        }

        const profit = revenue - cost;
        const margin = revenue > 0 ? (profit / revenue) * 100 : 0;

        return { type, details, cost, profit, margin };
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>
          <div className="card">
            <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '20px', marginBottom: '12px', display: 'flex', alignItems: 'center', gap: '8px' }}>
              <Icon name="barchart" className="text-gold" /> Monthly Cash Flow & Profits
            </h3>
            <p className="text-muted" style={{ fontSize: '13px', marginBottom: '20px' }}>
              Summary of all invoices, parts markups, and technician labor margins grouped by month. Costs are calculated using $60/hour technician shop rate and actual product cost price.
            </p>

            <div className="table-container">
              <table className="custom-table">
                <thead>
                  <tr>
                    <th>Month</th>
                    <th>Invoiced Revenue</th>
                    <th>Wholesale Costs</th>
                    <th>Net Profit</th>
                    <th>Margin</th>
                    <th>Volume (Repairs / Sales)</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {monthlyData.map(m => {
                    const profit = m.revenue - m.cost;
                    const margin = m.revenue > 0 ? (profit / m.revenue) * 100 : 0;
                    const isExpanded = expandedMonth === m.monthKey;
                    
                    return (
                      <React.Fragment key={m.monthKey}>
                        <tr>
                          <td><strong>{formatMonthName(m.monthKey)}</strong></td>
                          <td className="text-success" style={{ fontWeight: 'bold' }}>${m.revenue.toFixed(2)}</td>
                          <td style={{ color: '#f87171' }}>${m.cost.toFixed(2)}</td>
                          <td className="text-gold" style={{ fontWeight: 'bold' }}>${profit.toFixed(2)}</td>
                          <td>
                            <span className="badge" style={{ backgroundColor: 'rgba(197, 160, 89, 0.1)', color: 'var(--accent-gold)' }}>
                              {margin.toFixed(1)}%
                            </span>
                          </td>
                          <td>
                            🔧 {m.repairsCount} repairs | 📦 {m.salesCount} checkouts
                          </td>
                          <td>
                            <button 
                              className="btn btn-secondary"
                              style={{ padding: '6px 12px', fontSize: '12px' }}
                              onClick={() => setExpandedMonth(isExpanded ? null : m.monthKey)}
                            >
                              {isExpanded ? 'Hide Details' : 'View Itemized'}
                            </button>
                          </td>
                        </tr>

                        {isExpanded && (
                          <tr>
                            <td colSpan="7" style={{ padding: '16px', backgroundColor: 'var(--bg-secondary)' }}>
                              <h4 style={{ fontSize: '14px', color: 'var(--accent-gold)', marginBottom: '12px', borderBottom: '1px solid var(--border-subtle)', paddingBottom: '4px' }}>
                                Itemized Transactions for {formatMonthName(m.monthKey)}
                              </h4>
                              
                              <table className="custom-table" style={{ fontSize: '12px', backgroundColor: 'var(--bg-tertiary)' }}>
                                <thead>
                                  <tr>
                                    <th>Transaction ID</th>
                                    <th>Client / School</th>
                                    <th>Type</th>
                                    <th>Items / Details</th>
                                    <th>Revenue</th>
                                    <th>Estimated Cost</th>
                                    <th>Net Profit</th>
                                    <th>Margin</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {m.invoices.map(inv => {
                                    const { type, details, cost, profit, margin } = calculateInvoiceProfitInfo(inv);
                                    return (
                                      <tr key={inv.id}>
                                        <td><code>{inv.id}</code></td>
                                        <td>
                                          <strong>{inv.client.name}</strong>
                                          {inv.schoolPo && <div style={{ fontSize: '10px', color: 'var(--text-secondary)' }}>PO: {inv.schoolPo}</div>}
                                        </td>
                                        <td>{type}</td>
                                        <td style={{ maxWidth: '250px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={details}>
                                          {details}
                                        </td>
                                        <td className="text-success">${inv.total.toFixed(2)}</td>
                                        <td style={{ color: '#f87171' }}>${cost.toFixed(2)}</td>
                                        <td className="text-gold" style={{ fontWeight: 'bold' }}>${profit.toFixed(2)}</td>
                                        <td>{margin.toFixed(1)}%</td>
                                      </tr>
                                    );
                                  })}
                                </tbody>
                              </table>
                            </td>
                          </tr>
                        )}
                      </React.Fragment>
                    );
                  })}
                  {monthlyData.length === 0 && (
                    <tr>
                      <td colSpan="7" style={{ textAlign: 'center', padding: '30px', color: 'var(--text-muted)' }}>
                        No invoices logged to calculate cash flow report.
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }


    /* =========================================================================

       ========================================================================= */

        ],
        laborHours: 2.5,
        laborRate: 75.00,
