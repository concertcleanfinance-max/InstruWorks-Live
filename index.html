<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="InstruWorks Logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstruWorks - Workshop Console</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

  <!-- Local React & Babel Libraries (Offline & file:// Compatible) -->
  <script src="libs/react.production.min.js"></script>
  <script src="libs/react-dom.production.min.js"></script>
  <script src="libs/babel.min.js"></script>
  <!-- Consolidated Master Product Catalog -->
  <script src="products.js"></script>

  <style>
    :root {
      --font-sans: 'Plus Jakarta Sans', sans-serif;
      --font-serif: 'Playfair Display', serif;

      /* DEFAULT: DARK THEME (Charcoal & Gold) */
      --bg-primary: #0a0b0d;
      --bg-secondary: #12141a;
      --bg-tertiary: #1b1e26;
      
      --accent-gold: #c5a059;
      --accent-gold-light: #dfc28c;
      --accent-gold-glow: rgba(197, 160, 89, 0.15);
      
      --text-primary: #ffffff;
      --text-secondary: #d1d5db;
      --text-muted: #9ca3af;
      
      --border-subtle: #374151;
      --border-gold: rgba(197, 160, 89, 0.45);

      /* Status Colors */
      --status-received-bg: rgba(156, 163, 175, 0.15);
      --status-received-text: #cbd5e1;
      --status-inspection-bg: rgba(59, 130, 246, 0.15);
      --status-inspection-text: #93c5fd;
      --status-parts-bg: rgba(239, 68, 68, 0.2);
      --status-parts-text: #fca5a5;
      --status-progress-bg: rgba(245, 158, 11, 0.15);
      --status-progress-text: #fde047;
      --status-testing-bg: rgba(139, 92, 246, 0.15);
      --status-testing-text: #c4b5fd;
      --status-ready-bg: rgba(16, 185, 129, 0.15);
      --status-ready-text: #6ee7b7;
      --status-completed-bg: rgba(16, 185, 129, 0.25);
      --status-completed-text: #34d399;
      
      --sidebar-width: 260px;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
      
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.6);
      --shadow-gold: 0 0 15px rgba(197, 160, 89, 0.2);
    }

    /* LIGHT THEME (Artisan Cream & Copper-Gold) */
    body.theme-light {
      --bg-primary: #f5f6fa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #eaecf3;
      
      --accent-gold: #b38634;
      --accent-gold-light: #c5a059;
      --accent-gold-glow: rgba(179, 134, 52, 0.1);
      
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #475569;
      
      --border-subtle: #94a3b8;
      --border-gold: rgba(179, 134, 52, 0.55);

      --status-received-bg: rgba(71, 85, 105, 0.15);
      --status-received-text: #334155;
      --status-inspection-bg: rgba(37, 99, 235, 0.15);
      --status-inspection-text: #1d4ed8;
      --status-parts-bg: rgba(220, 38, 38, 0.15);
      --status-parts-text: #b91c1c;
      --status-progress-bg: rgba(217, 119, 6, 0.15);
      --status-progress-text: #b45309;
      --status-testing-bg: rgba(124, 58, 237, 0.15);
      --status-testing-text: #6d28d9;
      --status-ready-bg: rgba(5, 150, 105, 0.15);
      --status-ready-text: #047857;
      --status-completed-bg: rgba(5, 150, 105, 0.22);
      --status-completed-text: #059669;
      
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.12);
      --shadow-gold: 0 0 12px rgba(179, 134, 52, 0.15);
    }

    /* FOREST THEME (Velvet green case & Gold highlights) */
    body.theme-forest {
      --bg-primary: #0b1a13;
      --bg-secondary: #12281d;
      --bg-tertiary: #193627;
      
      --accent-gold: #dfc28c;
      --accent-gold-light: #f2e3c6;
      --accent-gold-glow: rgba(223, 194, 140, 0.15);
      
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #8eb89f;
      
      --border-subtle: #3a694e;
      --border-gold: rgba(223, 194, 140, 0.45);

      --status-received-bg: rgba(148, 163, 184, 0.15);
      --status-received-text: #cbd5e1;
      --status-inspection-bg: rgba(96, 165, 250, 0.15);
      --status-inspection-text: #93c5fd;
      --status-parts-bg: rgba(248, 113, 113, 0.2);
      --status-parts-text: #fca5a5;
      --status-progress-bg: rgba(251, 191, 36, 0.15);
      --status-progress-text: #fde047;
      --status-testing-bg: rgba(167, 139, 250, 0.15);
      --status-testing-text: #c4b5fd;
      --status-ready-bg: rgba(52, 211, 153, 0.15);
      --status-ready-text: #6ee7b7;
      --status-completed-bg: rgba(52, 211, 153, 0.25);
      --status-completed-text: #34d399;
    }

    /* COBALT THEME (Deep blue case & Gold highlights) */
    body.theme-cobalt {
      --bg-primary: #0a0e17;
      --bg-secondary: #101726;
      --bg-tertiary: #1b253b;
      
      --accent-gold: #c5a059;
      --accent-gold-light: #dfc28c;
      --accent-gold-glow: rgba(197, 160, 89, 0.15);
      
      --text-primary: #ffffff;
      --text-secondary: #cbd5e1;
      --text-muted: #7d93b0;
      
      --border-subtle: #394e75;
      --border-gold: rgba(197, 160, 89, 0.45);

      --status-received-bg: rgba(148, 163, 184, 0.15);
      --status-received-text: #cbd5e1;
      --status-inspection-bg: rgba(96, 165, 250, 0.15);
      --status-inspection-text: #93c5fd;
      --status-parts-bg: rgba(248, 113, 113, 0.2);
      --status-parts-text: #fca5a5;
      --status-progress-bg: rgba(251, 191, 36, 0.15);
      --status-progress-text: #fde047;
      --status-testing-bg: rgba(167, 139, 250, 0.15);
      --status-testing-text: #c4b5fd;
      --status-ready-bg: rgba(52, 211, 153, 0.15);
      --status-ready-text: #6ee7b7;
      --status-completed-bg: rgba(52, 211, 153, 0.25);
      --status-completed-text: #34d399;
    }

    /* ROSEWOOD THEME (Rich reddish-brown case & Warm copper/gold highlights) */
    body.theme-rosewood {
      --bg-primary: #180b0b;
      --bg-secondary: #241212;
      --bg-tertiary: #331a1a;
      
      --accent-gold: #e5a93b;
      --accent-gold-light: #f4d185;
      --accent-gold-glow: rgba(229, 169, 59, 0.15);
      
      --text-primary: #fdfaf7;
      --text-secondary: #e5c5c5;
      --text-muted: #b28a8a;
      
      --border-subtle: #6e3b3b;
      --border-gold: rgba(229, 169, 59, 0.45);

      --status-received-bg: rgba(204, 163, 163, 0.15);
      --status-received-text: #e5c5c5;
      --status-inspection-bg: rgba(96, 165, 250, 0.15);
      --status-inspection-text: #93c5fd;
      --status-parts-bg: rgba(248, 113, 113, 0.2);
      --status-parts-text: #fca5a5;
      --status-progress-bg: rgba(251, 191, 36, 0.15);
      --status-progress-text: #fde047;
      --status-testing-bg: rgba(167, 139, 250, 0.15);
      --status-testing-text: #c4b5fd;
      --status-ready-bg: rgba(52, 211, 153, 0.15);
      --status-ready-text: #6ee7b7;
      --status-completed-bg: rgba(52, 211, 153, 0.25);
      --status-completed-text: #34d399;
    }

    /* MIDNIGHT PURPLE THEME (Velvet dark purple case & Glowing violet/gold highlights) */
    body.theme-midnight {
      --bg-primary: #0f091a;
      --bg-secondary: #170e28;
      --bg-tertiary: #23153c;
      
      --accent-gold: #dfc28c;
      --accent-gold-light: #f5eada;
      --accent-gold-glow: rgba(223, 194, 140, 0.15);
      
      --text-primary: #f3f0f7;
      --text-secondary: #dcd6e8;
      --text-muted: #a68cc5;
      
      --border-subtle: #543887;
      --border-gold: rgba(223, 194, 140, 0.45);

      --status-received-bg: rgba(192, 179, 214, 0.15);
      --status-received-text: #dcd6e8;
      --status-inspection-bg: rgba(96, 165, 250, 0.15);
      --status-inspection-text: #93c5fd;
      --status-parts-bg: rgba(248, 113, 113, 0.2);
      --status-parts-text: #fca5a5;
      --status-progress-bg: rgba(251, 191, 36, 0.15);
      --status-progress-text: #fde047;
      --status-testing-bg: rgba(167, 139, 250, 0.15);
      --status-testing-text: #c4b5fd;
      --status-ready-bg: rgba(52, 211, 153, 0.15);
      --status-ready-text: #6ee7b7;
      --status-completed-bg: rgba(52, 211, 153, 0.25);
      --status-completed-text: #34d399;
    }

    /* CUSTOM THEMING SUPPORT */
    body.theme-custom {
      --bg-primary: var(--custom-bg-primary, #0a0b0d);
      --bg-secondary: var(--custom-bg-secondary, #12141a);
      --bg-tertiary: var(--custom-bg-tertiary, #1b1e26);
      
      --accent-gold: var(--custom-accent-gold, #c5a059);
      --accent-gold-light: var(--custom-accent-gold-light, #dfc28c);
      --accent-gold-glow: var(--custom-accent-gold-glow, rgba(197, 160, 89, 0.15));
      
      --text-primary: var(--custom-text-primary, #ffffff);
      --text-secondary: var(--custom-text-secondary, #d1d5db);
      --text-muted: var(--custom-text-muted, #9ca3af);
      
      --border-subtle: var(--custom-border-subtle, #374151);
      --border-gold: var(--custom-border-gold, rgba(197, 160, 89, 0.45));

      /* Status Colors (pastels for high contrast dark context) */
      --status-received-bg: rgba(156, 163, 175, 0.15);
      --status-received-text: #cbd5e1;
      --status-inspection-bg: rgba(59, 130, 246, 0.15);
      --status-inspection-text: #93c5fd;
      --status-parts-bg: rgba(239, 68, 68, 0.20);
      --status-parts-text: #fca5a5;
      --status-progress-bg: rgba(245, 158, 11, 0.15);
      --status-progress-text: #fde047;
      --status-testing-bg: rgba(139, 92, 246, 0.15);
      --status-testing-text: #c4b5fd;
      --status-ready-bg: rgba(16, 185, 129, 0.15);
      --status-ready-text: #6ee7b7;
      --status-completed-bg: rgba(16, 185, 129, 0.25);
      --status-completed-text: #34d399;
    }

    /* Global Reset & Basic Setup */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      overflow: hidden;
      height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    button, input, select, textarea {
      font-family: inherit;
      color: inherit;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-gold);
    }

    /* Dashboard Container */
    .app-container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Sidebar Navigation */
    .sidebar {
      width: var(--sidebar-width);
      background-color: var(--bg-secondary);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      z-index: 10;
      transition: background-color 0.3s ease, border-right 0.3s ease;
      overflow-y: auto;
    }

    .brand-section {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .brand-logo {
      font-size: 28px;
      background: linear-gradient(135deg, var(--accent-gold-light), var(--accent-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    .brand-info h1 {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-primary);
    }

    .brand-info p {
      font-size: 11px;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .nav-links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-grow: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 550;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      background: transparent;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover {
      color: var(--text-primary);
      background-color: var(--bg-tertiary);
      transform: translateX(4px);
    }

    .nav-item.active {
      color: #0a0b0d; /* Force dark text in active state for contrast */
      background: linear-gradient(135deg, var(--accent-gold-light), var(--accent-gold));
      font-weight: 600;
      box-shadow: var(--shadow-gold);
    }

    .nav-item.active svg {
      stroke: #0a0b0d;
    }

    .sidebar-footer {
      border-top: 1px solid var(--border-subtle);
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .xero-connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      padding: 10px 14px;
      background-color: var(--bg-tertiary);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #ef4444; /* Default offline */
      box-shadow: 0 0 8px #ef4444;
    }

    .status-indicator.connected {
      background-color: #10b981;
      box-shadow: 0 0 8px #10b981;
    }

    /* Main Content Area */
    .main-content {
      flex-grow: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-color: var(--bg-primary);
      transition: background-color 0.3s ease;
    }

    .header {
      height: 70px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      background-color: rgba(18, 20, 26, 0.1);
      backdrop-filter: blur(8px);
      transition: border-bottom 0.3s ease;
    }

    .header-title h2 {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 600;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .page-container {
      flex-grow: 1;
      padding: 32px;
      overflow-y: auto;
      height: calc(100vh - 70px);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-gold-light), var(--accent-gold));
      color: #0a0b0d;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-gold);
      filter: brightness(1.05);
    }

    .btn-secondary {
      background-color: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
    }

    .btn-secondary:hover {
      background-color: var(--border-subtle);
      color: var(--text-primary);
      transform: translateY(-2px);
    }

    .btn-danger {
      background-color: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    body.theme-light .btn-danger {
      background-color: rgba(220, 38, 38, 0.08);
      color: #dc2626;
      border-color: rgba(220, 38, 38, 0.15);
    }

    .btn-danger:hover {
      background-color: rgba(239, 68, 68, 0.2);
      transform: translateY(-2px);
    }

    /* Inputs & Form Controls */
    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-control {
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }

    .input-control:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 2px var(--accent-gold-glow);
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    /* Glassmorphism Cards */
    .card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: var(--border-gold);
      box-shadow: var(--shadow-md);
    }

    /* Kanban / Status Board */
    .kanban-board {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      align-items: flex-start;
      padding-bottom: 20px;
      width: 100%;
    }

    .kanban-column {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: calc(100vh - 220px);
      width: 280px;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .kanban-column-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-subtle);
      padding-bottom: 10px;
    }

    .kanban-column-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .kanban-column-count {
      font-size: 11px;
      background-color: var(--bg-tertiary);
      color: var(--text-secondary);
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: bold;
    }

    /* Repair Cards */
    .repair-card {
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .repair-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background-color: var(--accent-gold);
    }

    .repair-card:hover {
      transform: translateY(-2px);
      border-color: var(--border-gold);
      box-shadow: var(--shadow-sm);
    }

    .repair-card-tag {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 8px;
      display: inline-block;
    }

    .tag-brass {
      background-color: rgba(197, 160, 89, 0.15);
      color: var(--accent-gold-light);
    }

    body.theme-light .tag-brass {
      background-color: rgba(179, 134, 52, 0.1);
      color: #9a6a1a;
    }

    .tag-woodwind {
      background-color: rgba(52, 211, 153, 0.15);
      color: #34d399;
    }

    body.theme-light .tag-woodwind {
      background-color: rgba(4, 120, 87, 0.08);
      color: #047857;
    }

    .repair-card-title {
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .repair-card-client {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .repair-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border-subtle);
      padding-top: 8px;
      margin-top: 8px;
    }

    /* Status Badges */
    .status-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .status-received { background-color: var(--status-received-bg); color: var(--status-received-text); }
    .status-inspection { background-color: var(--status-inspection-bg); color: var(--status-inspection-text); }
    .status-parts { background-color: var(--status-parts-bg); color: var(--status-parts-text); }
    .status-progress { background-color: var(--status-progress-bg); color: var(--status-progress-text); }
    .status-testing { background-color: var(--status-testing-bg); color: var(--status-testing-text); }
    .status-ready { background-color: var(--status-ready-bg); color: var(--status-ready-text); }
    .status-completed { background-color: var(--status-completed-bg); color: var(--status-completed-text); }

    /* Grid Layouts */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .grid-inventory {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .grid-inventory {
        grid-template-columns: 1fr;
      }
    }

    /* Inventory List and Tables */
    .table-container {
      overflow-x: auto;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      background-color: var(--bg-secondary);
    }

    .custom-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
    }

    .custom-table th {

      color: var(--text-secondary);
      font-weight: 600;
      padding: 16px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .custom-table td {
      padding: 16px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-primary);
    }

    .custom-table tr:last-child td {
      border-bottom: none;
    }

    .custom-table tr:hover td {
      background-color: var(--bg-tertiary);
    }

    /* Modal Overlay & Modal Window */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .modal-content {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-gold);
      box-shadow: var(--shadow-lg), 0 0 25px rgba(197, 160, 89, 0.1);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 650px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 600;
    }

    .modal-body {
      padding: 24px;
    }

    .modal-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      background-color: var(--bg-tertiary);
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 24px;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .close-btn:hover {
      color: var(--text-primary);
    }

    /* Xero Integration Console Styles */
    .xero-console {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 1000px) {
      .xero-console {
        grid-template-columns: 1fr;
      }
    }

    .xero-sync-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .xero-payload-preview {
      background-color: #0d0e12;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 16px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      color: #34d399;
      max-height: 250px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    body.theme-light .xero-payload-preview {
      background-color: #0f172a;
      color: #38bdf8;
    }

    .badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .badge-low-stock {
      background-color: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    body.theme-light .badge-low-stock {
      background-color: rgba(220, 38, 38, 0.08);
      color: #dc2626;
      border-color: rgba(220, 38, 38, 0.2);
    }

    .badge-in-stock {
      background-color: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    body.theme-light .badge-in-stock {
      background-color: rgba(5, 150, 105, 0.08);
      color: #059669;
      border-color: rgba(5, 150, 105, 0.2);
    }

    /* Low Stock Alert Banner */
    .alert-banner {
      background: linear-gradient(90deg, rgba(239, 68, 68, 0.15) 0%, rgba(18, 20, 26, 0.2) 100%);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      color: #f87171;

    body.theme-light .alert-banner {
      background: linear-gradient(90deg, rgba(220, 38, 38, 0.08) 0%, #fff 100%);
      border-color: rgba(220, 38, 38, 0.15);
      color: #dc2626;
    }

    .alert-banner svg {
      stroke: #ef4444;
      flex-shrink: 0;
    }

    body.theme-light .alert-banner svg {

    }

    .alert-banner-content {
      font-size: 14px;
    }

    /* Utility layout styles */
    .flex-space {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .flex-align {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .text-gold {
      color: var(--accent-gold);
    }

    .text-muted {
      color: var(--text-muted);
    }

      margin-top: 24px;
    }

    .mr-8 {
      margin-right: 8px;
    }

      gap: 16px;

      align-items: center;

    .stat-icon {

      height: 44px;

      align-items: center;
      justify-content: center;
      border: 1px solid var(--border-subtle);
      flex-shrink: 0;

    .stat-card:hover .stat-icon {

      color: var(--accent-gold);
    }

    .stat-number {
      font-size: 22px;
      font-weight: 700;
      margin-top: 4px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Detail tabs in Repair Modal */
    .modal-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 20px;
      gap: 8px;
      padding: 0 24px;
    }

    .modal-tab {
      padding: 12px 16px;
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      background: transparent;
    }

    .modal-tab.active {
      color: var(--accent-gold);
      border-bottom-color: var(--accent-gold);
    }

    .modal-tab:hover {
      color: var(--text-primary);
    }

    /* Theme Switcher buttons in Header */
    .theme-selector {
      display: flex;
      gap: 6px;
      background-color: var(--bg-tertiary);
      padding: 4px;
      border-radius: 20px;
      border: 1px solid var(--border-subtle);
    }

    .theme-btn {
      border: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s;
    }

    .theme-btn:hover {
      transform: scale(1.2);
    }

    .theme-btn.active::after {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      border: 2px solid var(--accent-gold);
      border-radius: 50%;
    }

    /* Autocomplete list styles */
    .autocomplete-wrapper {
      position: relative;
    }
    
    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      z-index: 100;
      max-height: 180px;
      overflow-y: auto;
      box-shadow: var(--shadow-md);
      list-style: none;
    }

    .autocomplete-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .autocomplete-item:hover {
      background-color: var(--bg-tertiary);
      color: var(--accent-gold);
    }

    /* Client Details Layout (Left & Right Split) */
    .clients-split {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 850px) {
      .clients-split {
        grid-template-columns: 1fr;
      }
    }

    /* Keyframes for spinning loader */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at center, #1b202c 0%, #08090d 100%);
      position: relative;
      overflow-y: auto;
      padding: 40px 20px;
    }

    .login-container::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(197, 160, 89, 0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1;
    }

    .login-card {

      max-width: 440px;
      padding: 30px 24px;
      text-align: center;
      background: rgba(18, 20, 26, 0.75);

      border-radius: var(--radius-lg);

      z-index: 2;
      position: relative;
      animation: fadeIn 0.6s ease-out;
    }

    .login-logo {

      height: 90px;
      object-fit: contain;
      margin-bottom: 16px;
      border-radius: 12px;
      transition: transform 0.3s ease;
    }

    .login-logo:hover {
      transform: scale(1.05) rotate(3deg);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-profile-list {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 24px 0;
    }

    .user-profile-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: none;
      border: 2px solid transparent;
      padding: 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.25s ease;
      width: 90px;
    }

    .user-profile-btn:hover {
      color: var(--text-primary);
      background-color: rgba(27, 30, 38, 0.6);
      transform: translateY(-4px);
    }

    .user-profile-btn.selected {
      border-color: var(--accent-gold);
      background-color: rgba(27, 30, 38, 0.8);
      color: var(--accent-gold-light);
    }

    .user-avatar-circle {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-gold-light), var(--accent-gold));
      color: #0a0b0d;
      font-weight: 700;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      transition: all 0.25s ease;
    }

    .user-profile-btn:hover .user-avatar-circle {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
    }

    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 240px;
      margin: 20px auto 0 auto;
    }

    .pin-btn {
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .pin-btn:hover {
      background-color: var(--border-subtle);
      transform: scale(1.05);
    }

    .pin-dot-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 16px 0;
      height: 12px;
    }

    .pin-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--border-subtle);
      background-color: transparent;
    }

    .pin-dot.filled {
      background-color: var(--accent-gold);
      border-color: var(--accent-gold);
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
    }

    .user-badge-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-gold-light), var(--accent-gold));

      font-weight: bold;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .user-badge-info {
      text-align: left;
      line-height: 1.2;
    }

    /* Responsive scaling and spacing adjustments */
    @media (max-width: 1400px) {
      :root {
        --sidebar-width: 220px;
      }
      .page-container {
        padding: 20px;
      }
      .header {
        padding: 0 20px;
      }
    }

    .timeline-container {
      position: relative;
      padding-left: 20px;
      margin: 10px 0;
      border-left: 2px dashed var(--border-gold);
    }
    .timeline-item {
      position: relative;
      margin-bottom: 20px;
    }
    .timeline-item:last-child {
      margin-bottom: 0;
    }
    .timeline-dot {
      position: absolute;
      left: -29px;
      top: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .timeline-content {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 12px;
      font-size: 13px;
    }
    .timeline-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>

    /* =========================================================================
       1. REPAIRS PAGE COMPONENT
       ========================================================================= */
    function RepairsPage({ repairs, inventory, setInventory, clients, onSaveRepair, onDeleteRepair, onGenerateInvoice, instrumentLibrary, onUpdateInstrumentLibrary, activeUser, users, statusColumns, setStatusColumns, instrumentFilter, setInstrumentFilter }) {
      const [searchTerm, setSearchTerm] = React.useState('');
      
      const [isIntakeOpen, setIsIntakeOpen] = React.useState(false);
      const [selectedRepair, setSelectedRepair] = React.useState(null);
      const [activeModalTab, setActiveModalTab] = React.useState('details');

      // Column editing states
      const [editingColumnKey, setEditingColumnKey] = React.useState(null);
      const [tempColumnLabel, setTempColumnLabel] = React.useState('');

      // Intake Autocomplete States
      const [clientSearchText, setClientSearchText] = React.useState('');
      const [showClientSuggestions, setShowClientSuggestions] = React.useState(false);

      // Cascading Makes/Models States
      const [selectedCategory, setSelectedCategory] = React.useState('Woodwind');
      const [selectedType, setSelectedType] = React.useState('');
      const [selectedMake, setSelectedMake] = React.useState('');
      const [selectedModel, setSelectedModel] = React.useState('');

      // Custom fields overrides if "Other" is chosen
      const [customType, setCustomType] = React.useState('');
      const [customMake, setCustomMake] = React.useState('');
      const [customModel, setCustomModel] = React.useState('');

      // Intake Form State
      const [intakeForm, setIntakeForm] = React.useState({
        clientPhone: '',
        clientEmail: '',
        serialNumber: '',
        schoolPo: '',
        schoolInstrumentNumber: '',
        issues: '',
        notes: '',
        laborHours: 1,
        laborRate: 75,
        assignedTech: 'Unassigned'
      });

      // Edit States
      const [editNotes, setEditNotes] = React.useState('');
      const [editStatus, setEditStatus] = React.useState('');
      const [editLaborHours, setEditLaborHours] = React.useState(0);
      const [editAssignedTech, setEditAssignedTech] = React.useState('Unassigned');
      const [editSchoolPo, setEditSchoolPo] = React.useState('');
      const [editSchoolInstrumentNumber, setEditSchoolInstrumentNumber] = React.useState('');
      const [selectedProductToAdd, setSelectedProductToAdd] = React.useState('');
      const [productAddQty, setProductAddQty] = React.useState(1);
      const [partSearchText, setPartSearchText] = React.useState('');
      const [showPartSuggestions, setShowPartSuggestions] = React.useState(false);

      // Services Logged States
      const [selectedServiceToAdd, setSelectedServiceToAdd] = React.useState('');
      const [customServiceName, setCustomServiceName] = React.useState('');
      const [customServicePrice, setCustomServicePrice] = React.useState(0);

      const suggestedParts = React.useMemo(() => {
        if (!partSearchText.trim()) return [];
        const lower = partSearchText.toLowerCase();
        return inventory.filter(p => 
          p.sku.toLowerCase().includes(lower) || 
          p.name.toLowerCase().includes(lower)
        ).slice(0, 10);
      }, [partSearchText, inventory]);

      // Filters
      const filteredRepairs = repairs.filter(rep => {
        const searchLower = (searchTerm || '').toLowerCase();
        const matchesSearch = 
          (rep.id || '').toLowerCase().includes(searchLower) ||
          (rep.client?.name || '').toLowerCase().includes(searchLower) ||
          (rep.instrument?.make || '').toLowerCase().includes(searchLower) ||
          (rep.instrument?.model || '').toLowerCase().includes(searchLower) ||
          (rep.instrument?.serialNumber || '').toLowerCase().includes(searchLower);

        const matchesFilter = instrumentFilter === 'All' || rep.instrument?.category === instrumentFilter;
        return matchesSearch && matchesFilter;
      });

      // Helper to sum total bill (labor is excluded from customer billing)
      const getUpdatedCost = (laborHours, laborRate, parts, services) => {
        const partsSum = (parts || []).reduce((sum, p) => sum + (p.price * p.qty), 0);
        const servicesSum = (services || []).reduce((sum, s) => sum + s.price, 0);
        return partsSum + servicesSum;
      };

      // Set cascading defaults when Category changes
      React.useEffect(() => {
        const types = Object.keys(instrumentLibrary[selectedCategory] || {});
        setSelectedType(types[0] || 'Other');
      }, [selectedCategory, instrumentLibrary]);

      // Set cascading makes when Type changes
      React.useEffect(() => {
        if (selectedType && selectedType !== 'Other') {
          const makesObj = instrumentLibrary[selectedCategory]?.[selectedType]?.makes || {};
          const makes = Object.keys(makesObj);
          setSelectedMake(makes[0] || 'Other');
        } else {
          setSelectedMake('Other');
        }
      }, [selectedType, selectedCategory, instrumentLibrary]);

      // Set cascading models when Make changes
      React.useEffect(() => {
        if (selectedMake && selectedMake !== 'Other' && selectedType !== 'Other') {
          const models = instrumentLibrary[selectedCategory]?.[selectedType]?.makes?.[selectedMake] || [];
          setSelectedModel(models[0] || 'Other');
        } else {
          setSelectedModel('Other');
        }
      }, [selectedMake, selectedType, selectedCategory, instrumentLibrary]);

      const handleOpenDetails = (repair) => {
        setSelectedRepair(repair);
        setEditNotes(repair.notes || '');
        setEditStatus(repair.status);
        setEditLaborHours(repair.laborHours || 0);
        setEditAssignedTech(repair.assignedTech || 'Unassigned');
        setEditSchoolPo(repair.schoolPo || '');
        setEditSchoolInstrumentNumber(repair.instrument?.schoolInstrumentNumber || '');
        setActiveModalTab('details');
      };

      const handleCloseDetails = () => {
        setSelectedRepair(null);
        setSelectedProductToAdd('');
        setPartSearchText('');
      };

      const handleClientSearchChange = (e) => {
        const text = e.target.value;
        setClientSearchText(text);
        setShowClientSuggestions(true);
      };

      const handleSelectClientSuggestion = (client) => {
        setClientSearchText(client.name);
        setIntakeForm({
          ...intakeForm,
          clientPhone: client.phone,
          clientEmail: client.email
        });
        setShowClientSuggestions(false);
      };

      const handleIntakeSubmit = (e) => {
        e.preventDefault();
        
        const finalType = selectedType === 'Other' ? customType : selectedType;
        const finalMake = selectedMake === 'Other' ? customMake : selectedMake;
        const finalModel = selectedModel === 'Other' ? customModel : selectedModel;

        const newId = `REP-${Date.now().toString().slice(-4)}`;
        const assignedTech = intakeForm.assignedTech || 'Unassigned';
        const newRepair = {
          id: newId,
          client: {
            name: clientSearchText,
            phone: intakeForm.clientPhone,
            email: intakeForm.clientEmail
          },
          instrument: {
            category: selectedCategory,
            type: finalType || 'Unknown Type',
            make: finalMake || 'Generic',
            model: finalModel || 'Standard',
            serialNumber: intakeForm.serialNumber,
            schoolInstrumentNumber: intakeForm.schoolInstrumentNumber || ''
          },
          schoolPo: intakeForm.schoolPo || '',
          issues: intakeForm.issues.split('\n').filter(i => i.trim() !== ''),
          notes: intakeForm.notes,
          status: 'Received',
          estimatedCost: getUpdatedCost(intakeForm.laborHours, intakeForm.laborRate, [], []),
          partsUsed: [],
          servicesUsed: [],
          laborHours: parseFloat(intakeForm.laborHours) || 0,
          laborRate: parseFloat(intakeForm.laborRate) || 75.00,
          createdAt: new Date().toISOString(),
          assignedTech: assignedTech,
          history: [
            {
              text: `Work order registered. Assigned to: ${assignedTech}`,
              timestamp: new Date().toISOString(),
              user: activeUser ? activeUser.name : 'System'
            }
          ]
        };

        // Update local instrument library if custom values were entered
        if (selectedType === 'Other' || selectedMake === 'Other' || selectedModel === 'Other') {
          const updatedLib = { ...instrumentLibrary };
          
          if (!updatedLib[selectedCategory]) {
            updatedLib[selectedCategory] = {};
          }
          
          const typeKey = selectedType === 'Other' ? customType : selectedType;
          if (typeKey && typeKey.trim()) {
            if (!updatedLib[selectedCategory][typeKey]) {
              updatedLib[selectedCategory][typeKey] = { makes: {} };
            }
            
            const makeKey = selectedMake === 'Other' ? customMake : selectedMake;
            if (makeKey && makeKey.trim()) {
              if (!updatedLib[selectedCategory][typeKey].makes[makeKey]) {
                updatedLib[selectedCategory][typeKey].makes[makeKey] = [];
              }
              
              const modelKey = selectedModel === 'Other' ? customModel : selectedModel;
              if (modelKey && modelKey.trim()) {
                if (!updatedLib[selectedCategory][typeKey].makes[makeKey].includes(modelKey)) {
                  updatedLib[selectedCategory][typeKey].makes[makeKey].push(modelKey);
                }
              }
            }
          }
          onUpdateInstrumentLibrary(updatedLib);
        }

        onSaveRepair(newRepair);
        setIsIntakeOpen(false);

        // Reset Form
        setClientSearchText('');
        setIntakeForm({
          clientPhone: '',
          clientEmail: '',
          serialNumber: '',
          schoolPo: '',
          schoolInstrumentNumber: '',
          issues: '',
          notes: '',
          laborHours: 1,
          laborRate: 75,
          assignedTech: 'Unassigned'
        });
        setCustomType('');
        setCustomMake('');
        setCustomModel('');
      };

      const handleAddPart = () => {
        if (!selectedProductToAdd) return;
        const product = inventory.find(p => p.id === selectedProductToAdd);
        if (!product) return;

        if (product.stock < productAddQty) {
          alert(`Cannot add: Only ${product.stock} available in stock.`);
          return;
        }

        setInventory(prev => prev.map(p => p.id === product.id ? { ...p, stock: p.stock - productAddQty } : p));

        const updatedParts = [...(selectedRepair.partsUsed || [])];
        const existingIdx = updatedParts.findIndex(p => p.id === product.id);

        if (existingIdx > -1) {
          updatedParts[existingIdx].qty += productAddQty;
        } else {
          updatedParts.push({
            id: product.id,
            sku: product.sku,
            name: product.name,
            price: product.price,
            costPrice: product.costPrice !== undefined ? product.costPrice : parseFloat((product.price * 0.6).toFixed(2)),
            qty: productAddQty
          });
        }

        const updatedHistory = [...(selectedRepair.history || [])];
        updatedHistory.push({
          text: `Added part: ${product.name} x${productAddQty}`,
          timestamp: new Date().toISOString(),
          user: activeUser ? activeUser.name : 'System'
        });

        const updatedRepair = { 
          ...selectedRepair, 
          partsUsed: updatedParts,
          history: updatedHistory,
          estimatedCost: getUpdatedCost(selectedRepair.laborHours, selectedRepair.laborRate, updatedParts, selectedRepair.servicesUsed || [])
        };
        onSaveRepair(updatedRepair);
        setSelectedRepair(updatedRepair);
        setSelectedProductToAdd('');
        setPartSearchText('');
        setProductAddQty(1);
      };

      const handleRemovePart = (partId, qty) => {
        setInventory(prev => prev.map(p => p.id === partId ? { ...p, stock: p.stock + qty } : p));
        const part = selectedRepair.partsUsed.find(p => p.id === partId);
        const updatedHistory = [...(selectedRepair.history || [])];
        updatedHistory.push({
          text: `Removed part: ${part ? part.name : partId}`,
          timestamp: new Date().toISOString(),
          user: activeUser ? activeUser.name : 'System'
        });
        const updatedParts = selectedRepair.partsUsed.filter(p => p.id !== partId);
        const updatedRepair = { 
          ...selectedRepair, 
          partsUsed: updatedParts,
          history: updatedHistory,
          estimatedCost: getUpdatedCost(selectedRepair.laborHours, selectedRepair.laborRate, updatedParts, selectedRepair.servicesUsed || [])
        };
        onSaveRepair(updatedRepair);
        setSelectedRepair(updatedRepair);
      };

      const handleAddService = () => {
        let name = '';
        let price = 0;
        
        if (selectedServiceToAdd === 'Custom') {
          if (!customServiceName.trim()) {
            alert('Please enter a custom service name.');
            return;
          }
          name = customServiceName.trim();
          price = parseFloat(customServicePrice) || 0;
        } else if (selectedServiceToAdd) {
          const srv = SERVICES_LIBRARY.find(s => s.id === selectedServiceToAdd);
          if (!srv) return;
          name = srv.name;
          price = srv.price;
        } else {
          return;
        }

        const updatedServices = [...(selectedRepair.servicesUsed || [])];
        updatedServices.push({ name, price });

        const updatedHistory = [...(selectedRepair.history || [])];
        updatedHistory.push({
          text: `Logged flat-rate service: ${name} ($${price.toFixed(2)})`,
          timestamp: new Date().toISOString(),
          user: activeUser ? activeUser.name : 'System'
        });

        const updatedRepair = { 
          ...selectedRepair, 
          servicesUsed: updatedServices,
          history: updatedHistory,
          estimatedCost: getUpdatedCost(selectedRepair.laborHours, selectedRepair.laborRate, selectedRepair.partsUsed || [], updatedServices)
        };
        
        onSaveRepair(updatedRepair);
        setSelectedRepair(updatedRepair);
        setSelectedServiceToAdd('');
        setCustomServiceName('');
        setCustomServicePrice(0);
      };

      const handleRemoveService = (idxToRemove) => {
        const srv = (selectedRepair.servicesUsed || [])[idxToRemove];
        const updatedHistory = [...(selectedRepair.history || [])];
        updatedHistory.push({
          text: `Removed flat-rate service: ${srv ? srv.name : 'Service'}`,
          timestamp: new Date().toISOString(),
          user: activeUser ? activeUser.name : 'System'
        });
        const updatedServices = (selectedRepair.servicesUsed || []).filter((_, idx) => idx !== idxToRemove);
        const updatedRepair = { 
          ...selectedRepair, 
          servicesUsed: updatedServices,
          history: updatedHistory,
          estimatedCost: getUpdatedCost(selectedRepair.laborHours, selectedRepair.laborRate, selectedRepair.partsUsed || [], updatedServices)
        };
        onSaveRepair(updatedRepair);
        setSelectedRepair(updatedRepair);
      };

      const handleSaveDetailsUpdates = () => {
        const changes = [];
        if (selectedRepair.notes !== editNotes) {
          changes.push('Service notes updated');
        }
        if (selectedRepair.status !== editStatus) {
          changes.push(`Status changed from "${selectedRepair.status}" to "${editStatus}"`);
        }
        if (selectedRepair.laborHours !== parseFloat(editLaborHours)) {
          changes.push(`Labor changed from ${selectedRepair.laborHours} hrs to ${editLaborHours} hrs`);
        }
        if ((selectedRepair.assignedTech || 'Unassigned') !== editAssignedTech) {
          changes.push(`Assignment changed from "${selectedRepair.assignedTech || 'Unassigned'}" to "${editAssignedTech}"`);
        }
        if (selectedRepair.schoolPo !== editSchoolPo) {
          changes.push(`School PO changed from "${selectedRepair.schoolPo || ''}" to "${editSchoolPo}"`);
        }
        if ((selectedRepair.instrument?.schoolInstrumentNumber || '') !== editSchoolInstrumentNumber) {
          changes.push(`School Instrument # changed from "${selectedRepair.instrument?.schoolInstrumentNumber || ''}" to "${editSchoolInstrumentNumber}"`);
        }

        const updatedHistory = [...(selectedRepair.history || [])];
        if (changes.length > 0) {
          updatedHistory.push({
            text: `Updated repair order: ${changes.join(', ')}`,
            timestamp: new Date().toISOString(),
            user: activeUser ? activeUser.name : 'System'
          });
        }

        const updatedRepair = {
          ...selectedRepair,
          notes: editNotes,
          status: editStatus,
          assignedTech: editAssignedTech,
          history: updatedHistory,
          laborHours: parseFloat(editLaborHours) || 0,
          schoolPo: editSchoolPo,
          instrument: {
            ...(selectedRepair.instrument || {}),
            schoolInstrumentNumber: editSchoolInstrumentNumber
          },
          estimatedCost: getUpdatedCost(parseFloat(editLaborHours) || 0, selectedRepair.laborRate, selectedRepair.partsUsed || [], selectedRepair.servicesUsed || [])
        };
        onSaveRepair(updatedRepair);
        setSelectedRepair(updatedRepair);
        alert('Repair details, assignment, and labor updated successfully.');
        if (editStatus === 'Completed' && selectedRepair.status !== 'Completed') {
          setTimeout(() => {
            if (confirm('Work order marked as Completed. Would you like to generate the invoice now?')) {
              onGenerateInvoice(updatedRepair);
              handleCloseDetails();
            }
          }, 100);
        }
      };

      const handleQuickStatusChange = (repair, newStatus) => {
        const oldStatus = repair.status;
        if (oldStatus === newStatus) return;

        const updatedHistory = [...(repair.history || [])];
        updatedHistory.push({
          text: `Quick status changed from "${oldStatus}" to "${newStatus}"`,
          timestamp: new Date().toISOString(),
          user: activeUser ? activeUser.name : 'System'
        });

        const updatedRepair = {
          ...repair,
          status: newStatus,
          history: updatedHistory
        };

        onSaveRepair(updatedRepair);

        if (newStatus === 'Completed') {
          setTimeout(() => {
            if (confirm('Work order marked as Completed. Would you like to generate the invoice now?')) {
              onGenerateInvoice(updatedRepair);
            }
          }, 100);
        }
      };

      // Filter client autocomplete list
      const suggestedClients = clientSearchText.trim() === ''
        ? clients
        : clients.filter(c => c.name.toLowerCase().includes(clientSearchText.toLowerCase()));

      const totalRepairs = repairs.length;
      const inProgressCount = repairs.filter(r => r.status === 'In Progress').length;
      const readyCount = repairs.filter(r => r.status === 'Ready for Pickup').length;
      const awaitingCount = repairs.filter(r => r.status === 'Awaiting Parts').length;

      const totalProjectedProfit = React.useMemo(() => {
        return repairs
          .filter(rep => rep.status === 'Received')
          .reduce((sum, rep) => {
            const revenue = getUpdatedCost(rep.laborHours, rep.laborRate, rep.partsUsed || [], rep.servicesUsed || []);
            const laborCost = (rep.laborHours || 0) * 60.00;
            const partsCost = (rep.partsUsed || []).reduce((partsSum, p) => {
              const cost = p.costPrice !== undefined ? p.costPrice : parseFloat((p.price * 0.6).toFixed(2));
              return partsSum + (cost * p.qty);
            }, 0);
            const totalCost = laborCost + partsCost;
            return sum + (revenue - totalCost);
          }, 0);
      }, [repairs]);

      const totalActualProfit = React.useMemo(() => {
        return repairs
          .filter(rep => rep.status !== 'Received')
          .reduce((sum, rep) => {
            const revenue = getUpdatedCost(rep.laborHours, rep.laborRate, rep.partsUsed || [], rep.servicesUsed || []);
            const laborCost = (rep.laborHours || 0) * 60.00;
            const partsCost = (rep.partsUsed || []).reduce((partsSum, p) => {
              const cost = p.costPrice !== undefined ? p.costPrice : parseFloat((p.price * 0.6).toFixed(2));
              return partsSum + (cost * p.qty);
            }, 0);
            const totalCost = laborCost + partsCost;
            return sum + (revenue - totalCost);
          }, 0);
      }, [repairs]);

      const typesList = Object.keys(instrumentLibrary[selectedCategory] || {});
      const makesList = selectedType && selectedType !== 'Other' ? Object.keys(instrumentLibrary[selectedCategory]?.[selectedType]?.makes || {}) : [];
      const modelsList = selectedMake && selectedMake !== 'Other' && selectedType !== 'Other' ? instrumentLibrary[selectedCategory]?.[selectedType]?.makes?.[selectedMake] || [] : [];

      return (
        <div>
          {/* Stats Bar */}
          <div className="dashboard-stats">
            <div className="stat-card">
              <div className="stat-icon" style={{ color: '#dfc28c' }}><Icon name="clipboard" /></div>
              <div>
                <div className="stat-label">Total Repairs</div>
                <div className="stat-number">{totalRepairs}</div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ color: '#fbbf24' }}><Icon name="hammer" /></div>
              <div>
                <div className="stat-label">In Progress</div>
                <div className="stat-number">{inProgressCount}</div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ color: '#f87171' }}><Icon name="alertcircle" /></div>
              <div>
                <div className="stat-label">Awaiting Parts</div>
                <div className="stat-number">{awaitingCount}</div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ color: '#34d399' }}><Icon name="checkcircle" /></div>
              <div>
                <div className="stat-label">Ready for Pickup</div>
                <div className="stat-number">{readyCount}</div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ color: totalProjectedProfit >= 0 ? '#34d399' : '#f87171' }}><Icon name="shoppingbag" /></div>
              <div>
                <div className="stat-label">Projected Shop Profit</div>
                <div className="stat-number" style={{ color: totalProjectedProfit >= 0 ? '#34d399' : '#f87171' }}>
                  {totalProjectedProfit >= 0 ? '+' : ''}${totalProjectedProfit.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                </div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ color: totalActualProfit >= 0 ? '#34d399' : '#f87171' }}><Icon name="trendingup" /></div>
              <div>
                <div className="stat-label">Actual Shop Profit</div>
                <div className="stat-number" style={{ color: totalActualProfit >= 0 ? '#34d399' : '#f87171' }}>
                  {totalActualProfit >= 0 ? '+' : ''}${totalActualProfit.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                </div>
              </div>
            </div>
          </div>

          {/* Search & Actions */}
          <div className="card" style={{ marginBottom: '24px', padding: '16px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '16px' }}>
              <div style={{ display: 'flex', gap: '12px', flexGrow: 1, maxWidth: '600px' }}>
                <div style={{ position: 'relative', flexGrow: 1 }}>
                  <input 
                    type="text" 
                    placeholder="Search serial number, customer, brand, model..." 
                    className="input-control" 
                    style={{ width: '100%', paddingLeft: '40px' }}
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                  <span style={{ position: 'absolute', left: '14px', top: '14px', color: 'var(--text-muted)' }}>
                    <Icon name="search" size={16} />
                  </span>
                </div>
                <select 
                  className="input-control"
                  value={instrumentFilter}
                  onChange={(e) => setInstrumentFilter(e.target.value)}
                >
                  <option value="All">All Categories</option>
                  <option value="Woodwind">Woodwinds</option>
                  <option value="Brass">Brass</option>
                </select>
              </div>
              <button className="btn btn-primary" onClick={() => setIsIntakeOpen(true)}>
                <Icon name="plus" size={16} /> Instrument Intake
              </button>
            </div>
          </div>

          {/* Kanban Board */}
          <div className="kanban-board">
            {statusColumns.map(col => {
              const columnRepairs = filteredRepairs.filter(rep => rep.status === col.key);
              return (
                <div className="kanban-column" key={col.key}>
                  <div className="kanban-column-header" style={{ position: 'relative' }}>
                    {editingColumnKey === col.key ? (
                      <input 
                        type="text" 
                        className="input-control" 
                        style={{ fontSize: '13px', padding: '2px 6px', height: 'auto', display: 'inline-block', width: '120px', backgroundColor: 'var(--bg-primary)', border: '1px solid var(--border-gold)', color: 'var(--text-primary)' }}
                        value={tempColumnLabel} 
                        onChange={(e) => setTempColumnLabel(e.target.value)}
                        onBlur={() => {
                          if (tempColumnLabel.trim()) {
                            setStatusColumns(statusColumns.map(c => c.key === col.key ? { ...c, label: tempColumnLabel.trim() } : c));
                          }
                          setEditingColumnKey(null);
                        }}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter') {
                            if (tempColumnLabel.trim()) {
                              setStatusColumns(statusColumns.map(c => c.key === col.key ? { ...c, label: tempColumnLabel.trim() } : c));
                            }
                            setEditingColumnKey(null);
                          } else if (e.key === 'Escape') {
                            setEditingColumnKey(null);
                          }
                        }}
                        autoFocus
                      />
                    ) : (
                      <span className={`kanban-column-title ${col.color}`} style={{ display: 'inline-flex', alignItems: 'center' }}>
                        {col.label}
                        {activeUser && activeUser.name === 'Matt' && (
                          <button 
                            type="button" 
                            style={{ background: 'none', border: 'none', color: 'var(--accent-gold)', marginLeft: '6px', cursor: 'pointer', padding: 0, fontSize: '10px' }}
                            onClick={() => {
                              setEditingColumnKey(col.key);
                              setTempColumnLabel(col.label);
                            }}
                            title="Rename Column"
                          >
                            ✏️
                          </button>
                        )}
                      </span>
                    )}
                    <span className="kanban-column-count">{columnRepairs.length}</span>
                  </div>
                  
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', minHeight: '350px' }}>
                    {columnRepairs.map(rep => (
                      <div 
                        className="repair-card" 
                        key={rep.id} 
                        onClick={() => handleOpenDetails(rep)}
                      >
                        <div className="flex-space" style={{ marginBottom: '6px' }}>
                          <span className={`repair-card-tag ${rep.instrument?.category === 'Brass' ? 'tag-brass' : 'tag-woodwind'}`}>
                            {rep.instrument?.type || 'Unknown'}
                          </span>
                          <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }} onClick={(e) => e.stopPropagation()}>
                            <select
                              value={rep.status}
                              onChange={(e) => handleQuickStatusChange(rep, e.target.value)}
                              style={{ 
                                fontSize: '10px', 
                                backgroundColor: 'var(--bg-secondary)', 
                                color: 'var(--text-primary)', 
                                border: '1px solid var(--border-subtle)', 
                                borderRadius: '4px',
                                padding: '1px 2px',
                                cursor: 'pointer'
                              }}
                            >
                              {statusColumns.map(c => (
                                <option key={c.key} value={c.key}>{c.label}</option>
                              ))}
                            </select>
                            <span className="text-muted" style={{ fontSize: '10px', fontWeight: 'bold' }}>{rep.id || ''}</span>
                          </div>
                        </div>
                        <div className="repair-card-title">
                          {rep.instrument?.make || ''} {rep.instrument?.model || ''}
                        </div>
                        <div className="repair-card-client">
                          <span style={{ marginRight: '4px', display: 'inline-block', verticalAlign: 'middle', marginTop: '-3px' }}>
                            <Icon name="user" size={10} />
                          </span>
                          {rep.client?.name || 'Unknown Client'}
                        </div>
                        
                        {rep.issues && rep.issues.length > 0 && (
                          <div className="text-muted" style={{ fontSize: '11px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                            ⚠ {rep.issues[0]}
                          </div>
                        )}

                        <div className="repair-card-meta">
                          <span>Est: ${(rep.estimatedCost || 0).toFixed(2)}</span>
                          <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                            {rep.assignedTech && rep.assignedTech !== 'Unassigned' && (
                              <span 
                                className="user-badge-avatar" 
                                style={{ width: '18px', height: '18px', fontSize: '9px', borderRadius: '50%', margin: 0 }}
                                title={`Assigned to ${rep.assignedTech}`}
                              >
                                {rep.assignedTech[0]}
                              </span>
                            )}
                            <span className="status-badge" style={{ fontSize: '9px', padding: '1px 6px' }}>
                              {rep.partsUsed?.length > 0 ? `${rep.partsUsed.length} parts` : 'no parts'}
                            </span>
                          </div>
                        </div>
                      </div>
                    ))}
                    
                    {columnRepairs.length === 0 && (
                      <div style={{ textAlign: 'center', padding: '30px 10px', color: 'var(--text-muted)', fontSize: '12px', border: '1px dashed var(--border-subtle)', borderRadius: 'var(--radius-md)' }}>
                        No items
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* INTAKE FORM MODAL */}
          {isIntakeOpen && (
            <div className="modal-overlay">
              <div className="modal-content">
                <div className="modal-header">
                  <h3>New Instrument Intake Form</h3>
                  <button className="close-btn" onClick={() => setIsIntakeOpen(false)}>&times;</button>
                </div>
                <form onSubmit={handleIntakeSubmit}>
                  <div className="modal-body">
                    <h4 className="text-gold" style={{ fontFamily: 'var(--font-serif)', marginBottom: '14px', borderBottom: '1px solid var(--border-subtle)', paddingBottom: '6px' }}>1. Client Information</h4>
                    <div className="form-row">
                      <div className="form-group autocomplete-wrapper">
                        <label>Client Name (Search / Dropdown)</label>
                        <div style={{ position: 'relative' }}>
                          <input 
                            type="text" 
                            required 
                            className="input-control" 
                            placeholder="Type to search or select..."
                            value={clientSearchText}
                            onChange={handleClientSearchChange}
                            onFocus={() => setShowClientSuggestions(true)}
                            onBlur={() => setTimeout(() => setShowClientSuggestions(false), 200)}
                          />
                          <span style={{ 
                            position: 'absolute', 
                            right: '12px', 
                            top: '50%', 
                            transform: 'translateY(-50%)', 
                            fontSize: '10px', 
                            color: 'var(--text-muted)',
                            pointerEvents: 'none'
                          }}>
                            â–¼
                          </span>
                        </div>
                        {showClientSuggestions && suggestedClients.length > 0 && (
                          <ul className="autocomplete-list">
                            {suggestedClients.map(c => (
                              <li 
                                key={c.id} 
                                className="autocomplete-item"
                                onClick={() => handleSelectClientSuggestion(c)}
                              >
                                {c.name} ({c.phone})
                              </li>
                            ))}
                          </ul>
                        )}
                      </div>
                      <div className="form-group">
                        <label>Phone Number</label>
                        <input 
                          type="text" 
                          required 
                          className="input-control" 
                          placeholder="e.g. 0400 000 000"
                          value={intakeForm.clientPhone}
                          onChange={(e) => setIntakeForm({...intakeForm, clientPhone: e.target.value})}
                        />
                      </div>
                    </div>
                    <div className="form-group">
                      <label>Email Address</label>
                      <input 
                        type="email" 
                        required 
                        className="input-control" 
                        placeholder="e.g. john.doe@email.com"
                        value={intakeForm.clientEmail}
                        onChange={(e) => setIntakeForm({...intakeForm, clientEmail: e.target.value})}
                      />
                    </div>

                    <h4 className="text-gold" style={{ fontFamily: 'var(--font-serif)', marginTop: '20px', marginBottom: '14px', borderBottom: '1px solid var(--border-subtle)', paddingBottom: '6px' }}>2. Dynamic Instrument Selector</h4>
                    <div className="form-row">
                      <div className="form-group">
                        <label>Category</label>
                        <select 
                          className="input-control"
                          value={selectedCategory}
                          onChange={(e) => setSelectedCategory(e.target.value)}
                        >
                          <option value="Woodwind">Woodwind</option>
                          <option value="Brass">Brass</option>
                        </select>
                      </div>
                      <div className="form-group">
                        <label>Instrument Type</label>
                        <select 
                          className="input-control"
                          value={selectedType}
                          onChange={(e) => setSelectedType(e.target.value)}
                        >
                          {typesList.map(t => (
                            <option key={t} value={t}>{t}</option>
                          ))}
                          <option value="Other">-- Custom / Other --</option>
                        </select>
                      </div>
                    </div>

                    {selectedType === 'Other' && (
                      <div className="form-group">
                        <label>Enter Custom Instrument Type</label>
                        <input 
                          type="text" 
                          required
                          className="input-control" 
                          placeholder="e.g. Bassoon, Soprano Sax"
                          value={customType}
                          onChange={(e) => setCustomType(e.target.value)}
                        />
                      </div>
                    )}

                    <div className="form-row">
                      <div className="form-group">
                        <label>Make / Brand</label>
                        {selectedType !== 'Other' ? (
                          <select 
                            className="input-control"
                            value={selectedMake}
                            onChange={(e) => setSelectedMake(e.target.value)}
                          >
                            {makesList.map(m => (
                              <option key={m} value={m}>{m}</option>
                            ))}
                            <option value="Other">-- Custom / Other --</option>
                          </select>
                        ) : (
                          <input 
                            type="text" 
                            required
                            className="input-control" 
                            placeholder="e.g. Yamaha"
                            value={customMake}
                            onChange={(e) => setCustomMake(e.target.value)}
                          />
                        )}
                      </div>
                      
                      <div className="form-group">
                        <label>Model Name / Number</label>
                        {selectedType !== 'Other' && selectedMake !== 'Other' ? (
                          <select 
                            className="input-control"
                            value={selectedModel}
                            onChange={(e) => setSelectedModel(e.target.value)}
                          >
                            {modelsList.map(md => (
                              <option key={md} value={md}>{md}</option>
                            ))}
                            <option value="Other">-- Custom / Other --</option>
                          </select>
                        ) : (
                          <input 
                            type="text" 
                            required
                            className="input-control" 
                            placeholder="e.g. Vintage Mark VI"
                            value={customModel}
                            onChange={(e) => setCustomModel(e.target.value)}
                          />
                        )}
                      </div>

                      <div className="form-group">
                        <label>Serial Number</label>
                        <input 
                          type="text" 
                          required 
                          className="input-control" 
                          placeholder="e.g. SN-998822"
                          value={intakeForm.serialNumber}
                          onChange={(e) => setIntakeForm({...intakeForm, serialNumber: e.target.value})}
                        />
                      </div>
                      <div className="form-group">
                        <label>School PO# (Optional)</label>
                        <input 
                          type="text"
